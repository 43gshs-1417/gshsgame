<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIAR'S HOME</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['"Noto Serif KR"', 'serif'],
                    },
                    colors: {
                        blood: '#8b0000',
                        bloodLight: '#ff0000',
                        deepDark: '#0a0a0a',
                    }
                }
            }
        }
    </script>
    <style>
        /* 기본 리셋 및 둥근 테두리 강제 제거 */
        * { border-radius: 0 !important; outline: none; }
        body { margin: 0; overflow: hidden; background-color: black; user-select: none; }
        
        /* 사실적인 어두운 원탁 조명 효과 */
        .spotlight-bg {
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.1) 0%, rgba(0, 0, 0, 0.8) 40%, rgba(0, 0, 0, 1) 100%),
                url('https://images.unsplash.com/photo-1517594422361-5e18ae14fc8e?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
        }

        /* 텍스트 효과 */
        .neon-red {
            text-shadow: 0 0 10px rgba(255,0,0,0.8), 0 0 20px rgba(255,0,0,0.6), 0 0 30px rgba(139,0,0,0.8);
        }
        .text-glow {
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
        }

        /* UI 패널 */
        .glass-panel {
            background: rgba(10, 10, 10, 0.85);
            border: 1px solid #333;
            box-shadow: 0 0 20px rgba(0,0,0,0.9);
            backdrop-filter: blur(5px);
        }

        /* 아바타 스타일 */
        .avatar-box {
            transition: all 0.3s ease;
            filter: grayscale(80%) brightness(0.5);
        }
        .avatar-box.active {
            filter: grayscale(0%) brightness(1.2);
            border: 2px solid #ff0000;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
        }
        .avatar-box.voted {
            border: 2px solid #8b0000;
            opacity: 0.5;
        }

        /* Tab 메뉴 (기록) */
        .log-overlay {
            background: rgba(0, 0, 0, 0.95);
            border: 1px solid #ff0000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        .log-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        /* 커스텀 스크롤바 */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #8b0000; }
    </style>

    <!-- React & PeerJS -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // 현실적인 동물 이미지 URL (이모티콘 대체)
        const ANIMAL_IMAGES = [
            'https://images.unsplash.com/photo-1590523278191-995cbcda646b?w=200&h=200&fit=crop', // 늑대
            'https://images.unsplash.com/photo-1534567153574-2b12153a87f0?w=200&h=200&fit=crop', // 독수리
            'https://images.unsplash.com/photo-1549366021-9f761d450615?w=200&h=200&fit=crop', // 호랑이
            'https://images.unsplash.com/photo-1530595467537-0b5996c41f2d?w=200&h=200&fit=crop', // 곰
            'https://images.unsplash.com/photo-1540845511934-7721df74187e?w=200&h=200&fit=crop', // 부엉이
            'https://images.unsplash.com/photo-1546182990-dffeafbe841d?w=200&h=200&fit=crop', // 사자
            'https://images.unsplash.com/photo-1516934024742-b461fba47600?w=200&h=200&fit=crop', // 여우
            'https://images.unsplash.com/photo-1531251445707-1f000e1e87d0?w=200&h=200&fit=crop'  // 뱀
        ];

        // 게임 단어 데이터 (주제별 [시민단어, 라이어단어])
        const GAME_WORDS = {
            '게임': [['스타크래프트', '리그오브레전드'], ['마인크래프트', '로블록스'], ['배틀그라운드', '오버워치']],
            '음식': [['짜장면', '짬뽕'], ['피자', '치킨'], ['삼겹살', '소고기']],
            '동물': [['사자', '호랑이'], ['강아지', '고양이'], ['독수리', '매']],
            '사람': [['의사', '간호사'], ['경찰', '소방관'], ['선생님', '교수님']]
        };

        // 랜덤 5자리 방 코드 생성
        const generateRoomCode = () => Math.random().toString(36).substring(2, 7).toUpperCase();

        function App() {
            // 로컬 상태
            const [myId, setMyId] = useState('');
            const [nickname, setNickname] = useState('');
            const [roomCodeInput, setRoomCodeInput] = useState('');
            const [peer, setPeer] = useState(null);
            const [isHost, setIsHost] = useState(false);
            const [showLogs, setShowLogs] = useState(false);
            const [inputText, setInputText] = useState('');
            const [myWordInfo, setMyWordInfo] = useState({ word: '', isLiar: false, topic: '' });

            // P2P 연결 관리
            const connectionsRef = useRef({});
            const hostConnectionRef = useRef(null);

            // 게임 공유 상태 (방장이 관리하고 브로드캐스트)
            const [gameState, setGameState] = useState({
                phase: 'login', // login -> lobby -> playing -> voting -> suspense -> guess -> result
                mode: 'basic',
                players: [], // { id, name, avatar }
                topic: '',
                turnIndex: 0,
                logs: [], // { name, text }
                votes: {}, // { voterId: targetId }
                timeLeft: 0,
                suspenseTargetId: null,
                resultMessage: '',
                liarId: null,
                citizenWord: '' // 라이어가 맞춰야 할 단어
            });

            // Tab 키 이벤트 처리 (로그 보기)
            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.key === 'Tab') {
                        e.preventDefault();
                        setShowLogs(true);
                    }
                };
                const handleKeyUp = (e) => {
                    if (e.key === 'Tab') {
                        e.preventDefault();
                        setShowLogs(false);
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                window.addEventListener('keyup', handleKeyUp);
                return () => {
                    window.removeEventListener('keydown', handleKeyDown);
                    window.removeEventListener('keyup', handleKeyUp);
                };
            }, []);

            // 방장: 상태 브로드캐스트
            const broadcastState = (newState, privateData = {}) => {
                setGameState(newState);
                Object.values(connectionsRef.current).forEach(conn => {
                    if (conn.open) {
                        const payload = { type: 'STATE_UPDATE', state: newState };
                        // 개인 정보(단어, 라이어 여부)는 해당 클라이언트에게만 전송
                        if (privateData[conn.peer]) {
                            payload.private = privateData[conn.peer];
                        }
                        conn.send(payload);
                    }
                });
            };

            // 방장: 클라이언트 액션 처리
            const handleClientAction = (action, clientId) => {
                setGameState(prev => {
                    const newState = { ...prev };
                    
                    if (action.type === 'CHAT_SUBMIT') {
                        const player = newState.players.find(p => p.id === clientId);
                        newState.logs.push({ name: player.name, text: action.text });
                        newState.turnIndex += 1;
                        
                        // 모든 사람이 말했으면 투표로 넘어감
                        if (newState.turnIndex >= newState.players.length) {
                            newState.phase = 'voting';
                            newState.timeLeft = 60;
                            startTimer(newState);
                        }
                    } else if (action.type === 'VOTE') {
                        newState.votes[clientId] = action.targetId;
                        // 모두 투표했으면 즉시 결과 처리
                        if (Object.keys(newState.votes).length === newState.players.length) {
                            clearInterval(window.voteTimer);
                            processVotingResult(newState);
                        }
                    } else if (action.type === 'LIAR_GUESS') {
                        if (action.guess.trim() === newState.citizenWord) {
                            newState.phase = 'result';
                            newState.resultMessage = "라이어가 단어를 맞췄습니다!\n[라이어 승리]";
                        } else {
                            newState.phase = 'result';
                            newState.resultMessage = `라이어가 단어를 틀렸습니다.\n정답: ${newState.citizenWord}\n[시민 승리]`;
                        }
                        setTimeout(() => resetToLobby(newState), 5000);
                    }

                    broadcastState(newState);
                    return newState;
                });
            };

            const startTimer = (currentState) => {
                let timeLeft = 60;
                window.voteTimer = setInterval(() => {
                    timeLeft -= 1;
                    setGameState(prev => {
                        const next = { ...prev, timeLeft };
                        broadcastState(next);
                        if (timeLeft <= 0) {
                            clearInterval(window.voteTimer);
                            processVotingResult(next);
                        }
                        return next;
                    });
                }, 1000);
            };

            const processVotingResult = (state) => {
                // 가장 표를 많이 받은 사람 찾기
                const counts = {};
                Object.values(state.votes).forEach(target => {
                    counts[target] = (counts[target] || 0) + 1;
                });
                
                let maxVotes = 0;
                let targetId = null;
                for (const [id, count] of Object.entries(counts)) {
                    if (count > maxVotes) {
                        maxVotes = count;
                        targetId = id;
                    }
                }

                if (!targetId) targetId = state.players[0].id; // 투표 아무도 안한 경우 랜덤(첫번째)

                state.phase = 'suspense';
                state.suspenseTargetId = targetId;
                const targetPlayer = state.players.find(p => p.id === targetId);
                state.resultMessage = `"${targetPlayer.name}"님은...`;
                broadcastState(state);

                // 3초 후 결과 발표
                setTimeout(() => {
                    setGameState(prev => {
                        const next = { ...prev };
                        if (targetId === next.liarId) {
                            next.resultMessage = "라이어입니다!";
                            next.phase = 'guess'; // 라이어 맞추기 단계
                        } else {
                            next.resultMessage = "라이어가 아닙니다!\n[라이어 승리]";
                            next.phase = 'result';
                            setTimeout(() => resetToLobby(next), 5000);
                        }
                        broadcastState(next);
                        return next;
                    });
                }, 3000);
            };

            const resetToLobby = (state) => {
                state.phase = 'lobby';
                state.turnIndex = 0;
                state.logs = [];
                state.votes = {};
                state.suspenseTargetId = null;
                state.liarId = null;
                state.citizenWord = '';
                broadcastState(state, {}); // private data 초기화
            };

            // 방 만들기
            const createRoom = () => {
                if (!nickname) return alert("닉네임을 입력하세요.");
                const code = generateRoomCode();
                const newPeer = new Peer(code);
                
                newPeer.on('open', (id) => {
                    setMyId(id);
                    setIsHost(true);
                    setPeer(newPeer);
                    
                    const hostPlayer = {
                        id,
                        name: nickname,
                        avatar: ANIMAL_IMAGES[0]
                    };

                    setGameState(prev => ({
                        ...prev,
                        phase: 'lobby',
                        players: [hostPlayer]
                    }));
                });

                newPeer.on('connection', (conn) => {
                    conn.on('data', (data) => {
                        if (data.type === 'JOIN') {
                            setGameState(prev => {
                                const newPlayers = [...prev.players, {
                                    id: conn.peer,
                                    name: data.name,
                                    avatar: ANIMAL_IMAGES[prev.players.length % ANIMAL_IMAGES.length]
                                }];
                                const newState = { ...prev, players: newPlayers };
                                connectionsRef.current[conn.peer] = conn;
                                broadcastState(newState);
                                return newState;
                            });
                        } else if (data.type === 'ACTION') {
                            handleClientAction(data.action, conn.peer);
                        }
                    });
                });
            };

            // 방 참여하기
            const joinRoom = () => {
                if (!nickname || !roomCodeInput) return alert("닉네임과 방 코드를 입력하세요.");
                const newPeer = new Peer();
                
                newPeer.on('open', (id) => {
                    setMyId(id);
                    setPeer(newPeer);
                    
                    const conn = newPeer.connect(roomCodeInput.toUpperCase());
                    hostConnectionRef.current = conn;

                    conn.on('open', () => {
                        conn.send({ type: 'JOIN', name: nickname });
                    });

                    conn.on('data', (data) => {
                        if (data.type === 'STATE_UPDATE') {
                            setGameState(data.state);
                            if (data.private) {
                                setMyWordInfo(data.private);
                            }
                        }
                    });
                });
            };

            // 클라이언트: 액션 전송
            const sendAction = (action) => {
                if (isHost) {
                    handleClientAction(action, myId);
                } else if (hostConnectionRef.current) {
                    hostConnectionRef.current.send({ type: 'ACTION', action });
                }
            };

            // 방장: 게임 시작
            const startGame = () => {
                if (gameState.players.length < 2) return alert("최소 2명이 필요합니다.");

                const topics = Object.keys(GAME_WORDS);
                const randomTopic = topics[Math.floor(Math.random() * topics.length)];
                const wordPairs = GAME_WORDS[randomTopic];
                const pair = wordPairs[Math.floor(Math.random() * wordPairs.length)];
                
                // 랜덤하게 단어 배정 (0번이 시민단어, 1번이 라이어단어)
                const isFirstCitizen = Math.random() > 0.5;
                const citizenWord = isFirstCitizen ? pair[0] : pair[1];
                const liarWord = isFirstCitizen ? pair[1] : pair[0];

                const liarIndex = Math.floor(Math.random() * gameState.players.length);
                const liarId = gameState.players[liarIndex].id;

                const privateData = {};
                gameState.players.forEach((p, idx) => {
                    const isLiar = p.id === liarId;
                    privateData[p.id] = {
                        word: isLiar ? liarWord : citizenWord,
                        isLiar: isLiar,
                        topic: randomTopic
                    };
                    
                    // 방장 본인의 정보 세팅
                    if (p.id === myId) setMyWordInfo(privateData[p.id]);
                });

                const newState = {
                    ...gameState,
                    phase: 'playing',
                    topic: randomTopic,
                    turnIndex: 0,
                    logs: [],
                    votes: {},
                    liarId: liarId,
                    citizenWord: citizenWord
                };

                broadcastState(newState, privateData);
            };

            const handleTextSubmit = (e) => {
                if (e.key === 'Enter' && inputText.trim()) {
                    sendAction({ type: 'CHAT_SUBMIT', text: inputText });
                    setInputText('');
                }
            };

            const handleVote = (targetId) => {
                if (gameState.phase !== 'voting' || gameState.votes[myId]) return;
                sendAction({ type: 'VOTE', targetId });
            };

            const handleLiarGuess = (e) => {
                if (e.key === 'Enter' && inputText.trim()) {
                    sendAction({ type: 'LIAR_GUESS', guess: inputText });
                    setInputText('');
                }
            };

            // 랜더링: 로그인/메인 화면
            if (gameState.phase === 'login') {
                return (
                    <div className="fixed inset-0 spotlight-bg font-serif flex flex-col items-center justify-center text-white">
                        <div className="absolute top-1/4">
                            <h1 className="text-6xl font-black text-blood neon-red tracking-widest border-b border-blood pb-4">
                                LIAR'S HOME
                            </h1>
                        </div>
                        
                        <div className="glass-panel p-10 w-96 flex flex-col gap-6 mt-20">
                            <input 
                                type="text" 
                                placeholder="닉네임 (NICKNAME)" 
                                className="w-full bg-transparent border-b border-gray-600 p-2 text-center text-white text-xl uppercase placeholder-gray-600 focus:border-blood transition-colors"
                                value={nickname}
                                onChange={e => setNickname(e.target.value)}
                            />
                            
                            <button onClick={createRoom} className="w-full bg-blood bg-opacity-20 hover:bg-opacity-50 border border-blood py-3 text-lg tracking-widest transition-all">
                                방 만들기 (CREATE)
                            </button>

                            <div className="flex gap-2">
                                <input 
                                    type="text" 
                                    placeholder="방 코드 (CODE)" 
                                    maxLength={5}
                                    className="w-2/3 bg-transparent border-b border-gray-600 p-2 text-center text-white uppercase placeholder-gray-600 focus:border-white transition-colors"
                                    value={roomCodeInput}
                                    onChange={e => setRoomCodeInput(e.target.value)}
                                />
                                <button onClick={joinRoom} className="w-1/3 bg-white text-black border border-white hover:bg-gray-300 font-bold transition-all">
                                    참여
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            // 랜더링: 게임 UI (방, 플레이, 투표, 결과)
            const activePlayer = gameState.players[gameState.turnIndex];
            const isMyTurn = activePlayer && activePlayer.id === myId;
            const totalPlayers = gameState.players.length;

            return (
                <div className="fixed inset-0 spotlight-bg font-serif text-white">
                    {/* 상단 정보 */}
                    <div className="absolute top-4 left-4 text-gray-400 text-sm flex flex-col gap-1 z-10">
                        <div className="text-blood font-bold tracking-widest">ROOM: {myId === gameState.players[0].id ? myId : (roomCodeInput || '연결됨')}</div>
                        <div>플레이어: {nickname}</div>
                        {gameState.phase !== 'lobby' && (
                            <div className="mt-4 border border-gray-700 p-3 glass-panel">
                                <div className="text-xs text-gray-500 mb-1">주제 (TOPIC)</div>
                                <div className="text-xl font-bold">{gameState.topic}</div>
                                <div className="text-xs text-gray-500 mt-2 mb-1">당신의 단어 (WORD)</div>
                                <div className="text-2xl text-blood neon-red">{myWordInfo.word}</div>
                                {gameState.mode === 'knowing' && myWordInfo.isLiar && (
                                    <div className="text-sm text-blood mt-2 animate-pulse font-bold">"당신은 라이어입니다."</div>
                                )}
                            </div>
                        )}
                        {gameState.phase !== 'lobby' && (
                            <div className="mt-4 text-xs text-gray-500 animate-pulse">
                                [TAB] 키를 눌러 기록 확인
                            </div>
                        )}
                    </div>

                    {/* 대기방 중앙 패널 */}
                    {gameState.phase === 'lobby' && (
                        <div className="absolute inset-0 flex items-center justify-center z-10 pointer-events-none">
                            <div className="glass-panel p-8 w-[500px] text-center pointer-events-auto">
                                <h2 className="text-3xl text-blood neon-red mb-6 border-b border-gray-800 pb-2">대기 중</h2>
                                
                                {isHost ? (
                                    <div className="flex flex-col gap-4">
                                        <div className="flex gap-4 mb-4">
                                            <button 
                                                className={`flex-1 py-2 border ${gameState.mode === 'basic' ? 'bg-white text-black border-white' : 'border-gray-600 text-gray-400'}`}
                                                onClick={() => setGameState(p => ({...p, mode: 'basic'}))}
                                            >
                                                기본 모드
                                            </button>
                                            <button 
                                                className={`flex-1 py-2 border ${gameState.mode === 'knowing' ? 'bg-blood text-white border-blood' : 'border-gray-600 text-gray-400'}`}
                                                onClick={() => setGameState(p => ({...p, mode: 'knowing'}))}
                                            >
                                                KNOWING 모드
                                            </button>
                                        </div>
                                        <p className="text-sm text-gray-400 h-16">
                                            {gameState.mode === 'basic' 
                                                ? "라이어가 자신이 라이어인지 모르고 시작하는 기본 게임입니다. 주어지는 단어의 차이를 눈치채야 합니다." 
                                                : "라이어는 자신이 라이어임을 알고 시작합니다. 다른 사람들의 설명을 듣고 정답을 유추하여 속이세요."}
                                        </p>
                                        <button onClick={startGame} className="w-full bg-blood py-4 text-xl font-bold tracking-widest hover:bg-bloodLight transition-colors">
                                            게임 시작
                                        </button>
                                    </div>
                                ) : (
                                    <div className="text-gray-400 text-lg">
                                        방장이 설정을 마치고 게임을 시작할 때까지 기다려주세요...
                                        <p className="text-sm mt-4 text-blood">현재 모드: {gameState.mode === 'basic' ? '기본' : 'KNOWING'}</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* 원탁 플레이어 배치 (원형 배치 수학적 계산) */}
                    <div className="absolute inset-0 flex items-center justify-center">
                        <div className="relative w-[600px] h-[600px]">
                            {gameState.players.map((p, index) => {
                                // 0도를 맨 아래(본인쪽)로 하기 위한 각도 계산
                                const angle = (index / totalPlayers) * Math.PI * 2 + Math.PI / 2;
                                const radius = 250;
                                const x = Math.cos(angle) * radius;
                                const y = Math.sin(angle) * radius;

                                const isActive = gameState.phase === 'playing' && index === gameState.turnIndex;
                                const isVoted = gameState.phase === 'voting' && gameState.votes[myId] === p.id;

                                return (
                                    <div 
                                        key={p.id}
                                        className="absolute transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center gap-2"
                                        style={{ left: `calc(50% + ${x}px)`, top: `calc(50% + ${y}px)` }}
                                    >
                                        <div 
                                            className={`w-24 h-24 border border-gray-800 bg-black overflow-hidden avatar-box ${isActive ? 'active' : ''} ${isVoted ? 'voted' : ''} ${gameState.phase === 'voting' && !gameState.votes[myId] ? 'cursor-pointer hover:border-white' : ''}`}
                                            onClick={() => handleVote(p.id)}
                                        >
                                            <img src={p.avatar} alt="avatar" className="w-full h-full object-cover opacity-80" />
                                        </div>
                                        <div className={`text-sm tracking-wider px-2 py-1 bg-black bg-opacity-70 border ${isActive ? 'text-blood border-blood' : 'text-gray-400 border-gray-800'}`}>
                                            {p.name}
                                        </div>
                                        
                                        {/* 투표 현황 표시 (투표 단계 종료 후) */}
                                        {gameState.phase === 'voting' && Object.values(gameState.votes).includes(p.id) && (
                                            <div className="absolute -top-6 text-blood font-bold">
                                                {Object.values(gameState.votes).filter(id => id === p.id).length} 표
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {/* 플레이 단계 중앙 입력 UI */}
                    {gameState.phase === 'playing' && (
                        <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 z-20 text-center">
                            {isMyTurn ? (
                                <div className="glass-panel p-6 w-96 animate-fade-in">
                                    <div className="text-sm text-gray-400 mb-2">당신의 차례입니다. 단어를 설명하세요.</div>
                                    <input 
                                        autoFocus
                                        type="text" 
                                        className="w-full bg-transparent border-b border-blood p-2 text-center text-white text-lg focus:border-bloodLight transition-colors"
                                        value={inputText}
                                        onChange={e => setInputText(e.target.value)}
                                        onKeyDown={handleTextSubmit}
                                        placeholder="설명 입력 후 Enter"
                                    />
                                </div>
                            ) : (
                                <div className="text-gray-500 text-lg tracking-widest text-glow">
                                    {activePlayer?.name}님이 설명 중입니다...
                                </div>
                            )}
                        </div>
                    )}

                    {/* 투표 단계 UI */}
                    {gameState.phase === 'voting' && (
                        <div className="absolute top-1/4 left-1/2 transform -translate-x-1/2 text-center z-20 w-full">
                            <h2 className="text-4xl text-blood neon-red font-bold mb-4 tracking-widest">투표 시간</h2>
                            <p className="text-gray-300 text-lg">가장 의심스러운 사람의 이미지를 클릭하세요.</p>
                            <div className="text-3xl text-white mt-4">{gameState.timeLeft}s</div>
                        </div>
                    )}

                    {/* 결과/서스펜스 오버레이 */}
                    {(gameState.phase === 'suspense' || gameState.phase === 'result') && (
                        <div className="fixed inset-0 bg-black bg-opacity-90 flex items-center justify-center z-50 transition-opacity duration-1000">
                            <div className="text-center">
                                <h1 className="text-5xl md:text-7xl font-bold text-white tracking-widest leading-loose whitespace-pre-line animate-pulse">
                                    {gameState.resultMessage}
                                </h1>
                            </div>
                        </div>
                    )}

                    {/* 라이어 정답 맞추기 단계 */}
                    {gameState.phase === 'guess' && (
                        <div className="fixed inset-0 bg-black bg-opacity-95 flex items-center justify-center z-50">
                            {myId === gameState.liarId ? (
                                <div className="glass-panel p-10 text-center w-full max-w-lg border-blood border-2">
                                    <h2 className="text-3xl text-blood mb-6 font-bold">당신은 라이어입니다!</h2>
                                    <p className="text-gray-300 mb-8">다른 사람들의 단어는 무엇이었을까요?</p>
                                    <input 
                                        autoFocus
                                        type="text" 
                                        className="w-full bg-transparent border-b-2 border-white p-3 text-center text-white text-2xl"
                                        value={inputText}
                                        onChange={e => setInputText(e.target.value)}
                                        onKeyDown={handleLiarGuess}
                                        placeholder="정답 입력 후 Enter"
                                    />
                                </div>
                            ) : (
                                <div className="text-3xl text-gray-500 tracking-widest">
                                    라이어가 정답을 추론 중입니다...
                                </div>
                            )}
                        </div>
                    )}

                    {/* TAB 로그 오버레이 */}
                    <div className={`fixed inset-0 flex items-center justify-center z-40 log-overlay ${showLogs ? 'show' : ''}`}>
                        <div className="glass-panel w-3/4 h-3/4 max-w-3xl p-8 flex flex-col">
                            <h2 className="text-2xl text-blood border-b border-gray-800 pb-4 mb-4 font-bold tracking-widest">기록 (LOG)</h2>
                            <div className="flex-1 overflow-y-auto flex flex-col gap-4 pr-4">
                                {gameState.logs.length === 0 && <div className="text-gray-600 text-center mt-10">아직 기록이 없습니다.</div>}
                                {gameState.logs.map((log, i) => (
                                    <div key={i} className="flex flex-col border-l-2 border-gray-700 pl-4 py-1">
                                        <span className="text-xs text-gray-500 mb-1">{log.name}</span>
                                        <span className="text-lg text-gray-200">{log.text}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
