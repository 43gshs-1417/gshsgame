<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>심연의 바다</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: 'Malgun Gothic', sans-serif;
        }
        canvas {
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: rgba(255, 255, 255, 0.7);
            text-align: center;
            z-index: 10;
        }
        #title {
            font-size: 2rem;
            letter-spacing: 10px;
            margin-bottom: 20px;
            opacity: 0;
            transition: opacity 3s ease-in-out;
        }
        #instructions {
            font-size: 1rem;
            letter-spacing: 2px;
            opacity: 0;
            transition: opacity 3s ease-in-out;
        }
        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.5rem;
            letter-spacing: 5px;
            color: #fff;
            opacity: 0;
            transition: opacity 4s ease-in-out;
            z-index: 20;
        }
        #shutdown-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            opacity: 0;
            pointer-events: none;
            z-index: 100;
            transition: opacity 3s ease-in-out;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div id="title">망망대해</div>
        <div id="instructions">화면을 클릭하여 시작<br><br>SPACE : 낚싯줄 던지기 / 당기기</div>
    </div>
    <div id="game-over">빛은 꺼졌다.</div>
    <div id="shutdown-overlay"></div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let time = 0;
        let fishingState = 'idle'; 
        let castProgress = 0;
        let fishTimer = 0;
        let hasFish = false;
        let gameState = 'intro'; 
        let gameTimer = 0;
        let sharkProgress = 0;

        // Audio Context
        let audioCtx;
        let ambientOsc;
        let masterGain;

        const EVENT_LANTERN_FLICKER = 30000;
        const EVENT_LANTERN_DEAD = 35000;
        const EVENT_SHARK_ATTACK = 38000;

        const waves = [
            { speed: 0.0008, amp: 15, freq: 0.003, color: '#0a0a0a', baseOffset: 0.55 },
            { speed: 0.0012, amp: 20, freq: 0.004, color: '#111111', baseOffset: 0.60 },
            { speed: 0.0018, amp: 28, freq: 0.005, color: '#000000', baseOffset: 0.65 }
        ];

        const particles = [];
        for (let i = 0; i < 150; i++) {
            particles.push({
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight,
                size: Math.random() * 3 + 1,
                speedX: (Math.random() - 0.5) * 0.5 - 0.5,
                speedY: (Math.random() - 0.5) * 0.2,
                opacity: Math.random() * 0.3
            });
        }

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.gain.setValueAtTime(0, audioCtx.currentTime);
            masterGain.gain.linearRampToValueAtTime(0.4, audioCtx.currentTime + 3);
            masterGain.connect(audioCtx.destination);

            // Deep Ambient Drone
            const osc = audioCtx.createOscillator();
            const lowGain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(55, audioCtx.currentTime); // A1 note
            lowGain.gain.value = 0.3;
            osc.connect(lowGain);
            lowGain.connect(masterGain);
            osc.start();

            // Wind/Wave Noise
            const bufferSize = 2 * audioCtx.sampleRate;
            const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                output[i] = Math.random() * 2 - 1;
            }
            const whiteNoise = audioCtx.createBufferSource();
            whiteNoise.buffer = noiseBuffer;
            whiteNoise.loop = true;
            const noiseFilter = audioCtx.createBiquadFilter();
            noiseFilter.type = 'lowpass';
            noiseFilter.frequency.setValueAtTime(100, audioCtx.currentTime);
            const noiseGain = audioCtx.createGain();
            noiseGain.gain.value = 0.2;
            whiteNoise.connect(noiseFilter);
            noiseFilter.connect(noiseGain);
            noiseGain.connect(masterGain);
            whiteNoise.start();

            // LFO for filter movement
            const lfo = audioCtx.createOscillator();
            lfo.frequency.value = 0.1;
            const lfoGain = audioCtx.createGain();
            lfoGain.gain.value = 50;
            lfo.connect(lfoGain);
            lfoGain.connect(noiseFilter.frequency);
            lfo.start();
        }

        function playSound(freq, type, duration, vol) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            g.gain.setValueAtTime(vol, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(g);
            g.connect(masterGain);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        window.addEventListener('mousedown', () => {
            if (gameState === 'intro') {
                initAudio();
                startIntro();
            }
        });

        window.addEventListener('keydown', (e) => {
            if (gameState === 'intro') {
                initAudio();
                startIntro();
                return;
            }
            if (e.code === 'Space' && gameState === 'playing') {
                if (fishingState === 'idle') {
                    fishingState = 'casting';
                    castProgress = 0;
                    hasFish = false;
                    playSound(400, 'sine', 0.5, 0.1); // Whoosh
                } else if (fishingState === 'waiting' || fishingState === 'biting') {
                    hasFish = (fishingState === 'biting');
                    fishingState = 'reeling';
                    if (hasFish) playSound(600, 'square', 0.2, 0.05); // Splash
                }
            }
        });

        function startIntro() {
            gameState = 'transitioning';
            document.getElementById('instructions').style.opacity = 0;
            setTimeout(() => {
                document.getElementById('title').innerText = "망망대해";
                document.getElementById('title').style.opacity = 1;
                document.getElementById('instructions').innerHTML = "SPACE : 낚싯줄 던지기 / 당기기<br><br><span style='font-size: 0.8rem; color: #888;'>그저 가라앉는 시간</span>";
                setTimeout(() => { document.getElementById('instructions').style.opacity = 1; }, 1500);
                setTimeout(() => {
                    document.getElementById('title').style.opacity = 0;
                    document.getElementById('instructions').style.opacity = 0;
                    gameState = 'playing';
                }, 6000);
            }, 1000);
        }

        function drawBackground() {
            let grad = ctx.createLinearGradient(0, 0, 0, height);
            grad.addColorStop(0, '#050505');
            grad.addColorStop(1, '#1a1a1a');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, width, height);
        }

        function drawParticles() {
            ctx.save();
            particles.forEach(p => {
                p.x += p.speedX;
                p.y += p.speedY;
                if (p.x < -10) p.x = width + 10;
                if (p.y < 0 || p.y > height) p.speedY *= -1;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${p.opacity})`;
                ctx.fill();
            });
            ctx.restore();
        }

        function drawWaveLayer(waveIndex) {
            const wave = waves[waveIndex];
            ctx.beginPath();
            ctx.moveTo(0, height);
            let baseY = height * wave.baseOffset;
            for (let x = 0; x <= width; x += 10) {
                let y = baseY + Math.sin(x * wave.freq + time * wave.speed) * wave.amp;
                y += Math.sin(x * wave.freq * 2.5 + time * wave.speed * 1.5) * (wave.amp * 0.3);
                ctx.lineTo(x, y);
            }
            ctx.lineTo(width, height);
            ctx.fillStyle = wave.color;
            ctx.fill();
        }

        function getWaveY(x) {
            const mainWave = waves[2];
            const baseY = height * mainWave.baseOffset;
            return baseY + Math.sin(x * mainWave.freq + time * mainWave.speed) * mainWave.amp + 
                   Math.sin(x * mainWave.freq * 2.5 + time * mainWave.speed * 1.5) * (mainWave.amp * 0.3);
        }

        function drawBoatAndCharacter(boatX) {
            const boatY = getWaveY(boatX);
            const nextY = getWaveY(boatX + 5);
            const boatAngle = Math.atan2(nextY - boatY, 5);

            ctx.save();
            ctx.translate(boatX, boatY);
            ctx.rotate(boatAngle);

            let lanternGlowOpacity = 1;
            let isLanternOn = true;

            if (gameTimer > EVENT_LANTERN_FLICKER && gameTimer < EVENT_LANTERN_DEAD) {
                lanternGlowOpacity = Math.random() > 0.3 ? (Math.random() * 0.5 + 0.3) : 0;
                if (lanternGlowOpacity === 0 && Math.random() > 0.8) playSound(2000, 'sawtooth', 0.05, 0.01); // Spark noise
            } else if (gameTimer >= EVENT_LANTERN_DEAD) {
                isLanternOn = false;
            }

            if (isLanternOn) {
                ctx.save();
                let gX = 40, gY = -50;
                let pulse = Math.sin(time * 0.005) * 20; 
                let grad = ctx.createRadialGradient(gX, gY, 0, gX, gY, 250 + pulse);
                grad.addColorStop(0, `rgba(255, 200, 100, ${0.4 * lanternGlowOpacity})`);
                grad.addColorStop(0.3, `rgba(255, 120, 0, ${0.15 * lanternGlowOpacity})`);
                grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
                ctx.globalCompositeOperation = 'screen';
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(gX, gY, 250 + pulse, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }

            ctx.fillStyle = '#000';
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(-60, -10);
            ctx.bezierCurveTo(-40, 20, 40, 20, 70, -15);
            ctx.lineTo(60, -18);
            ctx.lineTo(-55, -15);
            ctx.fill();

            ctx.beginPath();
            ctx.moveTo(50, -15);
            ctx.bezierCurveTo(60, -40, 50, -50, 40, -50);
            ctx.stroke();

            if (isLanternOn) {
                ctx.fillStyle = `rgba(255, ${150 + Math.random()*50}, 50, ${lanternGlowOpacity})`;
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#ffaa00';
            } else {
                ctx.fillStyle = '#000';
            }
            ctx.beginPath();
            ctx.arc(40, -47, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.moveTo(-10, -15);
            ctx.quadraticCurveTo(-20, -35, -5, -45);
            ctx.lineTo(-1, -45);
            ctx.quadraticCurveTo(-10, -30, -5, -15);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(-15, -45);
            ctx.lineTo(5, -45);
            ctx.lineTo(-3, -55);
            ctx.fill();

            let rowCycle = time * 0.002;
            let oarAngle = Math.sin(rowCycle) * 0.6;
            ctx.beginPath();
            ctx.moveTo(-5, -35);
            let handX = 5 + Math.cos(oarAngle) * 15;
            let handY = -25 + Math.sin(oarAngle) * 10;
            ctx.lineTo(handX, handY);
            ctx.stroke();
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(handX - Math.cos(oarAngle) * 30, handY - Math.sin(oarAngle) * 30);
            ctx.lineTo(handX + Math.cos(oarAngle) * 40, handY + Math.sin(oarAngle) * 40);
            ctx.stroke();

            if (fishingState !== 'idle') {
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(-5, -35);
                ctx.lineTo(30, -60);
                ctx.stroke();

                let rodTipX = 30, rodTipY = -60;
                let maxCastX = 150;
                let waterY = getWaveY(boatX + maxCastX) - boatY;
                let p = castProgress;
                let bobberX = rodTipX + (maxCastX - rodTipX) * p;
                let baseBobberY = rodTipY + (waterY - rodTipY) * p;
                let arc = Math.sin(p * Math.PI) * 50; 
                let bobberY = baseBobberY - arc;

                if (fishingState === 'biting') {
                    bobberY += Math.sin(time * 0.05) * 3;
                    bobberX += Math.cos(time * 0.03) * 1;
                } else if (fishingState === 'waiting') {
                    bobberY += Math.sin(time * 0.005) * 2;
                }

                ctx.lineWidth = 0.5;
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.beginPath();
                ctx.moveTo(rodTipX, rodTipY);
                let sag = 10;
                if (fishingState === 'casting' || fishingState === 'reeling') sag = arc * 0.3;
                else if (fishingState === 'biting') sag = Math.sin(time * 0.05) * 5;
                if (hasFish && fishingState === 'reeling') sag = 20;
                ctx.quadraticCurveTo(rodTipX + (bobberX - rodTipX)/2, rodTipY + (bobberY - rodTipY)/2 + sag, bobberX, bobberY);
                ctx.stroke();
                
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(bobberX, bobberY, 2, 0, Math.PI * 2);
                ctx.fill();

                if (hasFish && fishingState === 'reeling') {
                    ctx.save();
                    ctx.translate(bobberX, bobberY + 10);
                    ctx.rotate(Math.sin(time * 0.03) * 0.5);
                    ctx.fillStyle = '#000';
                    ctx.beginPath();
                    ctx.ellipse(0, 0, 4, 8, 0, 0, Math.PI * 2);
                    ctx.moveTo(0, 8);
                    ctx.lineTo(-4, 14);
                    ctx.lineTo(4, 14);
                    ctx.fill();
                    ctx.restore();
                }
            }
            ctx.restore();
        }

        function drawVignette() {
            let grad = ctx.createRadialGradient(width/2, height/2, height * 0.2, width/2, height/2, height);
            grad.addColorStop(0, 'rgba(0,0,0,0)');
            grad.addColorStop(1, 'rgba(0,0,0,0.95)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, width, height);
        }

        function drawSharkAttack() {
            if (gameState !== 'shark_attack') return;
            sharkProgress += 0.015;
            if (sharkProgress > 1) {
                sharkProgress = 1;
                if (gameState !== 'game_over') {
                    gameState = 'game_over';
                    if (masterGain) masterGain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 2);
                    setTimeout(() => { document.getElementById('game-over').style.opacity = 1; }, 1000);
                    setTimeout(() => {
                        document.getElementById('game-over').style.opacity = 0;
                        document.getElementById('shutdown-overlay').style.opacity = 1;
                    }, 5000);
                    setTimeout(() => {
                        document.body.innerHTML = '';
                        document.body.style.backgroundColor = '#000';
                        try { window.close(); } catch(e) {}
                    }, 8500);
                }
            }
            ctx.fillStyle = '#000';
            const jawHeight = (height / 2 + 100) * sharkProgress;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            for(let i=0; i<=10; i++) {
                let x = (width / 10) * i;
                let y = jawHeight - (i % 2 === 0 ? 0 : 100);
                ctx.lineTo(x, y);
            }
            ctx.lineTo(width, 0); ctx.fill();
            ctx.beginPath();
            ctx.moveTo(0, height);
            for(let i=0; i<=10; i++) {
                let x = (width / 10) * i;
                let y = height - jawHeight + (i % 2 === 0 ? 0 : 100);
                ctx.lineTo(x, y);
            }
            ctx.lineTo(width, height); ctx.fill();
        }

        let lastTime = 0;
        function animate(timestamp) {
            let deltaTime = timestamp - lastTime;
            lastTime = timestamp;
            if (deltaTime > 50) deltaTime = 16;
            time += deltaTime;
            
            if (gameState === 'playing') {
                gameTimer += deltaTime;
                if (fishingState === 'casting') {
                    castProgress += deltaTime * 0.0015;
                    if (castProgress >= 1) { castProgress = 1; fishingState = 'waiting'; fishTimer = Math.random() * 3000 + 2000; }
                } else if (fishingState === 'waiting') {
                    fishTimer -= deltaTime;
                    if (fishTimer <= 0) {
                        if (Math.random() > 0.3) { fishingState = 'biting'; fishTimer = 2500; playSound(300, 'sine', 0.1, 0.02); }
                        else { fishTimer = Math.random() * 3000 + 2000; }
                    }
                } else if (fishingState === 'biting') {
                    fishTimer -= deltaTime;
                    if (fishTimer <= 0) { fishingState = 'waiting'; fishTimer = Math.random() * 3000 + 2000; }
                } else if (fishingState === 'reeling') {
                    castProgress -= deltaTime * 0.002;
                    if (castProgress <= 0) { castProgress = 0; fishingState = 'idle'; hasFish = false; }
                }
            }

            if (gameTimer >= EVENT_SHARK_ATTACK && gameState === 'playing') {
                gameState = 'shark_attack';
                playSound(60, 'sawtooth', 2, 0.2); // Low growl
            }

            ctx.clearRect(0, 0, width, height);
            drawBackground();
            drawParticles();
            drawWaveLayer(0);
            drawWaveLayer(1);
            if (gameState !== 'game_over') drawBoatAndCharacter(width * 0.4);
            drawWaveLayer(2);
            drawVignette();
            drawSharkAttack();
            requestAnimationFrame(animate);
        }

        requestAnimationFrame(animate);
    </script>
</body>
</html>
