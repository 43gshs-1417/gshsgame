        :root {
            --bg-color: #08040d;
            --surface-color: #12091c;
            --text-main: #ffffff;
            --text-dim: #554d66;
            --neon-cyan: #00f0ff;

        * {

            padding: 0;
            user-select: none;

        body {

            color: var(--text-main);
            font-family: 'Pretendard', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .eng-font { font-family: 'Syncopate', sans-serif; }
        .mono-font { font-family: 'JetBrains Mono', monospace; }
        .hidden { display: none !important; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-5px) rotate(-1deg); }
            40% { transform: translateX(5px) rotate(1deg); }
            60% { transform: translateX(-3px); }
            80% { transform: translateX(3px); }
        }
        .shake-effect { animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both; }

        @keyframes pulse-glow {
            0% { text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan); transform: scale(1); }
            50% { text-shadow: 0 0 20px var(--neon-cyan), 0 0 40px var(--neon-cyan); transform: scale(1.02); }
            100% { text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan); transform: scale(1); }
        }
        .attack-glow { animation: pulse-glow 0.4s ease-out; }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(8, 4, 13, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.5s ease;
        }

        .overlay h1 {
            font-size: 4rem;
            letter-spacing: 0.5rem;
            margin-bottom: 30px;
            text-shadow: 3px 3px 0 var(--neon-magenta), -3px -3px 0 var(--neon-cyan);
        }

        .track-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 80%;

            max-height: 60vh;
            overflow-y: auto;
            padding: 20px;
        }
        
        .track-list::-webkit-scrollbar { width: 0; }

        .track-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .track-card::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 240, 255, 0.1), transparent);
            transition: all 0.5s ease;

        .track-card:hover::before { left: 100%; }

    <script>
        // Web Audio API 및 비트 제너레이터
        let audioCtx;
        let beatTimer;
        let nextNoteTime = 0;
        let current16thNote = 0;
        let currentBpm = 90;

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'hit') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.05);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'miss') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(80, now + 0.2);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.start(now); osc.stop(now + 0.2);
            } else if (type === 'attack') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(100, now);
                osc.frequency.exponentialRampToValueAtTime(40, now + 0.4);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                osc.start(now); osc.stop(now + 0.4);
            }
        }

        function scheduleNote(beatNumber, time) {
            if (beatNumber % 8 === 0 || beatNumber === 10) {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.setValueAtTime(120, time);
                osc.frequency.exponentialRampToValueAtTime(0.01, time + 0.5);
                gain.gain.setValueAtTime(0.4, time);
                gain.gain.exponentialRampToValueAtTime(0.01, time + 0.5);
                osc.start(time); osc.stop(time + 0.5);
            }
            if (beatNumber % 8 === 4) {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(250, time);
                gain.gain.setValueAtTime(0.2, time);
                gain.gain.exponentialRampToValueAtTime(0.01, time + 0.2);
                osc.start(time); osc.stop(time + 0.2);
            }
            if (beatNumber % 2 === 0) {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'square';
                osc.frequency.setValueAtTime(8000, time);
                gain.gain.setValueAtTime(0.03, time);
                gain.gain.exponentialRampToValueAtTime(0.01, time + 0.05);
                osc.start(time); osc.stop(time + 0.05);
            }
        }

        function nextNote() {
            const secondsPerBeat = 60.0 / currentBpm;
            nextNoteTime += 0.25 * secondsPerBeat;
            current16thNote++;
            if (current16thNote === 16) current16thNote = 0;
        }

        function playBeatLoop() {
            while (nextNoteTime < audioCtx.currentTime + 0.1) {
                scheduleNote(current16thNote, nextNoteTime);
                nextNote();
            }
            beatTimer = requestAnimationFrame(playBeatLoop);
        }

        function startBeat(bpm) {
            if (!audioCtx) initAudio();
            currentBpm = bpm || 90;
            if (beatTimer) cancelAnimationFrame(beatTimer);
            current16thNote = 0;
            nextNoteTime = audioCtx.currentTime + 0.05;
            playBeatLoop();
        }

        function stopBeat() {
            if (beatTimer) cancelAnimationFrame(beatTimer);

                id: "outsider", title: "외톨이", artist: "Outsider", difficulty: "★★★★★", aiMaxHp: 1000, bpm: 140,
                phrases: [
                    { text: "상처를 치료해줄 사람 어디 없나", timeLimit: 8000 },
                    { text: "가만히 놔두다간 끊임없이 덧나", timeLimit: 8000 },
                    { text: "사랑도 사람도 너무나도 겁나", timeLimit: 8000 },
                    { text: "혼자인게 무서워 난 잊혀질까 두려워", timeLimit: 9000 },
                    { text: "언제나 외톨이 맘의 문을 닫고", timeLimit: 8000 },
                    { text: "슬픔을 등을 지고 살아가는 바보", timeLimit: 8000 },
                    { text: "두 눈을 감고 두 귀를 막고", timeLimit: 7500 },
                    { text: "캄캄한 어둠 속에 내 자신을 가두고", timeLimit: 9000 },
                    { text: "얼마나 지나야 이 어둠이 걷힐까", timeLimit: 8500 },
                    { text: "상처가 아물어 다시 웃을 수 있을까", timeLimit: 9000 }
                ]
            }
        ];

        // -------------------------
        // 한글 -> 영문 키 분해기 (Jamo Decomposer)
        // -------------------------
        const CHOSUNG = ['r', 'R', 's', 'e', 'E', 'f', 'a', 'q', 'Q', 't', 'T', 'd', 'w', 'W', 'c', 'z', 'x', 'v', 'g'];
        const JUNGSUNG = ['k', 'o', 'i', 'O', 'j', 'p', 'u', 'P', 'h', 'hk', 'ho', 'hl', 'y', 'n', 'nj', 'np', 'nl', 'b', 'm', 'ml', 'l'];
        const JONGSUNG = ['', 'r', 'R', 'rt', 's', 'sw', 'sg', 'e', 'f', 'fr', 'fa', 'fq', 'ft', 'fx', 'fv', 'fg', 'a', 'q', 'qt', 't', 'T', 'd', 'w', 'c', 'z', 'x', 'v', 'g'];

        // 키보드 Code -> 물리 키 매핑 (IME 독립적)
        const codeToKey = {
            'KeyQ':'q', 'KeyW':'w', 'KeyE':'e', 'KeyR':'r', 'KeyT':'t', 'KeyY':'y', 'KeyU':'u', 'KeyI':'i', 'KeyO':'o', 'KeyP':'p',
            'KeyA':'a', 'KeyS':'s', 'KeyD':'d', 'KeyF':'f', 'KeyG':'g', 'KeyH':'h', 'KeyJ':'j', 'KeyK':'k', 'KeyL':'l',
            'KeyZ':'z', 'KeyX':'x', 'KeyC':'c', 'KeyV':'v', 'KeyB':'b', 'KeyN':'n', 'KeyM':'m',
            'Space':' ', 'Comma':',', 'Period':'.', 'Slash':'/', 'Minus':'-', 'Quote':"'", 'Digit1':'1', 'Digit2':'2'
        };

        function decomposeText(text) {
            let keys = [];
            let charMap = [];

            for (let i = 0; i < text.length; i++) {
                let char = text[i];
                let code = char.charCodeAt(0);

                if (code >= 0xAC00 && code <= 0xD7A3) { // 한글 완성형
                    let index = code - 0xAC00;
                    let cho = Math.floor(index / 588);
                    let jung = Math.floor((index - cho * 588) / 28);
                    let jong = index % 28;

                    keys.push(CHOSUNG[cho]); charMap.push(i);
                    
                    let jungStr = JUNGSUNG[jung];
                    for(let j=0; j<jungStr.length; j++) {
                        keys.push(jungStr[j]); charMap.push(i);
                    }

                    if (jong > 0) {
                        let jongStr = JONGSUNG[jong];
                        for(let j=0; j<jongStr.length; j++) {
                            keys.push(jongStr[j]); charMap.push(i);
                        }
                    }
                } else {
                    keys.push(char); charMap.push(i); // 영어, 공백 등
                }
            }
            return { keys, charMap };
        }

        // 게임 상태
        let currentTrack = null;
        let currentPhraseIndex = 0;
        let playerMaxHp = 100;
        let playerHp = 100;
        let aiMaxHp = 100;
        let aiHp = 100;
        
        let targetText = "";
        let currentPhraseData = null;
        let currentKeyIndex = 0; // 타건 진행 위치

        let turnTimer = null;
        let timeLeft = 0;
        let turnStartTime = 0;
        let isPlayerTurn = false;
        let isErrorState = false;
        let errorTimeout = null;

        let currentCombo = 0;
        let maxCombo = 0;
        let mistakes = 0;
        let totalStats = { hits: 0, misses: 0, damageDealt: 0 };

        // DOM 요소
        const elPlayerHpFill = document.getElementById('player-hp-fill');
        const elPlayerHpText = document.getElementById('player-hp-text');
        const elAiHpFill = document.getElementById('ai-hp-fill');
        const elAiHpText = document.getElementById('ai-hp-text');
        const elAiName = document.getElementById('ai-name');
        const elStageDisplay = document.getElementById('stage-display');
        
        const elTurnIndicator = document.getElementById('turn-indicator');
        const elRapDisplay = document.getElementById('rap-display');
        const elTimerFill = document.getElementById('timer-fill');
        const elJudgement = document.getElementById('judgement');
        
        const elComboVal = document.getElementById('combo-val');
        const elAccVal = document.getElementById('acc-val');
        const elCpmVal = document.getElementById('cpm-val');

        function initMenu() {
            const container = document.getElementById('track-list-container');
            container.innerHTML = '';
            
            tracks.forEach(track => {
                const card = document.createElement('div');
                card.className = 'track-card';
                card.onclick = () => selectTrack(track.id);
                
                card.innerHTML = `
                    <div class="track-info">
                        <span class="track-title">${track.title}</span>
                        <span class="track-artist eng-font">${track.artist}</span>
                    </div>
                    <div class="track-diff">${track.difficulty}</div>
                `;
                container.appendChild(card);
            });
        }
        initMenu();

        function backToMenu() {
            stopBeat();
            document.getElementById('end-screen').classList.add('hidden');
            document.getElementById('track-select-screen').classList.remove('hidden');
        }

        function selectTrack(trackId) {
            initAudio();
            currentTrack = tracks.find(t => t.id === trackId);
            
            document.getElementById('track-select-screen').classList.add('hidden');
            
            currentPhraseIndex = 0;
            playerHp = playerMaxHp;
            aiMaxHp = currentTrack.aiMaxHp;
            aiHp = aiMaxHp;
            totalStats = { hits: 0, misses: 0, damageDealt: 0 };

            elAiName.innerText = currentTrack.artist;
            elStageDisplay.innerText = currentTrack.title;
            
            updateHUD();
            startBeat(currentTrack.bpm);
            setTimeout(startTurn, 1000);
        }

        function updateHUD() {
            elPlayerHpFill.style.width = `${Math.max(0, (playerHp / playerMaxHp) * 100)}%`;
            elPlayerHpText.innerText = Math.max(0, Math.floor(playerHp));
            
            elAiHpFill.style.width = `${Math.max(0, (aiHp / aiMaxHp) * 100)}%`;
            elAiHpText.innerText = Math.max(0, Math.floor(aiHp));
        }

        function updateStatsUI(combo, acc, cpm) {
            elComboVal.innerText = combo;
            elAccVal.innerText = `${acc}%`;
            elCpmVal.innerText = cpm;
            
            if(combo > 15) elComboVal.style.color = 'var(--neon-magenta)';
            else if(combo > 5) elComboVal.style.color = 'var(--neon-cyan)';
            else elComboVal.style.color = 'var(--neon-yellow)';
        }

        function startTurn() {
            if (currentPhraseIndex >= currentTrack.phrases.length) {
                currentPhraseIndex = 0; 
            }

            isPlayerTurn = false;
            elTimerFill.style.width = '100%';
            elTimerFill.style.backgroundColor = 'var(--text-main)';
            
            const phraseData = currentTrack.phrases[currentPhraseIndex];
            targetText = phraseData.text;
            
            elTurnIndicator.innerText = `${currentTrack.artist} SPITTING...`;
            elTurnIndicator.style.color = "var(--neon-magenta)";
            elTurnIndicator.style.opacity = 1;
            
            updateStatsUI(0, 100, 0);

            elRapDisplay.innerHTML = '';
            const words = targetText.split(' ');
            
            let html = '';
            words.forEach((w, i) => {
                html += `<div class="word-group" id="ai-word-${i}" style="opacity:0; transform:translateY(10px); margin:0 8px; transition:all 0.2s cubic-bezier(.17,.89,.32,1.28);">`;
                html += `<span>${w}</span></div>`;
            });
            elRapDisplay.innerHTML = html;

            let baseDelay = Math.min(150, phraseData.timeLimit / words.length * 0.3);
            let delay = 0;
            
            words.forEach((w, i) => {
                setTimeout(() => {
                    const el = document.getElementById(`ai-word-${i}`);
                    if(el) {
                        el.style.opacity = 1;
                        el.style.transform = 'translateY(0)';
                        playSound('hit');
                    }
                }, delay);
                delay += baseDelay;
            });

            setTimeout(() => {
                startPlayerTurn(phraseData.timeLimit);
            }, delay + 400);
        }

        function startPlayerTurn(timeLimit) {
            isPlayerTurn = true;
            elTurnIndicator.innerText = "PLAYER TURN // TYPE NOW";
            elTurnIndicator.style.color = "var(--neon-cyan)";
            
            currentPhraseData = decomposeText(targetText);
            currentKeyIndex = 0;
            currentCombo = 0;
            maxCombo = 0;
            mistakes = 0;
            turnStartTime = Date.now();
            isErrorState = false;
            
            renderPlayerText();
            
            timeLeft = timeLimit;
            clearInterval(turnTimer);
            let lastTick = Date.now();
            
            turnTimer = setInterval(() => {
                let now = Date.now();
                timeLeft -= (now - lastTick);
                lastTick = now;
                
                let pct = (timeLeft / timeLimit) * 100;
                elTimerFill.style.width = `${Math.max(0, pct)}%`;
                
                if(pct < 30) elTimerFill.style.backgroundColor = 'var(--neon-magenta)';
                
                if (timeLeft <= 0) {
                    clearInterval(turnTimer);
                    finishPlayerTurn(false);
                }
            }, 16);
        }

        // 새로운 물리 키보드 리스너 (IME 완벽 무시)
        document.addEventListener('keydown', (e) => {
            if (!isPlayerTurn) return;
            if (e.repeat) return; // 꾹 누름 방지
            
            // 키 코드 매핑 가져오기
            let typedCodeKey = codeToKey[e.code];
            if (!typedCodeKey) return; // Shift, Ctrl 등 특수키 무시

            // 쌍자음, 이중모음을 위해 Shift키 상태 반영
            if (e.shiftKey) {
                typedCodeKey = typedCodeKey.toUpperCase();
            }

            let expectedKey = currentPhraseData.keys[currentKeyIndex];

            // 매칭 검사
            let match = false;
            if (expectedKey === expectedKey.toUpperCase() && expectedKey !== expectedKey.toLowerCase()) {
                // 대문자(쌍자음 등) 검사
                if (typedCodeKey === expectedKey) match = true;
            } else {
                // 소문자 및 영문 대소문자 무시 검사
                if (typedCodeKey.toLowerCase() === expectedKey.toLowerCase()) match = true;
            }

            if (match) {
                // 정확하게 입력됨!
                currentKeyIndex++;
                playSound('hit');
                currentCombo++;
                totalStats.hits++;
                maxCombo = Math.max(maxCombo, currentCombo);
                
                renderPlayerText();

                let acc = Math.max(0, 100 - (mistakes * 5));
                let timeElapsed = (Date.now() - turnStartTime) / 60000;
                let cpm = Math.floor(currentKeyIndex / timeElapsed) || 0;
                updateStatsUI(currentCombo, acc, cpm);

                if (currentKeyIndex >= currentPhraseData.keys.length) {
                    clearInterval(turnTimer);
                    finishPlayerTurn(true);
                }
            } else {
                // 오타 발생!
                currentCombo = 0;
                mistakes++;
                totalStats.misses++;
                playSound('miss');
                
                document.body.classList.add('shake-effect');
                setTimeout(() => document.body.classList.remove('shake-effect'), 300);

                isErrorState = true;
                renderPlayerText();
                
                clearTimeout(errorTimeout);
                errorTimeout = setTimeout(() => {
                    isErrorState = false;
                    renderPlayerText();
                }, 200); // 0.2초간 에러 표시 후 원복

                let acc = Math.max(0, 100 - (mistakes * 5));
                let timeElapsed = (Date.now() - turnStartTime) / 60000;
                let cpm = Math.floor(currentKeyIndex / timeElapsed) || 0;
                updateStatsUI(currentCombo, acc, cpm);
            }
        });

        // 타건 상태에 따른 UI 렌더링 (자음/모음 단위 진행도 반영)
        function renderPlayerText() {
            let html = '';
            // 현재 입력중인 글자 인덱스 확인
            let activeCharIndex = currentKeyIndex < currentPhraseData.charMap.length ? currentPhraseData.charMap[currentKeyIndex] : 9999;

            let words = targetText.split(' ');
            let charCounter = 0;

            words.forEach((word, wIdx) => {
                html += `<div class="word-group">`;
                for (let i = 0; i < word.length; i++) {
                    let tChar = word[i];
                    let cClass = 'char dim';
                    
                    if (charCounter < activeCharIndex) cClass = 'char correct';
                    else if (charCounter === activeCharIndex) {
                        if (isErrorState) cClass = 'char error';
                        else cClass = 'char active'; // 현재 타이핑 중인 글자
                    }
                    
                    html += `<span class="${cClass}">${tChar}</span>`;
                    charCounter++;
                }
                html += `</div>`;
                
                if (wIdx < words.length - 1) {
                    let sClass = 'char space';
                    if (charCounter < activeCharIndex) sClass += ' correct';
                    else if (charCounter === activeCharIndex) {
                        if (isErrorState) sClass += ' error';
                        else sClass += ' active';
                    }
                    html += `<span class="${sClass}">&nbsp;</span>`;
                    charCounter++;
                }
            });
            elRapDisplay.innerHTML = html;
        }

        function finishPlayerTurn(success) {
            isPlayerTurn = false;
            elTurnIndicator.style.opacity = 0;

            if (success) {
                let acc = Math.max(0, 100 - (mistakes * 5));
                let timeElapsed = (Date.now() - turnStartTime) / 60000;
                let cpm = Math.floor(currentPhraseData.keys.length / timeElapsed) || 0;

                let speedMult = cpm > 600 ? 1.5 : (cpm > 400 ? 1.2 : 1.0);
                let comboMult = 1 + (maxCombo / currentPhraseData.keys.length) * 0.5;
                
                let baseDmg = targetText.length * 2.5; 
                let damage = Math.floor(baseDmg * (acc / 100) * speedMult * comboMult);
                totalStats.damageDealt += damage;

                let rank = acc === 100 ? "PERFECT" : (acc > 85 ? "GREAT" : "GOOD");
                let color = acc === 100 ? "var(--neon-cyan)" : (acc > 85 ? "var(--neon-yellow)" : "#fff");
                
                showJudgement(rank, color);
                applyDamage('ai', damage);
            } else {
                showJudgement("TIME OUT", "var(--neon-magenta)");
                let damage = 20;
                applyDamage('player', damage);
            }
        }

        function showJudgement(text, color) {
            elJudgement.innerText = text;
            elJudgement.style.color = color;
            elJudgement.style.opacity = 1;
            elJudgement.style.transform = "translate(-50%, -50%) scale(1)";
            
            setTimeout(() => {
                elJudgement.style.opacity = 0;
                elJudgement.style.transform = "translate(-50%, -50%) scale(0.5)";
            }, 800);
        }

        function applyDamage(target, amount) {
            playSound('attack');
            
            if (target === 'ai') {
                aiHp -= amount;
                elRapDisplay.classList.add('attack-glow');
                setTimeout(() => elRapDisplay.classList.remove('attack-glow'), 400);
            } else {
                playerHp -= amount;
                document.body.classList.add('shake-effect');
                document.body.style.backgroundColor = 'rgba(255,0,85,0.2)';
                setTimeout(() => {
                    document.body.classList.remove('shake-effect');
                    document.body.style.backgroundColor = '';
                }, 400);
            }

            updateHUD();

            setTimeout(() => {
                if (playerHp <= 0) {
                    endGame(false);
                } else if (aiHp <= 0) {
                    endGame(true);
                } else {
                    currentPhraseIndex++;
                    startTurn(); 
                }
            }, 1200);
        }

        function endGame(isVictory) {
            stopBeat();
            const screen = document.getElementById('end-screen');
            const title = document.getElementById('end-title');
            const desc = document.getElementById('end-desc');
            const stats = document.getElementById('end-stats');
            
            screen.classList.remove('hidden');
            
            let totalAcc = totalStats.hits + totalStats.misses === 0 ? 0 : 
                           Math.round((totalStats.hits / (totalStats.hits + totalStats.misses)) * 100);

            stats.innerHTML = `
                <div>DMG: ${totalStats.damageDealt}</div>
                <div>ACC: ${totalAcc}%</div>
            `;

            if (isVictory) {
                title.innerText = "TRACK CLEAR";
                title.style.color = "var(--neon-cyan)";
                desc.innerText = `${currentTrack.artist}의 비트를 완벽히 제압했습니다.`;
            } else {
                title.innerText = "SYSTEM DOWN";
                title.style.color = "var(--neon-magenta)";
                desc.innerText = "비트를 놓쳤습니다. 다시 도전하세요.";
            }
        }
    </script>
</body>
</html>
