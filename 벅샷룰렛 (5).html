<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Buckshot Roulette - Perfect Edition</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM (UMD) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @keyframes shake {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      20% { transform: translate(-8px, 4px) rotate(-2deg); }
      40% { transform: translate(8px, -4px) rotate(2deg); }
      60% { transform: translate(-8px, -4px) rotate(-2deg); }
      80% { transform: translate(8px, 4px) rotate(2deg); }
    }
    @keyframes itemPopup {
      0% { transform: scale(0); opacity: 0; }
      20% { transform: scale(1.5); opacity: 1; }
      80% { transform: scale(1.5); opacity: 1; }
      100% { transform: scale(0); opacity: 0; }
    }
    @keyframes breathe {
      0%, 100% { transform: scale(1) translateY(0); }
      50% { transform: scale(1.02) translateY(-5px); }
    }
    .anim-shake { animation: shake 0.4s ease-in-out; }
    .anim-item-popup { animation: itemPopup 1.2s forwards; }
    .clown-breathe { animation: breathe 3s infinite ease-in-out; }
    .table-perspective { perspective: 1000px; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-[#050505] text-[#e5e5e5] h-[100dvh] w-full overflow-hidden selection:bg-red-900">
  
  <div id="root" class="h-full w-full"></div>

  <script type="text/babel" data-type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const { useState, useEffect, useRef } = React;

    // === 아이콘 SVG 컴포넌트 ===
    const SearchIcon = ({ size, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>;
    const CoffeeIcon = ({ size, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/><line x1="9" y1="2" x2="9" y2="4"/><line x1="15" y1="2" x2="15" y2="4"/></svg>;
    const HeartIcon = ({ size, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>;
    const ScissorsIcon = ({ size, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={`rotate-90 ${className}`}><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><line x1="20" y1="4" x2="8.12" y2="15.88"/><line x1="14.47" y1="14.48" x2="20" y2="20"/><line x1="8.12" y1="8.12" x2="12" y2="12"/></svg>;
    const ZapIcon = ({ size, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>;
    const CrosshairIcon = ({ size, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="22" y1="12" x2="18" y2="12"/><line x1="6" y1="12" x2="2" y2="12"/><line x1="12" y1="6" x2="12" y2="2"/><line x1="12" y1="22" x2="12" y2="18"/></svg>;
    const ShieldAlertIcon = ({ size, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>;
    const TrophyIcon = ({ size, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 1.1-.9 2-2 2H6.5"/><path d="M14 14.66V17c0 1.1.9 2 2 2h1.5"/><path d="M18 2H6v7c0 3.31 2.69 6 6 6s6-2.69 6-6V2Z"/></svg>;
    const LockIcon = ({ size, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>;
    const InfoIcon = ({ size, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>;

    // === 아이템 정의 ===
    const ITEM_DICT = {
      glass: { name: '스캐너', icon: <SearchIcon size={18} />, desc: '약실에 장전된 다음 탄을 몰래 확인합니다.', color: 'text-blue-400' },
      beer: { name: '음료수', icon: <CoffeeIcon size={18} />, desc: '약실의 탄을 하나 빼냅니다.', color: 'text-yellow-400' },
      cig: { name: '담배', icon: <HeartIcon size={18} />, desc: '체력을 1 회복합니다 (체력이 1일 땐 무효).', color: 'text-green-400' },
      saw: { name: '톱', icon: <ScissorsIcon size={18} />, desc: '이번 샷건의 데미지를 2로 만듭니다.', color: 'text-red-500' },
      adr: { name: '아드레날린', icon: <ZapIcon size={18} />, desc: '상대의 무작위 아이템 1개를 즉시 빼앗아 옵니다.', color: 'text-purple-400' }
    };

    // 스테이지별 설정
    const STAGE_CONFIG = {
      1: { maxHp: 3, itemsPerRound: 0, maxItems: 0, shellsRange: [2, 4] },
      2: { maxHp: 4, itemsPerRound: 2, maxItems: 3, shellsRange: [3, 5] },
      3: { maxHp: 5, itemsPerRound: 4, maxItems: 4, shellsRange: [4, 5] }
    };

    // 로컬 환경 예외 처리용 Firebase 설정
    const hasFirebase = typeof __firebase_config !== 'undefined';
    let app, auth, db, appId;
    if (hasFirebase) {
      const firebaseConfig = JSON.parse(__firebase_config);
      app = initializeApp(firebaseConfig);
      auth = getAuth(app);
      db = getFirestore(app);
      appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
    }

    const shuffleArray = (array) => {
      let newArr = [...array];
      for (let i = newArr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
      }
      return newArr;
    };

    const getRandomItemType = () => {
      const rand = Math.random() * 100;
      if (rand < 15) return 'cig'; 
      if (rand < 30) return 'adr'; 
      
      const others = ['glass', 'beer', 'saw'];
      return others[Math.floor(Math.random() * others.length)];
    };

    function App() {
      const [user, setUser] = useState(null);
      const [gameState, setGameState] = useState('menu'); 
      const [difficulty, setDifficulty] = useState('legend'); 
      const [stage, setStage] = useState(1);
      
      const [playerHp, setPlayerHp] = useState(3);
      const [dealerHp, setDealerHp] = useState(3);
      
      const [playerItems, setPlayerItems] = useState([]);
      const [dealerItems, setDealerItems] = useState([]);
      
      const [shells, setShells] = useState([]);
      const [turn, setTurn] = useState('player'); 
      const [logs, setLogs] = useState([]);
      
      const [actionInProgress, setActionInProgress] = useState(false);
      const [doubleDamage, setDoubleDamage] = useState(false);
      const [dealerKnows, setDealerKnows] = useState(false); 
      
      const [animState, setAnimState] = useState(null);
      const [activeItem, setActiveItem] = useState(null);

      const [unlockedIncredible, setUnlockedIncredible] = useState(false);
      const [hallOfFame, setHallOfFame] = useState([]);
      const [playerNameInput, setPlayerNameInput] = useState('');
      const [showHoF, setShowHoF] = useState(false);
      const [showRules, setShowRules] = useState(false);

      const logEndRef = useRef(null);
      
      const stateRef = useRef({ shells, turn, playerHp, dealerHp, playerItems, dealerItems, doubleDamage, stage, dealerKnows, difficulty });
      useEffect(() => {
        stateRef.current = { shells, turn, playerHp, dealerHp, playerItems, dealerItems, doubleDamage, stage, dealerKnows, difficulty };
      });

      // === 1. Firebase 로그인 초기화 ===
      useEffect(() => {
        if (!hasFirebase) return;
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
          } catch (err) {
            console.error("Auth init Error:", err);
          }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, setUser);
        return () => unsubscribe();
      }, []);

      // === 2. Firebase 데이터 실시간 구독 ===
      useEffect(() => {
        if (!hasFirebase || !user) return;

        const publicHoFRef = doc(db, 'artifacts', appId, 'public', 'data', 'hallOfFame', 'global');
        const unsubHoF = onSnapshot(publicHoFRef, (docSnap) => {
          if (docSnap.exists()) {
            setHallOfFame(docSnap.data().records || []);
          }
        }, (err) => console.error("HoF Fetch Error:", err));

        const privateStateRef = doc(db, 'artifacts', appId, 'users', user.uid, 'progress', 'state');
        const unsubProgress = onSnapshot(privateStateRef, (docSnap) => {
          if (docSnap.exists()) {
            setUnlockedIncredible(docSnap.data().unlockedIncredible || false);
          }
        }, (err) => console.error("Progress Fetch Error:", err));

        return () => {
          unsubHoF();
          unsubProgress();
        };
      }, [user]);

      useEffect(() => {
        logEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [logs]);

      // ★ 딜러 AI 로직
      useEffect(() => {
        if (gameState !== 'playing' || turn !== 'dealer' || actionInProgress || playerHp <= 0 || dealerHp <= 0) return;
        if (stateRef.current.shells.length === 0) return;

        let delay = 1000;
        if (stateRef.current.difficulty === 'incredible') delay = Math.floor(Math.random() * 200) + 400; 
        else if (stateRef.current.difficulty === 'legend') delay = Math.floor(Math.random() * 300) + 600; 
        else if (stateRef.current.difficulty === 'expert') delay = Math.floor(Math.random() * 400) + 700; 
        else delay = Math.floor(Math.random() * 600) + 1200; 

        const timer = setTimeout(() => {
          const { dealerItems, playerItems, shells, doubleDamage, dealerHp, dealerKnows, difficulty, stage, playerHp: php } = stateRef.current;
          const liveCount = shells.filter(s => s === 'live').length;
          const blankCount = shells.length - liveCount;
          const nextShell = shells[0]; 
          
          const maxHp = STAGE_CONFIG[stage].maxHp;
          
          let cheatLive = false;
          let cheatBlank = false;
          if (['expert', 'legend', 'incredible'].includes(difficulty) && !dealerKnows && liveCount > 0 && blankCount > 0) {
              let cheatProb = 0.5;
              if (difficulty === 'legend') cheatProb = 0.65;
              if (difficulty === 'incredible') cheatProb = 1.0;
              
              if (Math.random() < cheatProb) { 
                  cheatLive = (nextShell === 'live');
                  cheatBlank = (nextShell === 'blank');
              }
          }
          
          const isNextLiveCertain = (dealerKnows && nextShell === 'live') || (blankCount === 0 && liveCount > 0) || cheatLive;
          const isNextBlankCertain = (dealerKnows && nextShell === 'blank') || (liveCount === 0 && blankCount > 0) || cheatBlank;

          if (dealerItems.filter(Boolean).length > 0) {
            const adrIdx = dealerItems.findIndex(i => i && i.type === 'adr');
            const cigIdx = dealerItems.findIndex(i => i && i.type === 'cig');
            const glassIdx = dealerItems.findIndex(i => i && i.type === 'glass');
            const sawIdx = dealerItems.findIndex(i => i && i.type === 'saw');
            const beerIdx = dealerItems.findIndex(i => i && i.type === 'beer');

            if (difficulty === 'legend' || difficulty === 'incredible') {
              if (cigIdx !== -1 && dealerHp > 1 && dealerHp < maxHp) { handleItemUse(cigIdx, false); return; }
              if (adrIdx !== -1 && playerItems.filter(Boolean).length > 0) { handleItemUse(adrIdx, false); return; }
              if (doubleDamage && isNextBlankCertain && beerIdx !== -1) { handleItemUse(beerIdx, false); return; }
              if (!isNextLiveCertain && !isNextBlankCertain && glassIdx !== -1 && liveCount > 0 && blankCount > 0) { handleItemUse(glassIdx, false); return; }
              
              let intendedTarget = isNextLiveCertain ? 'player' : (isNextBlankCertain ? 'dealer' : (liveCount >= blankCount ? 'player' : 'dealer'));
              if (intendedTarget === 'player' && sawIdx !== -1 && !doubleDamage && php > 1) { handleItemUse(sawIdx, false); return; }
              if (beerIdx !== -1 && !isNextLiveCertain) { handleItemUse(beerIdx, false); return; }
            }
            else if (difficulty === 'expert') {
              if (cigIdx !== -1 && dealerHp > 1 && dealerHp < maxHp) { handleItemUse(cigIdx, false); return; }
              if (adrIdx !== -1 && playerItems.filter(Boolean).length > 0) { handleItemUse(adrIdx, false); return; }
              if (doubleDamage && isNextBlankCertain && beerIdx !== -1) { handleItemUse(beerIdx, false); return; }
              if (!isNextLiveCertain && !isNextBlankCertain && glassIdx !== -1 && liveCount > 0 && blankCount > 0) { handleItemUse(glassIdx, false); return; }
              if (!doubleDamage && sawIdx !== -1 && php > 1 && isNextLiveCertain) { handleItemUse(sawIdx, false); return; }
              if (!doubleDamage && sawIdx !== -1 && php > 1 && !isNextLiveCertain && !isNextBlankCertain && liveCount > blankCount) { handleItemUse(sawIdx, false); return; }
              if (!isNextLiveCertain && !isNextBlankCertain && beerIdx !== -1 && blankCount >= liveCount && blankCount > 0) { handleItemUse(beerIdx, false); return; }
            }
            else if (difficulty === 'hard') {
              if (cigIdx !== -1 && dealerHp > 1 && dealerHp < maxHp) { handleItemUse(cigIdx, false); return; }
              if (adrIdx !== -1 && playerItems.filter(Boolean).length > 0 && Math.random() < 0.8) { handleItemUse(adrIdx, false); return; }
              if (!dealerKnows && glassIdx !== -1 && liveCount > 0 && blankCount > 0 && Math.random() < 0.8) { handleItemUse(glassIdx, false); return; }
              if (!doubleDamage && sawIdx !== -1 && isNextLiveCertain) { handleItemUse(sawIdx, false); return; }
              if (beerIdx !== -1) {
                 if (isNextBlankCertain && Math.random() < 0.5) { handleItemUse(beerIdx, false); return; }
                 if (!dealerKnows && blankCount > liveCount && Math.random() < 0.6) { handleItemUse(beerIdx, false); return; }
              }
            }
          }

          let target = 'player';
          if (isNextLiveCertain) target = 'player'; 
          else if (isNextBlankCertain) target = 'dealer'; 
          else target = liveCount >= blankCount ? 'player' : 'dealer'; 

          handleShoot(target, 'dealer');
        }, delay); 

        return () => clearTimeout(timer);
      }, [turn, actionInProgress, gameState, playerHp, dealerHp]);

      const addLog = (msg) => setLogs(prev => [...prev, msg]);

      const startGame = (selectedDifficulty) => {
        setDifficulty(selectedDifficulty);
        setStage(1);
        startStage(1, selectedDifficulty);
      };

      const nextStage = () => {
        const next = stage + 1;
        setStage(next);
        startStage(next, difficulty);
      };

      const startStage = (newStage, diff) => {
        const max = STAGE_CONFIG[newStage].maxHp;
        
        setPlayerHp(max);
        setDealerHp(max);
        setPlayerItems([]);
        setDealerItems([]);
        setLogs([]);
        setTurn('player');
        setActionInProgress(true); 
        setDoubleDamage(false);
        setDealerKnows(false); 
        setGameState('playing'); 
        
        addLog(`\n================================`);
        addLog(`🔥 [STAGE ${newStage} 시작 - ${diff.toUpperCase()} MODE] 🔥`);
        if (STAGE_CONFIG[newStage].maxItems > 0) {
          addLog(`최대 체력: ${max} | 최대 아이템 소지: ${STAGE_CONFIG[newStage].maxItems}개`);
        } else {
          addLog(`최대 체력: ${max} | 1스테이지는 아이템을 사용하지 않습니다.`);
        }
        addLog(`================================\n`);
        
        setTimeout(() => startRound(newStage, [], [], 'player'), 500);
      };

      const startRound = (currentStage, pItems, dItems, nextTurn = 'player') => {
        setActionInProgress(true);
        const config = STAGE_CONFIG[currentStage];
        const [minShells, maxShells] = config.shellsRange;
        const total = Math.floor(Math.random() * (maxShells - minShells + 1)) + minShells;
        const live = Math.floor(Math.random() * (total - 1)) + 1; 
        const blank = total - live;

        let initialShells = [...Array(live).fill('live'), ...Array(blank).fill('blank')];
        let newShells = shuffleArray(initialShells);
        
        setShells(newShells);
        setDoubleDamage(false);
        setDealerKnows(false); 

        const dealItems = (currentItems) => {
            let newItems = [...currentItems].filter(Boolean); 
            let given = 0;
            while(newItems.length < config.maxItems && given < config.itemsPerRound) {
                newItems.push({ type: getRandomItemType(), revealed: false, id: Math.random().toString() });
                given++;
            }
            
            newItems.forEach(item => { item.revealed = false; });
            let indices = newItems.map((_, i) => i);
            shuffleArray(indices).slice(0, 2).forEach(idx => {
                if(newItems[idx]) newItems[idx].revealed = true;
            });
            
            while (newItems.length < config.maxItems) {
                newItems.push(null);
            }
            
            return newItems;
        };

        setPlayerItems(dealItems(pItems));
        setDealerItems(dealItems(dItems));

        addLog(`\n--- 광대가 샷건을 장전합니다 ---`);
        addLog(`실탄 ${live}발, 공포탄 ${blank}발`);
        if (config.itemsPerRound > 0) {
          addLog(`양측에 무작위 아이템이 지급되었습니다.`);
          addLog(`서로의 아이템 중 무작위 2개가 공개되었습니다.`);
        }
        
        setTimeout(() => {
          setTurn(nextTurn);
          if(nextTurn === 'dealer') addLog(`⚠️ 직전 턴 이월 규칙에 따라 광대가 선제 공격을 시작합니다!`);
          setActionInProgress(false); 
        }, 2000);
      };

      const triggerAnimation = (anim, duration, callback) => {
        setAnimState(anim);
        setTimeout(() => {
          setAnimState(null);
          if (callback) callback();
        }, duration);
      };

      const handleShoot = (target, shooter) => {
        if (actionInProgress) return;
        setActionInProgress(true); 

        const shooterName = shooter === 'player' ? '당신' : '광대';
        const targetName = target === 'player' ? '당신' : '광대';

        addLog(`🔫 ${shooterName}이(가) ${targetName}을(를) 조준합니다...`);

        setTimeout(() => {
          const currentShells = stateRef.current.shells;
          if (currentShells.length === 0) {
            setActionInProgress(false); return;
          }

          const shell = currentShells[0];
          const remaining = currentShells.slice(1);
          const damage = stateRef.current.doubleDamage ? 2 : 1;
          
          setShells(remaining);
          setDoubleDamage(false);
          setDealerKnows(false); 
          
          let nextPlayerHp = stateRef.current.playerHp;
          let nextDealerHp = stateRef.current.dealerHp;

          if (shell === 'live') {
            const dmgText = damage === 2 ? ' (치명타!)' : '';
            addLog(`💥 [실탄] 탕! ${targetName}이(가) ${damage}의 피해를 입습니다!${dmgText}`);
            triggerAnimation('shake', 400);

            if (target === 'player') {
              nextPlayerHp = Math.max(0, nextPlayerHp - damage);
              setPlayerHp(nextPlayerHp);
            } else {
              nextDealerHp = Math.max(0, nextDealerHp - damage);
              setDealerHp(nextDealerHp);
            }
          } else {
            addLog(`💨 [공포탄] 찰칵. 빈 총소리만 울립니다.`);
          }

          setTimeout(() => {
            if (nextPlayerHp <= 0) {
              addLog('\n💀 당신은 사망했습니다... 광대의 승리입니다.');
              setGameState('gameover');
              setActionInProgress(false); 
              return; 
            } 
            
            if (nextDealerHp <= 0) {
              if (stateRef.current.stage >= 3) {
                addLog('\n🏆 광대가 완전히 쓰러졌습니다! 게임 클리어!');
                setGameState('victory');
                
                if (stateRef.current.difficulty === 'legend') {
                   setUnlockedIncredible(true);
                   if (hasFirebase && user) {
                      const privateStateRef = doc(db, 'artifacts', appId, 'users', user.uid, 'progress', 'state');
                      setDoc(privateStateRef, { unlockedIncredible: true }, { merge: true });
                   }
                }
              } else {
                addLog(`\n🎉 광대가 쓰러집니다... 스테이지 ${stateRef.current.stage} 클리어!`);
                setGameState('stageClear');
              }
              setActionInProgress(false); 
              return; 
            }

            let nextTurn = shooter;
            if (shell === 'live') {
              nextTurn = shooter === 'player' ? 'dealer' : 'player';
            } else {
              if (shooter === target) {
                addLog(`✨ ${shooterName}은(는) 한 번 더 행동할 수 있습니다.`);
                nextTurn = shooter;
              } else {
                nextTurn = shooter === 'player' ? 'dealer' : 'player';
              }
            }

            if (remaining.length === 0) {
              startRound(stateRef.current.stage, stateRef.current.playerItems, stateRef.current.dealerItems, nextTurn);
            } else {
              setTurn(nextTurn);
              setActionInProgress(false); 
            }
          }, 1500);

        }, 1000);
      };

      const handleItemUse = (itemIdx, isPlayer) => {
        if (actionInProgress) return;
        setActionInProgress(true);

        const items = isPlayer ? stateRef.current.playerItems : stateRef.current.dealerItems;
        const itemObj = items[itemIdx];
        if(!itemObj) {
             setActionInProgress(false);
             return;
        }
        const itemName = itemObj.type;
        const userStr = isPlayer ? '당신' : '광대';
        const info = ITEM_DICT[itemName];

        const removeItem = (prevItems) => {
          let newItems = [...prevItems];
          newItems[itemIdx] = null; 
          return newItems;
        };

        if (itemName === 'adr') {
          const targetItems = isPlayer ? stateRef.current.dealerItems : stateRef.current.playerItems;
          const validTargetItems = targetItems.filter(Boolean); 

          if (validTargetItems.length === 0) {
            addLog(`❌ 훔칠 아이템이 없습니다! 아드레날린이 낭비되었습니다.`);
            if (isPlayer) setPlayerItems(removeItem);
            else setDealerItems(removeItem);
            setActionInProgress(false);
            return;
          }

          if (isPlayer) setPlayerItems(removeItem);
          else setDealerItems(removeItem);
          
          setActiveItem(info.icon);

          triggerAnimation('item-use', 1200, () => {
            setActiveItem(null);
            
            const stealableIndices = targetItems.map((v, i) => v !== null ? i : -1).filter(i => i !== -1);
            let stealIdx = stealableIndices[Math.floor(Math.random() * stealableIndices.length)];

            if (!isPlayer) {
              const priority = { 'adr': 1, 'glass': 2, 'saw': 3, 'cig': 4, 'beer': 5 }; 
              let bestScore = 999;
              stealableIndices.forEach(idx => {
                const type = targetItems[idx].type;
                const score = priority[type] || 999;
                if (score < bestScore) {
                  bestScore = score;
                  stealIdx = idx;
                }
              });
            }

            const stolenItem = targetItems[stealIdx];

            if (isPlayer) {
              setDealerItems(prev => {
                  let newPrev = [...prev];
                  newPrev[stealIdx] = null;
                  return newPrev;
              });
              
              setPlayerItems(prev => {
                 let newPrev = [...prev];
                 const emptyIdx = newPrev.findIndex(i => i === null);
                 if(emptyIdx !== -1) newPrev[emptyIdx] = { ...stolenItem, revealed: true };
                 return newPrev;
              });
              addLog(`⚡ 당신은 아드레날린을 투여해 광대의 [${ITEM_DICT[stolenItem.type].name}]을(를) 빼앗았습니다!`);
            } else {
               setPlayerItems(prev => {
                  let newPrev = [...prev];
                  newPrev[stealIdx] = null;
                  return newPrev;
              });
              setDealerItems(prev => {
                 let newPrev = [...prev];
                 const emptyIdx = newPrev.findIndex(i => i === null);
                 if(emptyIdx !== -1) newPrev[emptyIdx] = { ...stolenItem, revealed: true };
                 return newPrev;
              });
              addLog(`⚡ 광대가 아드레날린을 투여해 당신의 [${ITEM_DICT[stolenItem.type].name}]을(를) 빼앗았습니다!`);
            }
            setActionInProgress(false);
          });
          return;
        }

        if (isPlayer) setPlayerItems(removeItem);
        else setDealerItems(removeItem);

        setActiveItem(info.icon);
        addLog(`📦 ${userStr}이(가) [${info.name}]을(를) 사용합니다.`);

        triggerAnimation('item-use', 1200, () => {
          setActiveItem(null);
          const currentShells = stateRef.current.shells;
          const maxHp = STAGE_CONFIG[stateRef.current.stage].maxHp;
          
          if (itemName === 'glass') {
            const nextShell = currentShells[0];
            if (isPlayer) addLog(`🔍 (스캐너: 장전된 다음 탄은 [${nextShell === 'live' ? '실탄' : '공포탄'}] 입니다)`);
            else {
              addLog(`🔍 광대가 스캐너로 약실을 몰래 살핍니다...`);
              setDealerKnows(true); 
            }
            setActionInProgress(false);
          } 
          else if (itemName === 'beer') {
            const ejected = currentShells[0];
            const remaining = currentShells.slice(1);
            setShells(remaining);
            setDealerKnows(false); 
            addLog(`철컥. 빠져나온 탄은 [${ejected === 'live' ? '실탄' : '공포탄'}] 이었습니다.`);

            if (remaining.length === 0) setTimeout(() => startRound(stateRef.current.stage, stateRef.current.playerItems, stateRef.current.dealerItems, turn), 1500);
            else setActionInProgress(false);
          } 
          else if (itemName === 'cig') {
            const currentHp = isPlayer ? stateRef.current.playerHp : stateRef.current.dealerHp;
            if (currentHp <= 1) addLog(`🔌 제세동기 선이 잘려 ${userStr}의 체력이 회복되지 않습니다! (체력 1 무효)`);
            else {
               if (isPlayer) setPlayerHp(p => Math.min(p + 1, maxHp));
               else setDealerHp(d => Math.min(d + 1, maxHp));
               addLog(`💚 담배 연기를 내뿜으며 ${userStr}의 체력이 1 회복되었습니다.`);
            }
            setActionInProgress(false);
          }
          else if (itemName === 'saw') {
            setDoubleDamage(true);
            addLog(`🔪 샷건의 총열을 잘라냈습니다! 다음 사격 데미지 2배.`);
            setActionInProgress(false);
          }
        });
      };

      const handleHoFSubmit = async () => {
        if (!playerNameInput.trim()) return;
        
        const newRecords = [...hallOfFame, playerNameInput.trim()];
        
        if (hasFirebase && user) {
           const publicHoFRef = doc(db, 'artifacts', appId, 'public', 'data', 'hallOfFame', 'global');
           await setDoc(publicHoFRef, { records: newRecords }, { merge: true });
        } else {
           setHallOfFame(newRecords); // 로컬 환경 폴백
        }
        
        setPlayerNameInput('');
        setGameState('menu');
      };

      const getLogColor = (text) => {
        if (text.includes('💥') || text.includes('🔥')) return 'text-red-400 font-bold';
        if (text.includes('💀') || text.includes('🏆') || text.includes('🎉')) return 'text-yellow-400 font-bold text-lg';
        if (text.includes('💨')) return 'text-stone-400';
        if (text.includes('💚')) return 'text-green-400';
        if (text.includes('🔪') || text.includes('⚡')) return 'text-red-500 font-bold';
        if (text.includes('🔌') || text.includes('⚠️')) return 'text-red-600 font-bold';
        if (text.includes('====') || text.includes('---')) return 'text-stone-500';
        if (text.includes('스캐너:')) return 'text-blue-300 font-bold';
        if (text.includes('실탄') && text.includes('공포탄') && text.includes('발')) return 'text-orange-300 font-bold';
        if (text.includes('공개되었습니다') || text.includes('지급되었습니다')) return 'text-purple-300 font-bold';
        return 'text-stone-300';
      };

      const renderHealth = (hp, maxHp, isMini = false) => (
        <div className="flex gap-1">
          {Array.from({ length: maxHp }).map((_, i) => (
            <div key={i} className={`${isMini ? 'w-2.5 h-2.5 sm:w-3.5 sm:h-3.5 border' : 'w-4 h-4 sm:w-6 sm:h-6 border-2'} border-black rounded-sm shadow-inner transition-all duration-300 
              ${i < hp ? 'bg-red-600 shadow-[inset_0_0_8px_rgba(0,0,0,0.8)]' : 'bg-stone-900'} skew-x-6`} />
          ))}
        </div>
      );

      const renderItems = (items, isPlayer, maxItems) => {
        const displayItems = Array.from({ length: maxItems }, (_, i) => items[i] || null);

        return (
          <div className={`flex gap-1.5 sm:gap-2 justify-center flex-wrap`}>
            {displayItems.map((itemObj, i) => {
              if (!itemObj) return <div key={i} className="w-10 h-10 sm:w-12 sm:h-12 bg-black/40 border border-stone-800 rounded opacity-30 shadow-inner"></div>;
              
              const info = ITEM_DICT[itemObj.type];
              const canUse = isPlayer && !actionInProgress && turn === 'player' && gameState === 'playing';
              const isHidden = !isPlayer && !itemObj.revealed;

              return (
                <button
                  key={i}
                  onClick={() => canUse && handleItemUse(i, true)}
                  disabled={!canUse}
                  className={`w-10 h-10 sm:w-12 sm:h-12 bg-stone-900 border border-stone-600 rounded flex justify-center items-center shadow-lg transition-all relative group
                    ${canUse ? 'hover:bg-stone-700 hover:-translate-y-1 cursor-pointer hover:border-stone-400 z-10' : 'opacity-80 cursor-default'} 
                    ${!isHidden ? info.color : 'text-stone-600'}`}
                >
                  {isHidden ? <span className="font-black text-sm sm:text-lg">?</span> : React.cloneElement(info.icon, { className: 'w-5 h-5 sm:w-6 sm:h-6' })}
                  
                  {canUse && !isHidden && (
                     <div className="absolute bottom-full mb-2 hidden group-hover:block w-32 bg-black text-white text-xs p-2 rounded z-50 text-center border border-stone-700">
                        {info.desc}
                     </div>
                  )}
                </button>
              );
            })}
          </div>
        );
      };

      const maxHp = gameState !== 'menu' ? STAGE_CONFIG[stage].maxHp : 3;
      const maxItems = gameState !== 'menu' ? STAGE_CONFIG[stage].maxItems : 3;

      return (
        <div className={`h-full w-full flex flex-col relative font-mono ${animState === 'shake' ? 'anim-shake' : ''}`}>
          
          {/* === 룰 설명 모달 === */}
          {showRules && (
             <div className="fixed inset-0 z-[9999999] flex items-center justify-center bg-black/90 backdrop-blur-md px-4 py-8">
               <div className="bg-stone-900 border-2 border-stone-500 p-5 sm:p-8 rounded-xl w-full max-w-md text-left relative shadow-[0_0_50px_rgba(255,255,255,0.1)] anim-item-popup flex flex-col max-h-full">
                 <button onClick={() => setShowRules(false)} className="absolute top-3 right-4 text-stone-500 hover:text-white text-2xl font-bold">✕</button>
                 <h2 className="text-xl sm:text-2xl font-black text-stone-200 mb-4 flex items-center gap-2 border-b border-stone-700 pb-3 flex-shrink-0"><InfoIcon size={24} /> 게임 규칙</h2>
                 
                 <div className="overflow-y-auto scrollbar-hide pr-2 space-y-5 text-sm sm:text-base text-stone-300 leading-relaxed flex-1">
                   <section>
                     <h3 className="text-red-400 font-bold mb-2">[ 기본 규칙 ]</h3>
                     <ul className="list-disc pl-5 space-y-1.5">
                       <li>딜러(광대)와 번갈아 가며 샷건을 쏩니다.</li>
                       <li>실탄에 맞으면 체력이 감소하며, 공포탄은 무해합니다.</li>
                       <li>자신에게 <span className="text-stone-400 font-bold">공포탄</span>을 쏘면 턴이 넘어가지 않고 <span className="text-yellow-400 font-bold">한 번 더 행동</span>할 수 있습니다.</li>
                       <li>라운드의 마지막 탄환을 자신에게 쏴서 공포탄이 나오면, 다음 라운드 선공을 가져갑니다.</li>
                     </ul>
                   </section>
                   
                   <section>
                     <h3 className="text-blue-400 font-bold mb-2">[ 아이템 효과 ]</h3>
                     <ul className="space-y-3">
                       <li className="flex items-start gap-3"><div className="mt-0.5 flex-shrink-0"><SearchIcon size={18} className="text-blue-400"/></div> <span><strong>스캐너:</strong> 다음 탄환을 몰래 확인합니다.</span></li>
                       <li className="flex items-start gap-3"><div className="mt-0.5 flex-shrink-0"><CoffeeIcon size={18} className="text-yellow-400"/></div> <span><strong>음료수:</strong> 장전된 탄환을 하나 빼냅니다.</span></li>
                       <li className="flex items-start gap-3"><div className="mt-0.5 flex-shrink-0"><ScissorsIcon size={18} className="text-red-500"/></div> <span><strong>톱:</strong> 다음 사격의 데미지를 2로 만듭니다.</span></li>
                       <li className="flex items-start gap-3"><div className="mt-0.5 flex-shrink-0"><HeartIcon size={18} className="text-green-400"/></div> <span><strong>담배:</strong> 체력을 1 회복합니다.</span></li>
                       <li className="flex items-start gap-3"><div className="mt-0.5 flex-shrink-0"><ZapIcon size={18} className="text-purple-400"/></div> <span><strong>아드레날린:</strong> 상대의 무작위 아이템을 훔칩니다.</span></li>
                     </ul>
                   </section>
                 </div>
               </div>
             </div>
          )}

          {/* === 명예의 전당 모달 === */}
          {showHoF && (
             <div className="fixed inset-0 z-[9999999] flex items-center justify-center bg-black/90 backdrop-blur-sm px-4">
               <div className="bg-stone-900 border-2 border-yellow-600 p-6 rounded-xl w-full max-w-sm text-center relative shadow-[0_0_50px_rgba(234,179,8,0.3)]">
                 <button onClick={() => setShowHoF(false)} className="absolute top-3 right-4 text-stone-500 hover:text-white text-xl font-bold">✕</button>
                 <h2 className="text-2xl font-black text-yellow-500 mb-6 flex justify-center items-center gap-2 drop-shadow-[0_0_10px_rgba(234,179,8,0.8)]"><TrophyIcon size={24} /> 명예의 전당</h2>
                 <div className="flex flex-col gap-2 max-h-60 overflow-y-auto scrollbar-hide pr-2">
                   {hallOfFame.length === 0 ? (
                     <p className="text-stone-500 text-sm py-4">아직 신의 경지에 도달한 자가 없습니다.</p>
                   ) : (
                     hallOfFame.map((name, i) => (
                       <div key={i} className="bg-stone-800 px-4 py-3 rounded text-yellow-100 font-bold border border-stone-700 flex justify-between shadow-inner">
                         <span className="text-yellow-600">#{i+1}</span>
                         <span>{name}</span>
                       </div>
                     ))
                   )}
                 </div>
               </div>
             </div>
          )}

          {/* === 룰 설명 모달 === */}
          {showRules && (
             <div className="fixed inset-0 z-[9999999] flex items-center justify-center bg-black/90 backdrop-blur-sm px-4">
               <div className="bg-stone-900 border-2 border-stone-600 p-6 rounded-xl w-full max-w-md text-left relative shadow-[0_0_50px_rgba(255,255,255,0.1)] overflow-y-auto max-h-[80vh] scrollbar-hide">
                 <button onClick={() => setShowRules(false)} className="absolute top-3 right-4 text-stone-500 hover:text-white text-xl font-bold">✕</button>
                 <h2 className="text-2xl font-black text-stone-200 mb-4 flex items-center gap-2 border-b border-stone-700 pb-2"><InfoIcon size={24} /> 게임 규칙</h2>
                 
                 <div className="space-y-4 text-sm sm:text-base text-stone-300 leading-relaxed">
                   <section>
                     <h3 className="text-red-400 font-bold mb-1">[ 기본 규칙 ]</h3>
                     <ul className="list-disc pl-5 space-y-1">
                       <li>딜러(광대)와 번갈아 가며 샷건을 쏩니다.</li>
                       <li>실탄에 맞으면 체력이 감소하며, 공포탄은 무해합니다.</li>
                       <li>자신에게 <span className="text-stone-400 font-bold">공포탄</span>을 쏘면 턴이 넘어가지 않고 <span className="text-yellow-400 font-bold">한 번 더 행동</span>할 수 있습니다.</li>
                       <li>라운드의 마지막 탄환을 자신에게 쏴서 공포탄이 나오면, 다음 라운드에서도 선공을 가져갑니다 (턴 이월).</li>
                     </ul>
                   </section>
                   
                   <section>
                     <h3 className="text-blue-400 font-bold mb-1">[ 아이템 효과 ]</h3>
                     <ul className="space-y-2 mt-2">
                       <li className="flex items-start gap-2"><SearchIcon size={16} className="text-blue-400 mt-1 flex-shrink-0"/> <span><strong>스캐너:</strong> 다음 탄환이 무엇인지 몰래 확인합니다.</span></li>
                       <li className="flex items-start gap-2"><CoffeeIcon size={16} className="text-yellow-400 mt-1 flex-shrink-0"/> <span><strong>음료수:</strong> 현재 장전된 탄환을 하나 빼내어 버립니다.</span></li>
                       <li className="flex items-start gap-2"><ScissorsIcon size={16} className="text-red-500 mt-1 flex-shrink-0"/> <span><strong>톱:</strong> 샷건의 총열을 잘라, 다음 사격의 데미지를 2로 만듭니다.</span></li>
                       <li className="flex items-start gap-2"><HeartIcon size={16} className="text-green-400 mt-1 flex-shrink-0"/> <span><strong>담배:</strong> 체력을 1 회복합니다 (체력이 1일 때는 무효).</span></li>
                       <li className="flex items-start gap-2"><ZapIcon size={16} className="text-purple-400 mt-1 flex-shrink-0"/> <span><strong>아드레날린:</strong> 상대의 무작위 아이템 1개를 훔쳐 즉시 내 빈 슬롯에 넣습니다.</span></li>
                     </ul>
                   </section>
                 </div>
               </div>
             </div>
          )}

          {/* === 메인 메뉴 화면 (게임 UI와 완전히 분리) === */}
          {gameState === 'menu' && (
            <div className="fixed inset-0 z-[999999] bg-[#0a0a0a] overflow-y-auto flex flex-col items-center justify-start sm:justify-center pt-20 sm:pt-4 px-4 pb-12">
              
              {/* 🏆 명예의 전당 버튼 (좌측 상단) */}
              <div className="absolute top-4 left-4 z-[999999]">
                <button onClick={() => setShowHoF(true)} className="flex items-center gap-1.5 sm:gap-2 px-3 py-2 bg-stone-900 border border-yellow-800 text-yellow-600 hover:text-yellow-400 hover:bg-stone-800 rounded transition-all text-xs sm:text-sm shadow-[0_0_10px_rgba(234,179,8,0.2)]">
                  <TrophyIcon size={16} /> 명예의 전당
                </button>
              </div>

              {/* 📖 룰 설명 버튼 (우측 상단) */}
              <div className="absolute top-4 right-4 z-[999999]">
                <button onClick={() => setShowRules(true)} className="flex items-center gap-1.5 sm:gap-2 px-3 py-2 bg-stone-900 border border-stone-700 text-stone-400 hover:text-stone-200 hover:bg-stone-800 rounded transition-all text-xs sm:text-sm shadow-[0_0_10px_rgba(255,255,255,0.1)]">
                  <InfoIcon size={16} /> 룰 설명
                </button>
              </div>

              <h1 className="text-5xl sm:text-6xl md:text-8xl font-black mb-2 text-red-700 tracking-tighter drop-shadow-[0_0_20px_rgba(220,38,38,0.5)]">BUCKSHOT</h1>
              <h2 className="text-2xl sm:text-3xl md:text-5xl font-black mb-8 sm:mb-12 text-stone-500 tracking-widest">ROULETTE</h2>
              
              <div className="flex flex-row gap-3 sm:gap-4 flex-wrap justify-center w-full max-w-2xl">
                <button onClick={() => startGame('hard')} className="flex-1 min-w-[100px] sm:min-w-[140px] px-3 py-3 sm:py-4 bg-stone-800 hover:bg-stone-700 rounded-xl text-sm sm:text-lg font-bold text-white transition-all border-2 border-stone-600 shadow-2xl hover:scale-105 active:scale-95 cursor-pointer flex flex-col items-center">
                  <span>HARD</span>
                  <span className="text-[10px] sm:text-[11px] text-stone-400 mt-1 font-normal">완벽한 카운팅</span>
                </button>
                <button onClick={() => startGame('expert')} className="flex-1 min-w-[100px] sm:min-w-[140px] px-3 py-3 sm:py-4 bg-red-950 hover:bg-red-900 rounded-xl text-sm sm:text-lg font-bold text-white transition-all border-2 border-red-800 shadow-[0_0_15px_rgba(220,38,38,0.3)] hover:scale-105 active:scale-95 cursor-pointer flex flex-col items-center">
                  <span>EXPERT</span>
                  <span className="text-[10px] sm:text-[11px] text-red-400 mt-1 font-normal">50% 미래 예지</span>
                </button>
                <button onClick={() => startGame('legend')} className="flex-1 min-w-[100px] sm:min-w-[140px] px-3 py-3 sm:py-4 bg-yellow-950 hover:bg-yellow-900 rounded-xl text-sm sm:text-lg font-bold text-white transition-all border-2 border-yellow-600 shadow-[0_0_20px_rgba(234,179,8,0.4)] hover:shadow-[0_0_35px_rgba(234,179,8,0.7)] hover:scale-105 active:scale-95 cursor-pointer flex flex-col items-center">
                  <span>LEGEND</span>
                  <span className="text-[10px] sm:text-[11px] text-yellow-400 mt-1 font-normal">80% 미래 예지</span>
                </button>
              </div>
              
              {/* ★ INCREDIBLE 모드 버튼 */}
              <div className="mt-6 sm:mt-8 flex justify-center w-full">
                {unlockedIncredible ? (
                  <button onClick={() => startGame('incredible')} className="flex items-center gap-2 px-6 py-3 bg-black border-2 border-red-800 text-red-600 hover:text-red-400 hover:bg-red-950/50 rounded-xl transition-all text-sm sm:text-lg font-black shadow-[0_0_30px_rgba(220,38,38,0.7)] hover:scale-110 active:scale-95">
                    🔥 INCREDIBLE (100% 예지) 🔥
                  </button>
                ) : (
                  <button disabled className="flex items-center gap-2 px-6 py-3 bg-stone-950 border border-stone-800 text-stone-600 rounded-xl text-xs sm:text-sm font-bold opacity-70 cursor-not-allowed">
                    <LockIcon size={16} className="inline-block mr-1" /> INCREDIBLE (LEGEND 클리어 시 영구 해제)
                  </button>
                )}
              </div>

              <div className="mt-8 sm:mt-12 text-stone-500 text-[10px] sm:text-xs md:text-sm max-w-md text-center leading-relaxed border border-stone-800 p-3 sm:p-4 rounded bg-stone-900/50">
                <p className="mb-2 text-stone-400 font-bold">[ 지옥에 오신 것을 환영합니다 ]</p>
                <p>☠️ **LEGEND**: 광대가 아이템을 쏟아부어 압도적인 킬각을 만들어냅니다.</p>
                <p className="mt-1">⚠️ **턴 이월 규칙**: 마지막 탄을 자신에게 쏴서 공포탄이 나오면 다음 라운드 선공을 가져갑니다.</p>
              </div>
            </div>
          )}

          {/* === 게임 화면 (메뉴가 아닐 때만 렌더링됨) === */}
          {gameState !== 'menu' && (
            <>
              {/* 우측 상단 고정: 광대 미니 대시보드 */}
              {gameState === 'playing' && (
                <div className="fixed top-2 right-2 sm:top-4 sm:right-4 z-50 bg-black/80 px-2 py-2 sm:px-3 sm:py-3 rounded-lg border border-stone-800 shadow-[0_0_15px_rgba(0,0,0,0.8)] flex flex-col items-end pointer-events-none">
                  <span className="text-[9px] sm:text-[10px] font-bold text-red-500 mb-1 tracking-widest">CLOWN HP</span>
                  {renderHealth(dealerHp, maxHp, true)}
                  
                  {maxItems > 0 && dealerItems.some(i => i && i.revealed) && (
                    <>
                      <span className="text-[9px] sm:text-[10px] font-bold text-purple-400 mt-2 sm:mt-3 mb-1 tracking-widest">REVEALED ITEMS</span>
                      <div className="flex gap-1 sm:gap-1.5">
                        {dealerItems.filter(i => i && i.revealed).map((item, idx) => (
                          <div key={idx} className={`w-4 h-4 sm:w-5 sm:h-5 bg-stone-900 border border-stone-600 rounded flex justify-center items-center ${ITEM_DICT[item.type].color}`} title={ITEM_DICT[item.type].name}>
                            {React.cloneElement(ITEM_DICT[item.type].icon, { size: 10 })}
                          </div>
                        ))}
                      </div>
                    </>
                  )}
                </div>
              )}

              {/* 중앙 아이템 팝업 연출 */}
              {animState === 'item-use' && activeItem && (
                 <div className="absolute inset-0 flex justify-center items-center z-40 pointer-events-none">
                    <div className="w-24 h-24 sm:w-32 sm:h-32 bg-stone-900 rounded-full border-4 border-stone-600 flex justify-center items-center shadow-[0_0_50px_rgba(0,0,0,1)] text-white anim-item-popup">
                      {React.cloneElement(activeItem, { size: 48 })}
                    </div>
                 </div>
              )}

              {/* 메인 게임 UI 래퍼 */}
              <div className="flex-1 flex flex-col w-full max-w-2xl mx-auto h-full px-2 sm:px-4 pt-2 sm:pt-4 pb-4 sm:pb-6 min-h-0 table-perspective">
                
                {/* 상단: 광대(딜러) 영역 */}
                <div className="flex-shrink-0 w-full flex flex-col items-center z-10">
                   <div className="flex flex-col items-center clown-breathe relative">
                      <div className={`text-[10px] sm:text-xs font-bold mb-1 px-2 py-0.5 sm:py-1 rounded bg-black/80 border ${turn === 'dealer' ? 'border-red-500 text-red-500' : 'border-stone-800 text-stone-600'}`}>
                        {turn === 'dealer' ? "CLOWN'S TURN" : "WAITING..."}
                      </div>
                      <div className="w-16 h-16 sm:w-24 sm:h-24 bg-[#e5e5e5] rounded-full relative overflow-hidden border-4 border-stone-800 shadow-[0_0_30px_rgba(0,0,0,1)]">
                         <div className="absolute top-5 sm:top-6 left-3 sm:left-5 w-4 h-4 sm:w-5 sm:h-5 bg-black rounded-full flex justify-center items-center">
                           <div className={`w-1 h-1 sm:w-1.5 sm:h-1.5 rounded-full ${turn === 'dealer' ? 'bg-red-500 shadow-[0_0_10px_red]' : 'bg-white'}`}></div>
                         </div>
                         <div className="absolute top-5 sm:top-6 right-3 sm:right-5 w-4 h-4 sm:w-5 sm:h-5 bg-black rounded-full flex justify-center items-center">
                           <div className={`w-1 h-1 sm:w-1.5 sm:h-1.5 rounded-full ${turn === 'dealer' ? 'bg-red-500 shadow-[0_0_10px_red]' : 'bg-white'}`}></div>
                         </div>
                         <div className="absolute bottom-3 sm:bottom-4 left-1/2 -translate-x-1/2 w-10 sm:w-12 h-4 sm:h-6 bg-black rounded-full border-b-4 border-red-600"></div>
                         <div className="absolute top-8 sm:top-10 left-1/2 -translate-x-1/2 w-4 h-4 sm:w-5 sm:h-5 bg-red-600 rounded-full shadow-[inset_0_-2px_5px_rgba(0,0,0,0.5)]"></div>
                      </div>
                   </div>
                </div>

                {/* 중앙: 로그 패널 (터치/스크롤 방지) */}
                <div className="flex-1 flex flex-col relative z-20 w-full min-h-[150px] sm:min-h-[200px] my-2">
                   <div className="flex-shrink-0 text-center mb-1 sm:mb-2">
                      <div className="inline-block px-3 py-0.5 sm:px-4 sm:py-1 bg-black/80 border border-stone-800 text-stone-400 text-xs sm:text-sm font-bold shadow-xl">
                        STAGE {stage} ({difficulty.toUpperCase()}) | 탄환: {shells.length}발 {doubleDamage && <span className="text-red-500 ml-2 animate-pulse">[톱 활성화]</span>}
                      </div>
                   </div>

                   <div className="flex-1 overflow-hidden pointer-events-none p-3 sm:p-4 border border-stone-800 bg-black/60 rounded backdrop-blur-sm flex flex-col gap-1.5 text-xs sm:text-sm md:text-base select-none">
                     {logs.map((log, i) => (
                       <div key={i} className={`${getLogColor(log)} transition-all animate-in slide-in-from-bottom-1 duration-200`}>
                         {log}
                       </div>
                     ))}
                     <div ref={logEndRef} className="h-4 flex-shrink-0" />
                   </div>
                </div>

                {/* 하단: 플레이어 영역 */}
                <div className="flex-shrink-0 w-full flex flex-col items-center z-20 gap-3">
                   <div className="flex flex-row items-center justify-between w-full max-w-md bg-black/60 px-4 py-2 sm:px-6 sm:py-3 rounded-2xl border border-stone-800 shadow-xl">
                       <div className="flex flex-col items-start">
                           <span className="text-[10px] font-bold text-blue-500 mb-1 tracking-widest">YOUR HP</span>
                           {renderHealth(playerHp, maxHp)}
                       </div>

                       {maxItems > 0 && (
                           <div className="flex flex-col items-end">
                               <span className="text-[10px] font-bold text-blue-400 mb-1 tracking-widest">YOUR ITEMS</span>
                               {renderItems(playerItems, true, maxItems)}
                           </div>
                       )}
                   </div>

                   {/* 액션 버튼 */}
                   <div className="flex w-full gap-2 sm:gap-4 h-12 sm:h-16">
                      <button
                        onClick={() => handleShoot('dealer', 'player')}
                        disabled={actionInProgress || turn !== 'player' || gameState !== 'playing'}
                        className={`flex-1 bg-black/80 border-2 ${turn === 'player' ? (doubleDamage ? 'border-red-600 shadow-[0_0_15px_rgba(220,38,38,0.3)]' : 'border-stone-400 hover:bg-stone-800') : 'border-stone-800 opacity-50'} rounded-lg font-bold text-white transition-all disabled:cursor-not-allowed flex flex-col justify-center items-center group`}
                      >
                        <CrosshairIcon className={`mb-0.5 sm:mb-1 w-4 h-4 sm:w-5 sm:h-5 ${doubleDamage ? 'text-red-500' : 'text-stone-400 group-hover:text-white'}`} />
                        <span className="text-[10px] sm:text-sm">광대 쏘기</span>
                      </button>
                      <button
                        onClick={() => handleShoot('player', 'player')}
                        disabled={actionInProgress || turn !== 'player' || gameState !== 'playing'}
                        className={`flex-1 bg-black/80 border-2 ${turn === 'player' ? 'border-stone-600 hover:bg-stone-800' : 'border-stone-800 opacity-50'} rounded-lg font-bold text-white transition-all disabled:cursor-not-allowed flex flex-col justify-center items-center group`}
                      >
                        <ShieldAlertIcon className="mb-0.5 sm:mb-1 w-4 h-4 sm:w-5 sm:h-5 text-stone-500 group-hover:text-white" />
                        <span className="text-[10px] sm:text-sm">나 쏘기</span>
                      </button>
                   </div>
                </div>
              </div>

              {/* === 게임 종료/클리어 오버레이 === */}
              {gameState !== 'playing' && (
                <div className="fixed inset-0 z-[999999] flex flex-col items-center justify-center bg-black/95 backdrop-blur-md pointer-events-auto px-4 py-12 text-center">
                  
                  {gameState === 'gameover' && (
                    <div className="flex flex-col items-center animate-in zoom-in duration-500">
                      <h1 className="text-5xl sm:text-6xl md:text-8xl font-black mb-4 text-red-600 tracking-widest drop-shadow-[0_0_20px_rgba(220,38,38,0.8)]">YOU DIED</h1>
                      <p className="text-stone-300 text-sm sm:text-xl mb-8">광대의 웃음소리가 울려 퍼집니다...</p>
                      <button onClick={() => setGameState('menu')} className="px-8 sm:px-10 py-3 sm:py-4 bg-red-950 hover:bg-red-800 rounded-xl font-bold text-white text-lg sm:text-xl transition-all border-2 border-red-700 hover:scale-110 shadow-[0_0_30px_rgba(220,38,38,0.6)] cursor-pointer">
                        메인 메뉴로
                      </button>
                    </div>
                  )}

                  {gameState === 'stageClear' && (
                    <div className="flex flex-col items-center animate-in zoom-in duration-500">
                      <h1 className="text-4xl sm:text-5xl md:text-7xl font-black mb-4 text-green-500 tracking-widest drop-shadow-[0_0_20px_rgba(34,197,94,0.6)]">STAGE {stage} CLEAR</h1>
                      <p className="text-stone-300 text-sm sm:text-xl mb-8">광대가 피를 흘리며 다시 일어납니다...</p>
                      <button onClick={nextStage} className="px-8 sm:px-10 py-3 sm:py-4 bg-stone-800 hover:bg-stone-700 rounded-xl font-bold text-white text-lg sm:text-xl transition-all border-2 border-stone-600 hover:scale-110 shadow-[0_0_30px_rgba(255,255,255,0.1)] cursor-pointer">
                        다음 스테이지로
                      </button>
                    </div>
                  )}

                  {gameState === 'victory' && (
                    <div className="flex flex-col items-center animate-in zoom-in duration-700 w-full max-w-sm">
                      <h1 className="text-6xl sm:text-7xl md:text-9xl font-black mb-2 text-yellow-500 tracking-widest drop-shadow-[0_0_40px_rgba(234,179,8,0.8)]">VICTORY</h1>
                      <h3 className="text-xl sm:text-3xl text-red-500 font-black mb-8 drop-shadow-[0_0_10px_rgba(220,38,38,0.8)]">
                        CLEAR MODE: {difficulty.toUpperCase()}
                      </h3>
                      
                      {difficulty === 'incredible' ? (
                        <div className="flex flex-col items-center w-full">
                          <p className="text-yellow-400 mb-6 text-sm sm:text-lg">🎉 진정한 악마를 쓰러뜨렸습니다! <br/>당신의 이름을 명예의 전당에 남기세요.</p>
                          <input 
                            type="text" 
                            maxLength={10}
                            placeholder="닉네임 입력 (최대 10자)" 
                            className="w-full px-4 py-3 sm:py-4 bg-stone-900 border-2 border-stone-600 text-white text-center text-lg rounded-xl mb-6 focus:outline-none focus:border-yellow-500 transition-colors placeholder:text-stone-600"
                            value={playerNameInput}
                            onChange={e => setPlayerNameInput(e.target.value)}
                          />
                          <button onClick={handleHoFSubmit} className="w-full px-8 py-4 bg-yellow-950 hover:bg-yellow-900 border-2 border-yellow-600 rounded-xl font-bold text-white text-lg transition-all shadow-[0_0_30px_rgba(234,179,8,0.5)] hover:scale-105 active:scale-95 cursor-pointer">
                            명예의 전당에 등록하기
                          </button>
                        </div>
                      ) : (
                        <>
                          <p className="text-stone-300 text-sm sm:text-xl md:text-2xl mb-8">당신은 이 악몽의 테이블에서 벗어났습니다.</p>
                          {difficulty === 'legend' && (
                            <p className="text-red-500 animate-pulse font-bold text-sm sm:text-lg mb-8">🔓 [INCREDIBLE] 모드가 영구 해제되었습니다!</p>
                          )}
                          <button onClick={() => setGameState('menu')} className="px-8 sm:px-10 py-3 sm:py-4 bg-stone-800 hover:bg-stone-700 rounded-xl font-bold text-white text-lg sm:text-xl transition-all border-2 border-stone-600 hover:scale-110 cursor-pointer shadow-[0_0_20px_rgba(255,255,255,0.1)]">
                            메인 메뉴로
                          </button>
                        </>
                      )}
                    </div>
                  )}

                </div>
              )}
            </>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
