<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>끝말잇기 게임</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; }
        /* 스크롤바 숨기기 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-indigo-50 min-h-screen flex items-center justify-center p-4">

    <!-- 메인 컨테이너 -->
    <div id="app" class="w-full max-w-md bg-white rounded-3xl shadow-xl overflow-hidden relative min-h-[600px] flex flex-col">
        
        <!-- 화면 1: 게임 설정 화면 -->
        <div id="setup-screen" class="flex-1 flex flex-col p-8 fade-in">
            <div class="text-center mt-8 mb-10">
                <div class="text-5xl mb-4">🗣️</div>
                <h1 class="text-3xl font-black text-indigo-900 mb-2">끝말잇기</h1>
                <p class="text-gray-500 text-sm">두음법칙이 적용된 치열한 두뇌 싸움!</p>
            </div>

            <div class="flex-1 space-y-6">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">몇 명이서 플레이하나요?</label>
                    <div class="flex items-center space-x-4 bg-gray-50 p-2 rounded-xl">
                        <button onclick="changePlayerCount(-1)" class="w-10 h-10 rounded-lg bg-white shadow text-xl font-bold text-indigo-600 hover:bg-indigo-50">-</button>
                        <span id="player-count-display" class="flex-1 text-center text-2xl font-black text-gray-800">2명</span>
                        <button onclick="changePlayerCount(1)" class="w-10 h-10 rounded-lg bg-white shadow text-xl font-bold text-indigo-600 hover:bg-indigo-50">+</button>
                    </div>
                </div>

                <div id="player-names-container" class="space-y-3">
                    <!-- 플레이어 이름 입력 창이 여기에 동적으로 생성됩니다. -->
                </div>
            </div>

            <button onclick="startGame()" class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl shadow-lg shadow-indigo-200 transition-all text-lg mt-8">
                게임 시작하기
            </button>
        </div>

        <!-- 화면 2: 게임 진행 화면 -->
        <div id="game-screen" class="flex-1 flex flex-col hidden fade-in h-full absolute inset-0 bg-white">
            <!-- 헤더 -->
            <div class="p-6 bg-indigo-600 text-white rounded-b-3xl shadow-md z-10">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-indigo-100 font-medium text-sm">진행 턴: <span id="turn-count">1</span></span>
                    <button onclick="confirmResign()" class="text-sm bg-indigo-800 hover:bg-indigo-900 px-3 py-1.5 rounded-lg transition-colors">기권하기</button>
                </div>
                <div class="text-center">
                    <p class="text-indigo-200 text-sm mb-1">현재 플레이어</p>
                    <h2 id="current-player-name" class="text-3xl font-black">플레이어1</h2>
                </div>
            </div>

            <!-- 메시지 및 미션 단어 영역 -->
            <div class="flex-1 flex flex-col justify-center items-center p-6 bg-gray-50">
                
                <div id="word-history" class="w-full h-32 overflow-y-auto no-scrollbar flex flex-col-reverse items-center gap-2 mb-6">
                    <!-- 이전 단어들이 역순으로 표시됨 -->
                </div>

                <div class="bg-white px-8 py-6 rounded-2xl shadow-sm border border-indigo-100 text-center w-full">
                    <p class="text-gray-400 text-sm mb-2" id="guide-text">첫 단어를 자유롭게 입력하세요!</p>
                    <div id="target-char" class="text-5xl font-black text-indigo-600 mb-2">시작</div>
                </div>

                <!-- 알림 메시지 영역 -->
                <div id="alert-message" class="mt-4 text-rose-500 font-bold text-sm h-5 transition-opacity opacity-0">
                    오류 메시지
                </div>
            </div>

            <!-- 입력 영역 -->
            <div class="p-6 bg-white border-t border-gray-100">
                <form id="word-form" onsubmit="submitWord(event)" class="relative flex gap-2">
                    <input type="text" id="word-input" autocomplete="off" 
                        class="w-full bg-gray-100 border-transparent focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 rounded-xl px-5 py-4 text-lg font-bold transition-all"
                        placeholder="단어를 입력하세요" required>
                    <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl px-6 font-bold shadow-md transition-colors shrink-0">
                        입력
                    </button>
                </form>
            </div>
        </div>

        <!-- 화면 3: 게임 종료 화면 -->
        <div id="result-screen" class="flex-1 flex flex-col justify-center items-center p-8 hidden fade-in h-full absolute inset-0 bg-white z-20">
            <div class="text-7xl mb-6">🏆</div>
            <h2 class="text-3xl font-black text-gray-800 mb-2">게임 종료!</h2>
            <p id="loser-message" class="text-lg text-rose-500 font-bold mb-8">XXX님이 탈락했습니다.</p>
            
            <div class="w-full bg-gray-50 rounded-xl p-4 mb-8 text-center">
                <p class="text-gray-500 text-sm mb-1">총 이어진 단어</p>
                <p id="total-words-count" class="text-3xl font-black text-indigo-600">12개</p>
            </div>

            <button onclick="resetGame()" class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl shadow-lg transition-all text-lg">
                다시 시작하기
            </button>
        </div>
    </div>

    <!-- 커스텀 모달 (기권 확인) -->
    <div id="confirm-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 fade-in">
        <div class="bg-white p-6 rounded-2xl w-80 max-w-[90%] shadow-2xl">
            <h3 class="text-xl font-bold text-gray-900 mb-2">정말 기권하시겠습니까?</h3>
            <p class="text-gray-500 mb-6 text-sm">기권하면 즉시 게임이 종료되며 패배하게 됩니다.</p>
            <div class="flex gap-3">
                <button onclick="closeModal()" class="flex-1 py-3 bg-gray-100 hover:bg-gray-200 text-gray-800 font-bold rounded-xl transition-colors">취소</button>
                <button onclick="resignGame()" class="flex-1 py-3 bg-rose-500 hover:bg-rose-600 text-white font-bold rounded-xl transition-colors">기권하기</button>
            </div>
        </div>
    </div>

    <script>
        // --- 게임 설정 및 상태 ---
        let playerCount = 2;
        let players = [];
        let currentPlayerIndex = 0;
        let usedWords = [];
        let lastChar = "";
        let turn = 1;

        // 두음법칙 딕셔너리
        const dueumDict = {
            '라':'나', '락':'낙', '란':'난', '랄':'날', '람':'남', '랍':'납', '랑':'낭', 
            '래':'내', '랭':'냉', '냑':'약', '략':'약', '냥':'양', '량':'양', '녀':'여', 
            '려':'여', '녁':'역', '력':'역', '년':'연', '련':'연', '녈':'열', '렬':'열', 
            '념':'염', '렴':'염', '렵':'엽', '녕':'영', '령':'영', '녜':'예', '례':'예', 
            '로':'노', '록':'녹', '론':'논', '롱':'농', '뢰':'뇌', '뇨':'요', '료':'요', 
            '룡':'용', '루':'누', '뉴':'유', '류':'유', '뉵':'육', '륙':'육', '륜':'윤', 
            '률':'율', '륭':'융', '르':'느', '름':'늠', '릉':'능', '니':'이', '리':'이', 
            '린':'인', '림':'임', '립':'입'
        };

        // --- 초기화 ---
        function initSetup() {
            renderPlayerInputs();
        }

        function changePlayerCount(delta) {
            playerCount += delta;
            if (playerCount < 2) playerCount = 2;
            if (playerCount > 6) playerCount = 6;
            document.getElementById('player-count-display').innerText = `${playerCount}명`;
            renderPlayerInputs();
        }

        function renderPlayerInputs() {
            const container = document.getElementById('player-names-container');
            container.innerHTML = '';
            for (let i = 1; i <= playerCount; i++) {
                container.innerHTML += `
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <span class="text-gray-400 font-bold text-sm">P${i}</span>
                        </div>
                        <input type="text" id="player-name-${i}" value="플레이어${i}" 
                            class="w-full bg-white border border-gray-200 rounded-xl py-3 pl-10 pr-4 text-sm font-bold focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none transition-all">
                    </div>
                `;
            }
        }

        // --- 게임 시작 ---
        function startGame() {
            players = [];
            for (let i = 1; i <= playerCount; i++) {
                const name = document.getElementById(`player-name-${i}`).value.trim() || `플레이어${i}`;
                players.push(name);
            }
            
            // 상태 초기화
            currentPlayerIndex = 0;
            usedWords = [];
            lastChar = "";
            turn = 1;

            switchScreen('game-screen');
            updateTurnUI();
            
            // 입력창 포커스
            setTimeout(() => document.getElementById('word-input').focus(), 100);
        }

        // --- 단어 제출 및 검증 로직 ---
        function submitWord(e) {
            e.preventDefault();
            const inputEl = document.getElementById('word-input');
            const word = inputEl.value.trim();

            if (!word) return;

            // 1. 글자 수 검사 (2글자 이상, 한글만)
            const hangulRegex = /^[가-힣]+$/;
            if (word.length < 2) {
                showAlert("2글자 이상 입력해주세요!");
                return;
            }
            if (!hangulRegex.test(word)) {
                showAlert("한글만 입력할 수 있습니다!");
                return;
            }

            // 2. 중복 검사
            if (usedWords.includes(word)) {
                showAlert("이미 사용한 단어입니다!");
                return;
            }

            // 3. 끝말잇기 규칙 검사 (두음법칙 포함)
            if (lastChar) {
                const firstChar = word.charAt(0);
                const dueumExpected = dueumDict[lastChar] || lastChar;
                
                if (firstChar !== lastChar && firstChar !== dueumExpected) {
                    if (lastChar === dueumExpected) {
                        showAlert(`'${lastChar}'(으)로 시작해야 합니다!`);
                    } else {
                        showAlert(`'${lastChar}' 또는 '${dueumExpected}'(으)로 시작해야 합니다!`);
                    }
                    return;
                }
            }

            // 단어 통과 처리
            processValidWord(word);
            inputEl.value = "";
            inputEl.focus();
        }

        function processValidWord(word) {
            // 히스토리에 추가
            usedWords.push(word);
            lastChar = word.charAt(word.length - 1);
            
            // 다음 사람 턴으로 넘기기
            turn++;
            currentPlayerIndex = (currentPlayerIndex + 1) % players.length;
            
            updateTurnUI();
            hideAlert();
        }

        function updateTurnUI() {
            document.getElementById('turn-count').innerText = turn;
            document.getElementById('current-player-name').innerText = players[currentPlayerIndex];

            const guideText = document.getElementById('guide-text');
            const targetCharEl = document.getElementById('target-char');
            const historyContainer = document.getElementById('word-history');

            // 히스토리 업데이트
            historyContainer.innerHTML = '';
            const recentWords = [...usedWords].reverse();
            recentWords.forEach((w, idx) => {
                const el = document.createElement('div');
                if (idx === 0) {
                    el.className = "bg-indigo-100 text-indigo-800 px-4 py-1.5 rounded-full font-bold text-sm fade-in";
                } else {
                    el.className = "text-gray-400 font-medium text-sm fade-in opacity-60";
                }
                el.innerText = w;
                historyContainer.appendChild(el);
            });

            // 가이드 텍스트 업데이트
            if (lastChar) {
                const dueum = dueumDict[lastChar] || lastChar;
                if (lastChar === dueum) {
                    guideText.innerText = `다음 단어는 이 글자로 시작하세요!`;
                    targetCharEl.innerText = lastChar;
                } else {
                    guideText.innerText = `두음법칙 적용 가능!`;
                    targetCharEl.innerHTML = `${lastChar} <span class="text-2xl text-gray-400">또는</span> ${dueum}`;
                }
            } else {
                guideText.innerText = "자유롭게 첫 단어를 입력하세요!";
                targetCharEl.innerText = "시작";
            }
        }

        // --- 경고 메시지 UI ---
        function showAlert(msg) {
            const alertEl = document.getElementById('alert-message');
            alertEl.innerText = msg;
            alertEl.classList.remove('opacity-0');
            
            // 입력창 흔들기 효과
            const inputEl = document.getElementById('word-input');
            inputEl.classList.add('animate-bounce');
            setTimeout(() => inputEl.classList.remove('animate-bounce'), 500);

            // 3초 후 사라짐
            clearTimeout(window.alertTimeout);
            window.alertTimeout = setTimeout(hideAlert, 3000);
        }

        function hideAlert() {
            document.getElementById('alert-message').classList.add('opacity-0');
        }

        // --- 기권 및 종료 로직 ---
        function confirmResign() {
            document.getElementById('confirm-modal').classList.remove('hidden');
            document.getElementById('confirm-modal').classList.add('flex');
        }

        function closeModal() {
            document.getElementById('confirm-modal').classList.add('hidden');
            document.getElementById('confirm-modal').classList.remove('flex');
            document.getElementById('word-input').focus();
        }

        function resignGame() {
            closeModal();
            const loser = players[currentPlayerIndex];
            endGame(loser);
        }

        function endGame(loserName) {
            document.getElementById('loser-message').innerText = `💀 ${loserName}님이 패배했습니다!`;
            document.getElementById('total-words-count').innerText = `${usedWords.length}개`;
            switchScreen('result-screen');
        }

        function resetGame() {
            switchScreen('setup-screen');
        }

        // --- 화면 전환 유틸리티 ---
        function switchScreen(screenId) {
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.add('hidden');
            
            document.getElementById(screenId).classList.remove('hidden');
        }

        // 초기 실행
        initSetup();

    </script>
</body>
</html>
