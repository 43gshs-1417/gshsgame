<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DA VINCI CODE 3D</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Three.js Import Map -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
        }
      }
    </script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0a0a0a; color: white; font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; }
        
        /* 둥근 형태 완전 배제 (Strict sharp edges) */
        * { border-radius: 0 !important; } 
        
        #game-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; outline: none; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        
        .pointer-events-auto { pointer-events: auto; }
        ::-webkit-scrollbar { display: none; }

        .shadow-sharp { box-shadow: 8px 8px 0 0 rgba(255,255,255,1); }
        .shadow-sharp-error { box-shadow: 8px 8px 0 0 rgba(239,68,68,1); }
        .shadow-sharp-warning { box-shadow: 8px 8px 0 0 rgba(234,179,8,1); }
        .shadow-sharp-success { box-shadow: 8px 8px 0 0 rgba(16,185,129,1); }
        .shadow-sharp-sm { box-shadow: 4px 4px 0 0 rgba(255,255,255,0.5); }
    </style>
</head>
<body>

    <!-- 3D Canvas -->
    <canvas id="game-canvas"></canvas>

    <!-- Start Overlay -->
    <div id="start-overlay" class="absolute inset-0 bg-neutral-950 flex flex-col items-center justify-center z-50 pointer-events-auto transition-opacity duration-500">
        <h1 class="text-5xl md:text-7xl font-black text-white mb-4 tracking-tighter border-4 border-white p-8 shadow-sharp bg-neutral-900">
            DA VINCI CODE
        </h1>
        <p class="text-neutral-400 mb-16 text-lg md:text-2xl font-bold tracking-[0.3em]">3D ARTIFICIAL INTELLIGENCE MATCH</p>
        <div class="flex flex-col md:flex-row gap-6">
            <button id="btn-start-easy" class="bg-white text-black border-4 border-black px-12 py-6 font-bold text-2xl hover:bg-neutral-300 transition-colors shadow-sharp">
                이지 모드
            </button>
            <button id="btn-start-hard" class="bg-red-600 text-white border-4 border-red-800 px-12 py-6 font-bold text-2xl hover:bg-red-500 transition-colors shadow-sharp">
                하드 모드
            </button>
        </div>
    </div>

    <!-- UI Layer -->
    <div id="ui-layer" class="flex flex-col justify-between p-4 md:p-8">
        
        <!-- Top Status Banner -->
        <div class="flex justify-center mt-2">
            <div id="status-banner" class="hidden bg-neutral-900 border-2 border-white px-6 py-4 md:px-10 md:py-5 text-base md:text-xl font-bold tracking-widest text-white shadow-sharp transition-all duration-300">
                게임을 준비하는 중입니다...
            </div>
        </div>

        <!-- Number Input Pad (Hidden initially) -->
        <div id="number-pad" class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-neutral-900 border-4 border-white p-6 md:p-8 hidden flex-col items-center shadow-sharp pointer-events-auto z-20 w-[90%] max-w-[400px]">
            <div class="text-lg md:text-xl mb-6 border-b-2 border-neutral-600 pb-4 w-full text-center font-bold">
                상대방의 타일 숫자를 추리하세요
            </div>
            <div id="pad-grid" class="grid grid-cols-4 gap-3 md:gap-4 w-full">
                <!-- Buttons injected by JS -->
            </div>
            <button id="btn-close-pad" class="mt-6 w-full bg-red-600 border-2 border-red-400 text-white py-4 font-bold text-lg hover:bg-red-500 transition-colors">
                취소
            </button>
        </div>

        <!-- Bottom Controls & Info -->
        <div class="flex flex-col md:flex-row justify-between items-end gap-4 w-full">
            <div id="game-info" class="hidden bg-neutral-900 border-2 border-neutral-500 p-4 md:p-6 text-sm md:text-base text-neutral-300 w-full md:w-64 pointer-events-auto">
                <p class="mb-2">나의 남은 미공개 타일: <span id="info-player-left" class="text-white font-bold text-lg ml-2">0</span></p>
                <p class="mb-2">AI의 남은 미공개 타일: <span id="info-ai-left" class="text-white font-bold text-lg ml-2">0</span></p>
                <p>풀에 남은 예비 타일: <span id="info-pool-left" class="text-white font-bold text-lg ml-2">0</span></p>
            </div>

            <div id="action-buttons" class="flex flex-col md:flex-row gap-4 w-full md:w-auto pointer-events-auto">
                <button id="btn-draw" class="hidden bg-white text-black border-2 border-black px-8 py-4 md:py-6 font-bold text-lg md:text-xl hover:bg-neutral-200 shadow-sharp-sm w-full md:w-auto">
                    타일 뽑기
                </button>
                <button id="btn-pass" class="hidden bg-neutral-800 text-white border-2 border-white px-8 py-4 md:py-6 font-bold text-lg md:text-xl hover:bg-neutral-700 shadow-sharp-sm w-full md:w-auto">
                    턴 종료
                </button>
                <button id="btn-restart" class="hidden bg-emerald-600 text-white border-2 border-white px-8 py-4 md:py-6 font-bold text-lg md:text-xl hover:bg-emerald-500 shadow-sharp-sm w-full md:w-auto">
                    다시 하기
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';

        // --- Game State ---
        let state = {
            phase: 'INIT', // INIT, PLAYER_DRAW, PLAYER_GUESS, AI_TURN, WAIT, GAME_OVER
            difficulty: 'HARD',
            playerTiles: [],
            aiTiles: [],
            pool: [],
            drawnTile: null,
            targetTile: null
        };

        const delay = ms => new Promise(res => setTimeout(res, ms));

        // --- Three.js Setup ---
        const canvas = document.getElementById('game-canvas');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);

        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 10, 14);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFShadowMap;

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xfffff0, 3);
        dirLight.position.set(0, 15, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 50;
        dirLight.shadow.camera.left = -15;
        dirLight.shadow.camera.right = 15;
        dirLight.shadow.camera.top = 15;
        dirLight.shadow.camera.bottom = -15;
        dirLight.shadow.bias = -0.001;
        scene.add(dirLight);

        // Table Environment (Classic Casino/Board Game Table)
        const tableGeo = new THREE.CylinderGeometry(22, 22, 1, 64);
        const tableMat = new THREE.MeshStandardMaterial({ color: 0x1d1108, roughness: 0.8 }); // Dark Wood
        const table = new THREE.Mesh(tableGeo, tableMat);
        table.position.y = -0.5;
        table.receiveShadow = true;
        scene.add(table);

        const playmatGeo = new THREE.CylinderGeometry(20, 20, 1.05, 64);
        const playmatMat = new THREE.MeshStandardMaterial({ color: 0x0a3320, roughness: 1.0 }); // Dark Green Felt
        const playmat = new THREE.Mesh(playmatGeo, playmatMat);
        playmat.position.y = -0.5;
        playmat.receiveShadow = true;
        scene.add(playmat);

        // --- Tile Class & Logic ---
        class Tile {
            constructor(color, number) {
                this.color = color;
                this.number = number;
                this.owner = 'pool';
                this.isRevealed = false;
                this.isNewlyDrawn = false;
                
                this.targetPosition = new THREE.Vector3();
                this.targetRotation = new THREE.Euler();

                this.createMesh();
                this.updateTexture();
            }

            createMesh() {
                const baseColor = this.color === 'white' ? 0xeeeeee : 0x222222;
                const sideMat = new THREE.MeshStandardMaterial({ color: baseColor });
                const frontMat = new THREE.MeshStandardMaterial({ color: baseColor });

                // Index 4 is Front (+z), Index 5 is Back (-z)
                const materials = [sideMat, sideMat, sideMat, sideMat, frontMat, sideMat];
                
                const geo = new THREE.BoxGeometry(1.0, 1.5, 0.25);
                this.mesh = new THREE.Mesh(geo, materials);
                this.mesh.castShadow = true;
                this.mesh.receiveShadow = true;
                this.mesh.rotation.order = 'YXZ'; // Important for clean spinning
                this.mesh.userData = { tile: this };
            }

            updateTexture() {
                const cvs = document.createElement('canvas');
                cvs.width = 256; cvs.height = 384;
                const ctx = cvs.getContext('2d');

                // Background
                ctx.fillStyle = this.color === 'white' ? '#f0f0f0' : '#1a1a1a';
                ctx.fillRect(0, 0, 256, 384);

                // Sharp border
                ctx.strokeStyle = this.color === 'white' ? '#cccccc' : '#444444';
                ctx.lineWidth = 6;
                ctx.strokeRect(6, 6, 244, 372);

                const shouldShowNumber = this.owner === 'player' || this.isRevealed || this.owner === 'pool';

                if (shouldShowNumber && this.owner !== 'pool') {
                    ctx.fillStyle = this.color === 'white' ? '#000000' : '#ffffff';
                    ctx.font = 'bold 140px "Arial", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(this.number.toString(), 128, 192);

                    // Underline for 6 and 9 for clarity
                    if (this.number === 6 || this.number === 9) {
                        ctx.fillRect(80, 260, 96, 8);
                    }
                }

                // Highlight if newly drawn
                if (this.isNewlyDrawn) {
                    ctx.strokeStyle = '#ef4444'; // Red-500
                    ctx.lineWidth = 12;
                    ctx.strokeRect(6, 6, 244, 372);
                }

                const texture = new THREE.CanvasTexture(cvs);
                this.mesh.material[4].map = texture;
                this.mesh.material[4].needsUpdate = true;
            }
        }

        // --- Core Functions ---
        function getSortValue(tile) {
            return tile.number * 10 + (tile.color === 'black' ? 0 : 1);
        }

        function sortHand(hand) {
            hand.sort((a, b) => getSortValue(a) - getSortValue(b));
        }

        const playerTilt = -Math.PI / 8; // Slight tilt back

        function updatePositions() {
            // Player
            state.playerTiles.forEach((tile, i) => {
                const spacing = 1.3;
                const offsetX = (i - state.playerTiles.length / 2 + 0.5) * spacing;
                
                if (tile.isRevealed) {
                    tile.targetPosition.set(offsetX, 0.15, 3.5); // 타일이 공개되면 바닥에 눕힘
                    tile.targetRotation.set(-Math.PI / 2, 0, 0); // 하늘을 보게 회전
                } else {
                    tile.targetPosition.set(offsetX, 0.75, 4); // 미공개 타일은 세워둠
                    tile.targetRotation.set(playerTilt, 0, 0);
                }
                
                if (tile.isNewlyDrawn) tile.targetPosition.z = 5.2; // Push towards player
            });

            // AI
            state.aiTiles.forEach((tile, i) => {
                const spacing = 1.3;
                // AI 시점에서 왼쪽(가장 작은 숫자)은 플레이어 시점에서 오른쪽(양수 X)입니다. 방향 반전.
                const offsetX = -(i - state.aiTiles.length / 2 + 0.5) * spacing;

                if (tile.isRevealed) {
                    tile.targetPosition.set(offsetX, 0.15, -3.5); // 타일이 공개되면 바닥에 눕힘
                    tile.targetRotation.set(-Math.PI / 2, 0, 0); // 하늘을 보게 회전
                } else {
                    tile.targetPosition.set(offsetX, 0.75, -4); // 미공개 타일은 세워둠
                    tile.targetRotation.set(playerTilt, Math.PI, 0); // Face AI (hidden)
                }
                
                if (tile.isNewlyDrawn) tile.targetPosition.z = -2.8; // Push towards center
            });

            // Pool
            state.pool.forEach((tile, i) => {
                tile.targetPosition.set(-10 + (i % 3) * 1.2, 0.12 + Math.floor(i / 3) * 0.26, 0);
                tile.targetRotation.set(-Math.PI / 2, 0, 0); // Lay flat
            });
        }

        function updateUI() {
            document.getElementById('info-player-left').innerText = state.playerTiles.filter(t => !t.isRevealed).length;
            document.getElementById('info-ai-left').innerText = state.aiTiles.filter(t => !t.isRevealed).length;
            document.getElementById('info-pool-left').innerText = state.pool.length;
        }

        function showMessage(text, type = "info") {
            const banner = document.getElementById('status-banner');
            banner.classList.remove('hidden');
            banner.innerText = text;
            
            // Reset styles
            banner.className = 'bg-neutral-900 border-2 px-6 py-4 md:px-10 md:py-5 text-base md:text-xl font-bold tracking-widest transition-all duration-300 pointer-events-auto shadow-sharp text-white border-white';
            
            if (type === 'error') {
                banner.classList.add('border-red-500', 'text-red-400', 'shadow-sharp-error');
                banner.classList.remove('border-white', 'text-white', 'shadow-sharp');
            } else if (type === 'warning') {
                banner.classList.add('border-yellow-500', 'text-yellow-400', 'shadow-sharp-warning');
                banner.classList.remove('border-white', 'text-white', 'shadow-sharp');
            } else if (type === 'success') {
                banner.classList.add('border-emerald-500', 'text-emerald-400', 'shadow-sharp-success');
                banner.classList.remove('border-white', 'text-white', 'shadow-sharp');
            }
        }

        function clearNewlyDrawn() {
            [...state.playerTiles, ...state.aiTiles].forEach(t => {
                if (t.isNewlyDrawn) {
                    t.isNewlyDrawn = false;
                    t.updateTexture();
                }
            });
            updatePositions();
        }

        function checkWinCondition() {
            const aiAllRevealed = state.aiTiles.length > 0 && state.aiTiles.every(t => t.isRevealed);
            const playerAllRevealed = state.playerTiles.length > 0 && state.playerTiles.every(t => t.isRevealed);

            if (aiAllRevealed) {
                endGame('플레이어의 승리입니다!');
                return true;
            }
            if (playerAllRevealed) {
                endGame('AI의 승리입니다!');
                return true;
            }
            return false;
        }

        function endGame(msg) {
            state.phase = 'GAME_OVER';
            showMessage(msg, msg.includes('플레이어') ? 'success' : 'error');
            document.getElementById('btn-draw').classList.add('hidden');
            document.getElementById('btn-pass').classList.add('hidden');
            document.getElementById('btn-restart').classList.remove('hidden');

            // Reveal all AI tiles visually
            state.aiTiles.forEach(t => {
                t.isRevealed = true;
                t.updateTexture();
            });
            updatePositions();
        }

        // --- Game Flow ---
        async function initGame(difficultyMode = state.difficulty) {
            document.getElementById('start-overlay').classList.remove('pointer-events-auto');
            document.getElementById('start-overlay').classList.add('opacity-0', 'pointer-events-none');
            document.getElementById('btn-restart').classList.add('hidden');
            document.getElementById('game-info').classList.remove('hidden');

            // Cleanup
            [...state.pool, ...state.playerTiles, ...state.aiTiles].forEach(t => scene.remove(t.mesh));
            
            state = {
                phase: 'INIT',
                difficulty: difficultyMode,
                playerTiles: [],
                aiTiles: [],
                pool: [],
                drawnTile: null,
                targetTile: null
            };

            const colors = ['black', 'white'];
            for (let c of colors) {
                for (let i = 0; i <= 11; i++) {
                    const tile = new Tile(c, i);
                    state.pool.push(tile);
                    scene.add(tile.mesh);
                }
            }

            // Shuffle
            for (let i = state.pool.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [state.pool[i], state.pool[j]] = [state.pool[j], state.pool[i]];
            }

            updatePositions();
            showMessage("타일을 섞고 분배합니다...", "info");
            await delay(1000);

            // Deal 4 each
            for (let i = 0; i < 4; i++) {
                drawTileDirect('player');
                drawTileDirect('ai');
            }

            updatePositions();
            updateUI();
            await delay(1500);

            startPlayerTurn();
        }

        function drawTileDirect(owner) {
            if (state.pool.length === 0) return;
            const tile = state.pool.pop();
            tile.owner = owner;
            if (owner === 'player') state.playerTiles.push(tile);
            else state.aiTiles.push(tile);
            sortHand(owner === 'player' ? state.playerTiles : state.aiTiles);
            tile.updateTexture();
        }

        function startPlayerTurn() {
            if (state.phase === 'GAME_OVER') return;
            
            state.drawnTile = null;
            document.getElementById('btn-pass').classList.add('hidden');

            if (state.pool.length > 0) {
                state.phase = 'PLAYER_DRAW';
                showMessage("당신의 턴입니다. [타일 뽑기]를 진행하세요.", "info");
                document.getElementById('btn-draw').classList.remove('hidden');
            } else {
                state.phase = 'PLAYER_GUESS';
                showMessage("풀에 타일이 없습니다. 바로 AI의 타일을 클릭하여 추리하세요.", "warning");
                document.getElementById('btn-draw').classList.add('hidden');
            }
        }

        // Player Actions
        document.getElementById('btn-draw').onclick = () => {
            if (state.phase !== 'PLAYER_DRAW') return;
            
            const tile = state.pool.pop();
            tile.owner = 'player';
            tile.isNewlyDrawn = true;
            state.playerTiles.push(tile);
            sortHand(state.playerTiles);
            state.drawnTile = tile;
            tile.updateTexture();
            
            updatePositions();
            updateUI();

            state.phase = 'PLAYER_GUESS';
            showMessage("추리할 상대방(AI)의 미공개 타일을 클릭하세요.", "warning");
            document.getElementById('btn-draw').classList.add('hidden');
        };

        async function submitGuess(num) {
            document.getElementById('number-pad').classList.add('hidden');
            document.getElementById('number-pad').classList.remove('flex');

            if (state.targetTile) {
                state.targetTile.targetPosition.y = 0.75;
            }

            if (state.targetTile.number === num) {
                // Correct
                state.targetTile.isRevealed = true;
                state.targetTile.updateTexture();
                updatePositions();
                
                showMessage("정답입니다!", "success");
                updateUI();

                if (checkWinCondition()) return;

                state.phase = 'PLAYER_GUESS'; // Allow continuing
                document.getElementById('btn-pass').classList.remove('hidden');
                
                await delay(1500);
                if(state.phase !== 'GAME_OVER') {
                    showMessage("계속해서 추리하려면 다른 타일을 클릭하고, 멈추려면 [턴 종료]를 누르세요.", "info");
                }
            } else {
                // Wrong
                document.getElementById('btn-pass').classList.add('hidden');
                
                showMessage(`틀렸습니다! AI의 타일은 ${num}이(가) 아닙니다. 벌칙으로 공개할 당신의 미공개 타일을 클릭하세요.`, "error");
                updateUI();
                state.phase = 'PLAYER_CHOOSE_REVEAL';
            }
        }

        document.getElementById('btn-pass').onclick = async () => {
            if (state.phase !== 'PLAYER_GUESS') return;
            showMessage("턴을 종료합니다.", "info");
            document.getElementById('btn-pass').classList.add('hidden');
            state.phase = 'WAIT';
            clearNewlyDrawn();
            
            await delay(1500);
            if (checkWinCondition()) return;
            
            state.phase = 'AI_TURN';
            aiTurnFlow();
        };

        // AI Logic
        async function aiTurnFlow() {
            if (state.phase === 'GAME_OVER') return;

            if (state.pool.length > 0) {
                const tile = state.pool.pop();
                tile.owner = 'ai';
                tile.isNewlyDrawn = true;
                state.aiTiles.push(tile);
                sortHand(state.aiTiles);
                state.drawnTile = tile;
                
                updatePositions();
                updateUI();
                showMessage("AI가 타일을 뽑았습니다.", "info");
                await delay(2000);
            } else {
                state.drawnTile = null;
                showMessage("풀에 타일이 없어 AI가 바로 추리를 시작합니다.", "warning");
                await delay(2000);
            }

            await aiMakeGuessLoop();
        }

        async function aiMakeGuessLoop() {
            if (state.phase === 'GAME_OVER') return;

            const targets = state.playerTiles.filter(t => !t.isRevealed);
            if (targets.length === 0) return; // Will be caught by win check

            const target = targets[Math.floor(Math.random() * targets.length)];
            const tIndex = state.playerTiles.indexOf(target);

            // Logic to exclude known numbers and use positional bounds
            let minVal = 0;
            let maxVal = 11;

            if (state.difficulty === 'HARD') {
                // Check left bound (smaller or equal)
                for (let i = tIndex - 1; i >= 0; i--) {
                    if (state.playerTiles[i].isRevealed) {
                        minVal = state.playerTiles[i].number;
                        break;
                    }
                }

                // Check right bound (larger or equal)
                for (let i = tIndex + 1; i < state.playerTiles.length; i++) {
                    if (state.playerTiles[i].isRevealed) {
                        maxVal = state.playerTiles[i].number;
                        break;
                    }
                }
            }
            // EASY 모드의 경우 위 논리를 무시하고 0~11 전체 범위를 사용합니다.

            // Known numbers (same color)
            const knownNums = new Set();
            state.aiTiles.forEach(t => { if(t.color === target.color) knownNums.add(t.number); });
            state.playerTiles.forEach(t => { if(t.isRevealed && t.color === target.color) knownNums.add(t.number); });

            const available = [];
            for (let i = minVal; i <= maxVal; i++) {
                if (!knownNums.has(i)) available.push(i);
            }
            
            const guess = available.length > 0 ? available[Math.floor(Math.random() * available.length)] : Math.floor(Math.random() * 12);

            showMessage(`AI (${state.difficulty}): 당신의 ${target.color === 'black' ? '검은색' : '흰색'} 타일 하나를 [ ${guess} ] (으)로 추측했습니다!`, "warning");

            // Visual indicator of target
            target.mesh.position.y += 0.8;
            await delay(3000);
            target.mesh.position.y -= 0.8;

            if (target.number === guess) {
                target.isRevealed = true;
                target.updateTexture();
                updateUI();
                showMessage("AI가 정답을 맞췄습니다!", "error");

                if (checkWinCondition()) return;
                await delay(2000);

                // AI decides to continue or stop
                const continueChance = state.difficulty === 'HARD' ? 0.6 : 0.15;

                if (Math.random() < continueChance && state.playerTiles.filter(t => !t.isRevealed).length > 0) {
                    showMessage("AI가 계속해서 추리합니다...", "warning");
                    await delay(2000);
                    await aiMakeGuessLoop();
                } else {
                    showMessage("AI가 턴을 종료했습니다.", "info");
                    await delay(2000);
                    endAiTurn();
                }
            } else {
                let tileToReveal = null;
                // AI는 새로 뽑은 타일이 있다면 우선적으로 공개하려고 시도(70%), 아니면 무작위 미공개 타일 선택
                if (state.drawnTile && !state.drawnTile.isRevealed && Math.random() < 0.7) {
                    tileToReveal = state.drawnTile;
                } else {
                    const hiddenAi = state.aiTiles.filter(t => !t.isRevealed);
                    if (hiddenAi.length > 0) {
                        tileToReveal = hiddenAi[Math.floor(Math.random() * hiddenAi.length)];
                    }
                }

                if (tileToReveal) {
                    tileToReveal.isRevealed = true;
                    tileToReveal.updateTexture();
                }

                updatePositions();
                updateUI();
                showMessage(`AI가 틀렸습니다! 패널티로 AI가 자신의 타일 하나를 스스로 선택해 공개합니다.`, "success");
                
                if (checkWinCondition()) return;
                await delay(3000);
                endAiTurn();
            }
        }

        function endAiTurn() {
            if (state.phase === 'GAME_OVER') return;
            clearNewlyDrawn();
            startPlayerTurn();
        }

        // --- Interaction & UI Building ---
        document.getElementById('btn-start-easy').onclick = () => initGame('EASY');
        document.getElementById('btn-start-hard').onclick = () => initGame('HARD');
        document.getElementById('btn-restart').onclick = () => initGame(state.difficulty);

        const padGrid = document.getElementById('pad-grid');
        for (let i = 0; i <= 11; i++) {
            const btn = document.createElement('button');
            btn.className = 'bg-neutral-800 border-2 border-neutral-500 text-white text-xl md:text-2xl font-bold py-4 hover:bg-neutral-600 hover:border-white transition-all shadow-sharp-sm';
            btn.innerText = i;
            btn.onclick = () => submitGuess(i);
            padGrid.appendChild(btn);
        }

        document.getElementById('btn-close-pad').onclick = () => {
            document.getElementById('number-pad').classList.add('hidden');
            document.getElementById('number-pad').classList.remove('flex');
            if (state.targetTile) {
                state.targetTile.targetPosition.y = 0.75;
            }
            state.targetTile = null;
        };

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (e) => {
            if (e.target.closest('.pointer-events-auto')) return;

            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            if (state.phase === 'PLAYER_GUESS') {
                const hiddenAiMeshes = state.aiTiles
                    .filter(t => !t.isRevealed)
                    .map(t => t.mesh);

                const intersects = raycaster.intersectObjects(hiddenAiMeshes, false);

                if (intersects.length > 0) {
                    state.targetTile = intersects[0].object.userData.tile;
                    document.getElementById('number-pad').classList.remove('hidden');
                    document.getElementById('number-pad').classList.add('flex');
                }
            } else if (state.phase === 'PLAYER_CHOOSE_REVEAL') {
                const hiddenPlayerMeshes = state.playerTiles
                    .filter(t => !t.isRevealed)
                    .map(t => t.mesh);

                const intersects = raycaster.intersectObjects(hiddenPlayerMeshes, false);

                if (intersects.length > 0) {
                    const tile = intersects[0].object.userData.tile;
                    tile.isRevealed = true;
                    tile.updateTexture();
                    updatePositions();
                    updateUI();
                    
                    state.phase = 'WAIT';
                    showMessage("타일을 공개했습니다. 턴이 넘어갑니다.", "info");
                    
                    setTimeout(async () => {
                        clearNewlyDrawn();
                        if (checkWinCondition()) return;
                        state.phase = 'AI_TURN';
                        aiTurnFlow();
                    }, 1500);
                }
            }
        });

        // Slight parallax & Hover Logic
        let mouseX = 0, mouseY = 0;
        let hoveredTile = null;

        window.addEventListener('pointermove', (e) => {
            mouseX = (e.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(e.clientY / window.innerHeight) * 2 + 1;

            let targetMeshes = [];
            if (state.phase === 'PLAYER_GUESS' && !document.getElementById('number-pad').classList.contains('flex')) {
                // 추리 턴: AI의 미공개 타일만 호버 가능
                targetMeshes = state.aiTiles.filter(t => !t.isRevealed).map(t => t.mesh);
            } else if (state.phase === 'PLAYER_CHOOSE_REVEAL') {
                // 패널티 턴: 내 미공개 타일만 호버 가능
                targetMeshes = state.playerTiles.filter(t => !t.isRevealed).map(t => t.mesh);
            }

            if (targetMeshes.length > 0) {
                raycaster.setFromCamera(new THREE.Vector2(mouseX, mouseY), camera);
                const intersects = raycaster.intersectObjects(targetMeshes, false);

                if (intersects.length > 0) {
                    const tile = intersects[0].object.userData.tile;
                    if (hoveredTile !== tile) {
                        if (hoveredTile) hoveredTile.targetPosition.y = 0.75;
                        hoveredTile = tile;
                        hoveredTile.targetPosition.y = 1.2; // Hover lift
                    }
                } else {
                    if (hoveredTile) {
                        hoveredTile.targetPosition.y = 0.75;
                        hoveredTile = null;
                    }
                }
            } else {
                if (hoveredTile) {
                    hoveredTile.targetPosition.y = 0.75;
                    hoveredTile = null;
                }
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);

            // Smooth interpolation
            const allTiles = [...state.pool, ...state.playerTiles, ...state.aiTiles];
            allTiles.forEach(t => {
                t.mesh.position.lerp(t.targetPosition, 0.1);
                t.mesh.rotation.x += (t.targetRotation.x - t.mesh.rotation.x) * 0.1;
                
                // Handling Y rotation cleanly
                let dy = t.targetRotation.y - t.mesh.rotation.y;
                if (dy > Math.PI) dy -= Math.PI * 2;
                if (dy < -Math.PI) dy += Math.PI * 2;
                t.mesh.rotation.y += dy * 0.1;
                
                t.mesh.rotation.z += (t.targetRotation.z - t.mesh.rotation.z) * 0.1;
            });

            // Camera Parallax
            camera.position.x += (mouseX * 1.5 - camera.position.x) * 0.05;
            camera.position.y += ((10 + mouseY * 1.5) - camera.position.y) * 0.05;
            camera.lookAt(0, 0, 0);

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
