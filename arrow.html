        :root {

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

            position: absolute; top: 0; left: 0; right: 0; bottom: 0;

            flex-grow: 1; overflow-y: auto; white-space: pre-wrap;

        .sys-msg { color: #88ccff; }

        .item-msg { color: var(--gold-star); text-shadow: 0 0 5px var(--gold-star); }
        .glitch-text { animation: textGlitch 0.2s infinite; }
        @keyframes textGlitch {
            0% { transform: translate(0); } 20% { transform: translate(-2px, 1px); }
            40% { transform: translate(-1px, -1px); } 60% { transform: translate(2px, 1px); }
            80% { transform: translate(1px, -1px); } 100% { transform: translate(0); }
        }

        #terminal-input-container { display: flex; align-items: center; font-size: 18px; }
        #terminal-prompt { margin-right: 10px; }
        #terminal-input {
            background: transparent; border: none; color: var(--neon-green);

        .glitch-screen { animation: screenGlitch 0.3s cubic-bezier(.25, .46, .45, .94) both infinite; }
        @keyframes screenGlitch {

        class Vec2 {
            constructor(x = 0, y = 0) { this.x = x; this.y = y; }
            add(v) { this.x += v.x; this.y += v.y; return this; }
            sub(v) { this.x -= v.x; this.y -= v.y; return this; }
            mult(n) { this.x *= n; this.y *= n; return this; }
            mag() { return Math.sqrt(this.x * this.x + this.y * this.y); }
            normalize() {
                let m = this.mag();
                if (m !== 0) { this.mult(1 / m); }
                return this;
            }
            clone() { return new Vec2(this.x, this.y); }
        }

        function rectIntersect(r1, r2) {
            return !(r2.x > r1.x + r1.w || r2.x + r2.w < r1.x || r2.y > r1.y + r1.h || r2.y + r2.h < r1.y);

            handleInput(code) {
                if (!this.keyReady) return;
                
                let current = StagesData[this.selectedId];
                if (code === 'ArrowUp' && current.nav.up && Progress.unlocked[current.nav.up]) this.selectedId = current.nav.up;
                if (code === 'ArrowDown' && current.nav.down && Progress.unlocked[current.nav.down]) this.selectedId = current.nav.down;
                if (code === 'ArrowLeft' && current.nav.left && Progress.unlocked[current.nav.left]) this.selectedId = current.nav.left;
                if (code === 'ArrowRight' && current.nav.right && Progress.unlocked[current.nav.right]) this.selectedId = current.nav.right;
                
                if (code === 'Enter') {
                    document.getElementById('map-overlay').classList.remove('active');
                    startGame(this.selectedId);
                }
                
                this.keyReady = false;
                Terminal.glitch(0.1);
            },

            draw(ctx) {
                ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
                
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#00FF88';

                ctx.strokeStyle = 'rgba(0, 255, 136, 0.15)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                for (let i=0; i<GAME_WIDTH; i+=50) { ctx.moveTo(i, 0); ctx.lineTo(i, GAME_HEIGHT); }
                for (let i=0; i<GAME_HEIGHT; i+=50) { ctx.moveTo(0, i); ctx.lineTo(GAME_WIDTH, i); }
                ctx.stroke();

                ctx.lineWidth = 4;
                for (let key in StagesData) {
                    if (!Progress.unlocked[key]) continue;
                    let node = StagesData[key];
                    let navs = [node.nav.up, node.nav.down, node.nav.left, node.nav.right];
                    for (let n of navs) {
                        if (n && Progress.unlocked[n]) {
                            let target = StagesData[n];
                            ctx.beginPath();
                            ctx.moveTo(node.x, node.y);
                            ctx.lineTo(target.x, target.y);
                            ctx.strokeStyle = Progress.cleared[key] && Progress.cleared[n] ? '#00FF88' : 'rgba(0, 255, 136, 0.4)';
                            ctx.setLineDash([10, 10]);
                            ctx.stroke();
                            ctx.setLineDash([]);
                        }
                    }
                }

                for (let key in StagesData) {
                    if (!Progress.unlocked[key]) continue;
                    let node = StagesData[key];
                    let isSelected = (this.selectedId === key);
                    let isCleared = Progress.cleared[key];

                    ctx.shadowBlur = isSelected ? 30 : 15; 
                    ctx.beginPath();
                    ctx.arc(node.x, node.y, isSelected ? 25 : 15, 0, Math.PI * 2);
                    ctx.fillStyle = isSelected ? '#00FF88' : (isCleared ? '#00AA55' : 'rgba(0, 255, 136, 0.15)');
                    ctx.fill();
                    ctx.strokeStyle = isSelected ? '#FFF' : '#00FF88';
                    ctx.lineWidth = isSelected ? 4 : 2;
                    ctx.stroke();

                    if (isCleared && Progress.stars[key]) {
                        ctx.shadowBlur = 15;
                        ctx.shadowColor = varColor('--gold-star');
                        ctx.fillStyle = varColor('--gold-star');
                        ctx.font = '14px Arial';
                        ctx.textAlign = 'center';
                        let stars = Progress.stars[key];
                        ctx.fillText('★'.repeat(stars) + '☆'.repeat(3-stars), node.x, node.y - 30);
                        ctx.shadowColor = '#00FF88'; 
                    }

                    if (isSelected) {
                        ctx.fillStyle = '#00FF88';
                        ctx.font = '20px "Share Tech Mono"';
                        ctx.textAlign = 'center';
                        ctx.fillText(node.name, node.x, node.y + 45);
                        ctx.font = '14px "Share Tech Mono"';
                        ctx.fillStyle = '#E0FFE8'; 
                        ctx.fillText(node.desc, node.x, node.y + 65);
                    }
                }
                
                ctx.shadowBlur = 0;
            }
        };

        function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

        // ==========================================
        // 5. 플레이어 (화살표) 개체
        // ==========================================
        class Player {
            constructor(x, y) {
                this.pos = new Vec2(x, y);
                this.vel = new Vec2(0, 0);
                this.acc = new Vec2(0, 0);
                this.size = 6; 
                
                this.friction = 0.985; // 매우 미끄러움
                this.moveSpeed = 0.25; // 묵직한 가속
                this.maxSpeed = 12;
                
                this.angle = 0;
                this.trail = [];
                
                this.boostPower = 15;
                this.boostCooldown = 0;
                this.stunCooldown = 0; 
                this.isDead = false;
            }

            update() {
                if (this.isDead) return;

                let inputVec = new Vec2(0, 0);
                
                if (this.stunCooldown <= 0) {
                    if (Game.keys['ArrowUp']) inputVec.y -= 1;
                    if (Game.keys['ArrowDown']) inputVec.y += 1;
                    if (Game.keys['ArrowLeft']) inputVec.x -= 1;
                    if (Game.keys['ArrowRight']) inputVec.x += 1;

                    if (inputVec.mag() > 0) {
                        inputVec.normalize().mult(this.moveSpeed);
                        this.acc.add(inputVec);
                    }

                    if (Game.keys['Space'] && this.boostCooldown <= 0) {
                        if (this.vel.mag() > 0.5) {
                            let boostVec = this.vel.clone().normalize().mult(this.boostPower);
                            this.vel.add(boostVec);
                        } else if (inputVec.mag() > 0) {
                            let boostVec = inputVec.clone().normalize().mult(this.boostPower);
                            this.vel.add(boostVec);
                        }
                        this.boostCooldown = 60; 
                        Game.cameraShake = 10;
                        createParticles(this.pos.x, this.pos.y, 10, '#00FF88');
                        Terminal.glitch(0.5); 
                    }
                } else {
                    this.stunCooldown--; 
                }
                
                if (this.boostCooldown > 0) this.boostCooldown--;

                this.vel.add(this.acc);
                this.vel.mult(this.friction);
                
                if (this.vel.mag() > this.maxSpeed && this.boostCooldown < 40) {
                    this.vel.normalize().mult(this.maxSpeed);
                }

                this.moveAndCollide();

                this.acc.mult(0); 

                if (this.vel.mag() > 0.2) {
                    this.angle = Math.atan2(this.vel.y, this.vel.x);
                }

                this.trail.push({ x: this.pos.x, y: this.pos.y });
                if (this.trail.length > 20) this.trail.shift();

                this.checkInteractions();
            }

            moveAndCollide() {
                // X축
                this.pos.x += this.vel.x;
                for (let wall of Game.stage.walls) {
                    if (this.checkAABB(wall)) {
                        if (this.vel.x > 0) this.pos.x = wall.x - this.size;
                        else this.pos.x = wall.x + wall.w + this.size;
                        
                        if (Math.abs(this.vel.x) > 2) {
                            Game.cameraShake = Math.abs(this.vel.x) * 0.5;
                            createParticles(this.pos.x, this.pos.y, 5, '#00FF88');
                            this.stunCooldown = 30; 
                        }
                        this.vel.x *= -0.15; 
                    }
                }
                
                // 문(Door) 확인 (X축)
                if (Game.stage.doors) {
                    for (let door of Game.stage.doors) {
                        if (!Progress.items[door.req] && this.checkAABB(door)) {
                            if (this.vel.x > 0) this.pos.x = door.x - this.size;
                            else this.pos.x = door.x + door.w + this.size;
                            
                            if (Math.abs(this.vel.x) > 2) {
                                Game.cameraShake = Math.abs(this.vel.x) * 0.5;
                                createParticles(this.pos.x, this.pos.y, 5, '#FF0044');
                                this.stunCooldown = 30; 
                            }
                            this.vel.x *= -0.15; 
                        }
                    }
                }

                // Y축
                this.pos.y += this.vel.y;
                for (let wall of Game.stage.walls) {
                    if (this.checkAABB(wall)) {
                        if (this.vel.y > 0) this.pos.y = wall.y - this.size;
                        else this.pos.y = wall.y + wall.h + this.size;
                        
                        if (Math.abs(this.vel.y) > 2) {
                            Game.cameraShake = Math.abs(this.vel.y) * 0.5;
                            createParticles(this.pos.x, this.pos.y, 5, '#00FF88');
                            this.stunCooldown = 30; 
                        }
                        this.vel.y *= -0.15; 
                    }
                }

                // 문(Door) 확인 (Y축)
                if (Game.stage.doors) {
                    for (let door of Game.stage.doors) {
                        if (!Progress.items[door.req] && this.checkAABB(door)) {
                            if (this.vel.y > 0) this.pos.y = door.y - this.size;
                            else this.pos.y = door.y + door.h + this.size;
                            
                            if (Math.abs(this.vel.y) > 2) {
                                Game.cameraShake = Math.abs(this.vel.y) * 0.5;
                                createParticles(this.pos.x, this.pos.y, 5, '#FF0044');
                                this.stunCooldown = 30; 
                            }
                            this.vel.y *= -0.15; 
                        }
                    }
                }

                for (let hazard of Game.stage.hazards) {
                    if (this.checkAABB(hazard)) this.die();
                }
            }

            checkAABB(rect) {
                return (this.pos.x + this.size > rect.x && 
                        this.pos.x - this.size < rect.x + rect.w && 
                        this.pos.y + this.size > rect.y && 
                        this.pos.y - this.size < rect.y + rect.h);
            }

            checkInteractions() {
                // 페이크 월 (비밀공간) 투명도 조절
                for (let fw of Game.stage.fakeWalls) {
                    if (this.checkAABB(fw)) fw.opacity = Math.max(0.1, fw.opacity - 0.1);
                    else fw.opacity = Math.min(1.0, fw.opacity + 0.05);
                }

                // 아이템 획득
                for (let i = Game.stage.items.length - 1; i >= 0; i--) {
                    let item = Game.stage.items[i];
                    if (this.checkAABB(item)) {
                        Progress.items[item.id] = true;
                        Progress.inventory.push(item.name);
                        createParticles(item.x + item.w/2, item.y + item.h/2, 20, '#FFD700');
                        Game.stage.items.splice(i, 1); 
                        document.getElementById('hud-top-right').innerHTML = `DIR: ${Game.stage.name}<br>ITEMS: ${Progress.inventory.length}`;
                        
                        if(item.id === "KEY_VOID") {
                            Progress.unlocked["st_void"] = true;
                            Terminal.glitch(1.0);
                        }
                    }
                }

                // 골 지점
                if (this.checkAABB(Game.stage.goal)) {
                    loadTerminalState();
                }
            }

            die(isTimeOut = false) {
                if (this.isDead) return;
                this.isDead = true;
                Game.cameraShake = 20;
                createParticles(this.pos.x, this.pos.y, 30, '#FF0044');
                Terminal.glitch(1.0);
                
                let statusHud = document.getElementById('hud-status');
                statusHud.innerText = isTimeOut ? "ERR: TIME OUT" : "ERR: DATA CORRUPTED";
                statusHud.style.color = '#FF0044';

                setTimeout(() => {
                    statusHud.innerText = "STATUS: ONLINE";
                    statusHud.style.color = 'var(--neon-green)';
                    
                    if (isTimeOut) {
                        // 시간 초과 시 메인 맵으로 강제 복귀 (진행도 유지)
                        openMap();
                    } else {
                        // 일반적인 장애물 충돌 시 현재 스테이지 재시작
                        this.pos = new Vec2(Game.stage.spawn.x, Game.stage.spawn.y);
                        this.vel.mult(0);
                        this.trail = [];
                        this.isDead = false;
                        this.stunCooldown = 0;
                        Game.timeRemaining = Game.stage.timeLimit;
                    }
                }, 1000); 
            }

            draw(ctx) {
                if (this.isDead) return;

                ctx.beginPath();
                for (let i = 0; i < this.trail.length; i++) {
                    let pt = this.trail[i];
                    if (i === 0) ctx.moveTo(pt.x, pt.y);
                    else ctx.lineTo(pt.x, pt.y);
                }
                ctx.strokeStyle = `rgba(0, 255, 136, 0.4)`;
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.save();
                ctx.translate(this.pos.x, this.pos.y);
                ctx.rotate(this.angle);

                let arrowColor = (this.stunCooldown > 0 && Math.floor(Date.now() / 100) % 2 === 0) ? '#FF0044' : '#00FF88';

                ctx.shadowBlur = 10;
                ctx.shadowColor = arrowColor;
                ctx.fillStyle = arrowColor;

                ctx.beginPath();
                ctx.moveTo(15, 0); ctx.lineTo(-10, -10); ctx.lineTo(-5, 0); ctx.lineTo(-10, 10);
                ctx.closePath(); ctx.fill();

                if (this.boostCooldown > 50) {
                    ctx.fillStyle = '#FFFFFF';
                    ctx.beginPath(); ctx.arc(-8, 0, 4, 0, Math.PI * 2); ctx.fill();
                }

                ctx.restore();
            }
        }

        let player;

        // ==========================================
        // 6. 파티클 및 렌더링 
        // ==========================================
        function createParticles(x, y, count, color) {
            for (let i = 0; i < count; i++) {
                Game.particles.push({
                    pos: new Vec2(x, y),
                    vel: new Vec2((Math.random() - 0.5) * 10, (Math.random() - 0.5) * 10),
                    life: 1.0, color: color, size: Math.random() * 3 + 1
                });
            }
        }

        function updateAndDrawParticles(ctx) {
            for (let i = Game.particles.length - 1; i >= 0; i--) {
                let p = Game.particles[i];
                p.pos.add(p.vel); p.vel.mult(0.9); p.life -= 0.05;
                if (p.life <= 0) { Game.particles.splice(i, 1); continue; }
                
                ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
                ctx.fillRect(p.pos.x, p.pos.y, p.size, p.size);
                ctx.globalAlpha = 1.0;
            }
        }

        // ==========================================
        // 7. 터미널 & 스토리 시스템
        // ==========================================
        const Terminal = {
            overlay: document.getElementById('terminal-overlay'),
            output: document.getElementById('terminal-output'),
            inputContainer: document.getElementById('terminal-input-container'),
            inputField: document.getElementById('terminal-input'),
            
            lines: [], currentLineIdx: 0, charIdx: 0, typingTimer: null, expectedAnswer: "",
            failedAttempts: 0, 
            maxAttempts: 3,    

            startSequence(dialogArray, answer) {
                Game.state = STATE.TERMINAL;
                this.overlay.classList.add('active');
                this.output.innerHTML = '';
                this.inputContainer.style.display = 'none';
                this.inputField.value = '';
                
                this.lines = dialogArray;
                this.currentLineIdx = 0; this.charIdx = 0;
                this.expectedAnswer = answer;
                this.failedAttempts = 0; 
                
                this.calculateScore();
                this.typeNextLine();
            },

            calculateScore() {
                let tr = Game.timeRemaining;
                let targets = Game.stage.starTargets;
                let stars = 1;
                if (tr >= targets[0]) stars = 3;
                else if (tr >= targets[1]) stars = 2;

                let timeStr = `CLEAR TIME: ${(Game.stage.timeLimit - tr).toFixed(2)}s`;
                let starStr = `RANK: ` + '★'.repeat(stars) + '☆'.repeat(3-stars);
                
                this.lines.unshift("====================================");
                this.lines.unshift(starStr);
                this.lines.unshift(timeStr);
                this.lines.unshift("====================================");

                Progress.cleared[Game.stage.id] = true;
                if (!Progress.stars[Game.stage.id] || Progress.stars[Game.stage.id] < stars) {
                    Progress.stars[Game.stage.id] = stars;
                }
                for (let unlockId of Game.stage.unlocks) {
                    Progress.unlocked[unlockId] = true;
                }
            },

            typeNextLine() {
                if (this.currentLineIdx >= this.lines.length) {
                    if (this.expectedAnswer) {
                        this.inputContainer.style.display = 'flex';
                        this.inputField.focus();
                    } else {
                        setTimeout(() => this.returnToMap(), 2000);
                    }
                    return;
                }

                let lineText = this.lines[this.currentLineIdx];
                let lineDiv = document.createElement('div');
                lineDiv.className = 'terminal-line';
                if (lineText.includes("오류") || lineText.includes("경고") || lineText.includes("ERR")) {
                    lineDiv.classList.add('error-msg');
                } else if (lineText.includes("★")) {
                    lineDiv.classList.add('item-msg');
                } else {
                    lineDiv.classList.add('sys-msg');
                }
                this.output.appendChild(lineDiv);
                
                this.charIdx = 0;
                this.typeChar(lineDiv, lineText);
            },

            typeChar(element, text) {
                if (this.charIdx < text.length) {
                    let char = text.charAt(this.charIdx);
                    if (Math.random() < 0.03) {
                        let glitchSpan = document.createElement('span');
                        glitchSpan.className = 'glitch-text'; glitchSpan.style.color = 'red';
                        glitchSpan.textContent = String.fromCharCode(33 + Math.random()*50);
                        element.appendChild(glitchSpan);
                        setTimeout(() => {
                            glitchSpan.className = ''; glitchSpan.style.color = ''; glitchSpan.textContent = char;
                        }, 50);
                    } else {
                        element.appendChild(document.createTextNode(char));
                    }
                    
                    this.charIdx++;
                    this.output.scrollTop = this.output.scrollHeight;
                    
                    let delay = 20 + Math.random() * 30;
                    if (char === '.' || char === '?') delay = 200;
                    
                    this.typingTimer = setTimeout(() => this.typeChar(element, text), delay);
                } else {
                    this.currentLineIdx++;
                    setTimeout(() => this.typeNextLine(), 300);
                }
            },

            handleInput() {
                let val = this.inputField.value.trim().toUpperCase();
                this.inputField.value = '';
                
                let echoDiv = document.createElement('div');
                echoDiv.className = 'terminal-line'; echoDiv.style.color = '#fff';
                echoDiv.innerText = `>_ ${val}`;
                this.output.appendChild(echoDiv);

                let isCorrect = Array.isArray(this.expectedAnswer) ? this.expectedAnswer.includes(val) : (val === this.expectedAnswer);

                if (isCorrect) {
                    let successDiv = document.createElement('div');
                    successDiv.className = 'terminal-line sys-msg';
                    
                    if (val === "SILENCE" || val === "SHUTDOWN") { 
                        successDiv.innerText = "INITIATING SHUTDOWN SEQUENCE...";
                        this.output.appendChild(successDiv);
                        setTimeout(() => this.endGame(), 2000);
                    } else {
                        successDiv.innerText = "ACCESS GRANTED. DATA SAVED.";
                        this.output.appendChild(successDiv);
                        this.inputContainer.style.display = 'none';
                        setTimeout(() => this.returnToMap(), 1500);
                    }
                } else {
                    this.failedAttempts++;
                    
                    if (this.failedAttempts >= this.maxAttempts) {
                        let failDiv = document.createElement('div');
                        failDiv.className = 'terminal-line error-msg';
                        failDiv.innerText = "FATAL ERROR: MULTIPLE INVALID ENTRIES DETECTED. RETURNING TO NAVIGATOR...";
                        this.output.appendChild(failDiv);
                        this.inputContainer.style.display = 'none';
                        this.glitch(2.0);
                        Game.cameraShake = 30;
                        
                        // 2.5초 후 초기화 없이 맵으로만 강제 복귀
                        setTimeout(() => {
                            this.overlay.classList.remove('active');
                            openMap();
                            this.glitch(1.5);
                        }, 2500);
                    } else {
                        let failDiv = document.createElement('div');
                        failDiv.className = 'terminal-line error-msg';
                        failDiv.innerText = `ACCESS DENIED. INVALID DIRECTIVE. (WARNING: ${this.failedAttempts}/${this.maxAttempts})`;
                        this.output.appendChild(failDiv);
                        this.glitch(1.0);
                        Game.cameraShake = 15;
                    }
                }
                this.output.scrollTop = this.output.scrollHeight;
            },

            glitch(intensity) {
                let container = document.getElementById('game-container');
                container.classList.add('glitch-screen');
                Game.glitchIntensity = intensity;
                setTimeout(() => container.classList.remove('glitch-screen'), 300);
            },

            returnToMap() {
                this.overlay.classList.remove('active');
                openMap();
            },

            endGame() {
                Game.state = STATE.GAMEOVER;
                this.overlay.classList.remove('active');
                this.glitch(2.0);
                let title = document.getElementById('title-screen');
                title.style.display = 'flex'; title.style.opacity = '0';
                
                setTimeout(() => {
                    title.style.transition = 'opacity 3s'; title.style.opacity = '1';
                    title.innerHTML = `
                        <h1 style="color:var(--danger-red); text-shadow:0 0 20px var(--danger-red);">SYSTEM SHUTDOWN</h1>
                        <p style="animation:none; color:#888;">The Ark sleeps in the void forever.</p>
                        <p style="font-size: 14px; margin-top:50px; cursor:pointer;" onclick="location.reload()">[ REBOOT REALITY ]</p>
                    `;
                }, 1000);
            }
        };

        // ==========================================
        // 8. 메인 게임 흐름 제어
        // ==========================================
        function initGame() {
            document.getElementById('title-screen').style.display = 'none';
            openMap();
            requestAnimationFrame(gameLoop);
        }

        function openMap() {
            Game.state = STATE.MAP;
            document.getElementById('map-overlay').classList.add('active');
            Terminal.glitch(0.5);
        }

        function startGame(stageId) {
            Game.currentStageId = stageId;
            Game.stage = StagesData[stageId];
            
            if(Game.stage.items) {
                Game.stage.items = Game.stage.items.filter(item => !Progress.items[item.id]);
            }
            if(Game.stage.fakeWalls) {
                Game.stage.fakeWalls.forEach(fw => fw.opacity = 1);
            }

            player = new Player(Game.stage.spawn.x, Game.stage.spawn.y);
            Game.particles = [];
            Game.camera = new Vec2(player.pos.x, player.pos.y);
            Game.timeRemaining = Game.stage.timeLimit;
            
            document.getElementById('hud-top-right').innerHTML = `DIR: ${Game.stage.name}<br>ITEMS: ${Progress.inventory.length}`;
            document.getElementById('hud-status').innerText = "STATUS: ONLINE";
            document.getElementById('hud-status').style.color = 'var(--neon-green)';
            
            Game.state = STATE.PLAYING;
            Terminal.glitch(0.5);
        }

        function loadTerminalState() {
            Terminal.startSequence(Game.stage.terminalDialog, Game.stage.puzzleAnswer);
        }

        // ==========================================
        // 9. 렌더링 및 루프
        // ==========================================
        function drawStage() {
            ctx.save();
            
            let targetCamX = player.pos.x - GAME_WIDTH / 2;
            let targetCamY = player.pos.y - GAME_HEIGHT / 2;
            
            Game.camera.x += (targetCamX - Game.camera.x) * 0.1;
            Game.camera.y += (targetCamY - Game.camera.y) * 0.1;

            if (Game.cameraShake > 0) {
                Game.camera.x += (Math.random() - 0.5) * Game.cameraShake;
                Game.camera.y += (Math.random() - 0.5) * Game.cameraShake;
                Game.cameraShake *= 0.9;
                if (Game.cameraShake < 0.5) Game.cameraShake = 0;
            }

            ctx.translate(-Game.camera.x, -Game.camera.y);

            ctx.strokeStyle = 'rgba(0, 255, 136, 0.05)';
            ctx.lineWidth = 1; ctx.beginPath();
            let startX = Math.floor(Game.camera.x / 50) * 50;
            let startY = Math.floor(Game.camera.y / 50) * 50;
            for (let i = startX - 100; i < startX + GAME_WIDTH + 100; i += 50) { ctx.moveTo(i, Game.camera.y - 100); ctx.lineTo(i, Game.camera.y + GAME_HEIGHT + 100); }
            for (let i = startY - 100; i < startY + GAME_HEIGHT + 100; i += 50) { ctx.moveTo(Game.camera.x - 100, i); ctx.lineTo(Game.camera.x + GAME_WIDTH + 100, i); }
            ctx.stroke();

            ctx.fillStyle = '#0a1a10'; ctx.strokeStyle = '#00FF88'; ctx.lineWidth = 2;
            for (let w of Game.stage.walls) {
                ctx.fillRect(w.x, w.y, w.w, w.h); ctx.strokeRect(w.x, w.y, w.w, w.h);
                ctx.beginPath();
                for(let i=0; i<w.w; i+=10) { ctx.moveTo(w.x+i, w.y); ctx.lineTo(w.x+i-10, w.y+10); }
                ctx.strokeStyle = 'rgba(0, 255, 136, 0.2)'; ctx.stroke();
                ctx.strokeStyle = '#00FF88';
            }

            for (let fw of Game.stage.fakeWalls) {
                ctx.fillStyle = `rgba(10, 26, 16, ${fw.opacity})`;
                ctx.strokeStyle = `rgba(0, 255, 136, ${fw.opacity})`;
                ctx.lineWidth = 2;
                ctx.fillRect(fw.x, fw.y, fw.w, fw.h); ctx.strokeRect(fw.x, fw.y, fw.w, fw.h);
                ctx.beginPath();
                for(let i=0; i<fw.w; i+=10) { ctx.moveTo(fw.x+i, fw.y); ctx.lineTo(fw.x+i-10, fw.y+10); }
                ctx.strokeStyle = `rgba(0, 255, 136, ${fw.opacity * 0.2})`; ctx.stroke();
            }

            for (let item of Game.stage.items) {
                ctx.fillStyle = 'rgba(255, 215, 0, 0.2)';
                ctx.fillRect(item.x, item.y, item.w, item.h);
                ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 2;
                ctx.strokeRect(item.x, item.y, item.w, item.h);
                ctx.fillStyle = '#FFD700'; ctx.textAlign = 'center'; ctx.font = '10px Arial';
                ctx.fillText("KEY", item.x + item.w/2, item.y + item.h/2 + 3);
            }

            if (Game.stage.doors) {
                for (let door of Game.stage.doors) {
                    if (Progress.items[door.req]) {
                        ctx.fillStyle = 'rgba(0, 255, 136, 0.1)'; ctx.fillRect(door.x, door.y, door.w, door.h);
                        ctx.strokeStyle = '#00FF88'; ctx.setLineDash([5, 5]);
                        ctx.strokeRect(door.x, door.y, door.w, door.h); ctx.setLineDash([]);
                        ctx.fillStyle = '#00FF88'; ctx.font = '12px "Share Tech Mono"'; ctx.textAlign = 'center';
                        ctx.fillText("UNLOCKED", door.x + door.w/2, door.y + door.h/2 + 4);
                    } else {
                        ctx.fillStyle = '#1a0a0a'; ctx.fillRect(door.x, door.y, door.w, door.h);
                        ctx.strokeStyle = '#FF0044'; ctx.strokeRect(door.x, door.y, door.w, door.h);
                        ctx.beginPath();
                        for(let i=0; i<door.w; i+=10) { ctx.moveTo(door.x+i, door.y); ctx.lineTo(door.x+i-10, door.y+10); }
                        ctx.strokeStyle = 'rgba(255, 0, 68, 0.3)'; ctx.stroke();
                        ctx.fillStyle = '#FF0044'; ctx.font = '12px "Share Tech Mono"'; ctx.textAlign = 'center';
                        ctx.fillText("LOCKED", door.x + door.w/2, door.y + door.h/2 + 4);
                    }
                }
            }

            ctx.fillStyle = 'rgba(255, 0, 68, 0.2)'; ctx.strokeStyle = '#FF0044';
            for (let h of Game.stage.hazards) {
                ctx.fillRect(h.x, h.y, h.w, h.h); ctx.strokeRect(h.x, h.y, h.w, h.h);
                let timeOffset = Date.now() / 200; ctx.beginPath();
                ctx.moveTo(h.x, h.y + (timeOffset % 10)); ctx.lineTo(h.x + h.w, h.y + (timeOffset % 10));
                ctx.strokeStyle = 'rgba(255, 0, 68, 0.5)'; ctx.stroke(); ctx.strokeStyle = '#FF0044';
            }

            let g = Game.stage.goal;
            ctx.fillStyle = 'rgba(0, 255, 136, 0.1)'; ctx.fillRect(g.x, g.y, g.w, g.h);
            ctx.strokeStyle = '#00FF88'; ctx.setLineDash([5, 5]);
            ctx.lineDashOffset = -(Date.now() / 50) % 10;
            ctx.strokeRect(g.x, g.y, g.w, g.h); ctx.setLineDash([]);
            ctx.fillStyle = '#00FF88'; ctx.font = '12px "Share Tech Mono"'; ctx.textAlign = 'center';
            ctx.fillText("OUTPUT", g.x + g.w/2, g.y + g.h/2 + 4);

            ctx.textAlign = 'left'; ctx.font = '16px "Share Tech Mono"';
            for (let t of Game.stage.texts) {
                ctx.fillStyle = t.color || 'rgba(0, 255, 136, 0.6)';
                let textStr = t.str;
                if (Math.random() < 0.01) textStr = textStr.replace(/[a-zA-Z]/, String.fromCharCode(33 + Math.random()*50));
                ctx.fillText(textStr, t.x, t.y);
            }

            updateAndDrawParticles(ctx);
            player.draw(ctx);
            ctx.restore();
        }

        function applyCanvasGlitch() {
            if (Game.glitchIntensity > 0) {
                let shiftX = (Math.random() - 0.5) * 20 * Game.glitchIntensity;
                let shiftY = (Math.random() - 0.5) * 20 * Game.glitchIntensity;
                ctx.globalCompositeOperation = 'screen';
                ctx.fillStyle = 'rgba(255,0,0,0.3)'; ctx.fillRect(shiftX, shiftY, GAME_WIDTH, GAME_HEIGHT);
                ctx.fillStyle = 'rgba(0,0,255,0.3)'; ctx.fillRect(-shiftX, -shiftY, GAME_WIDTH, GAME_HEIGHT);
                ctx.globalCompositeOperation = 'source-over';
                Game.glitchIntensity -= 0.05;
                if(Game.glitchIntensity < 0) Game.glitchIntensity = 0;
            }
        }

        function gameLoop(timestamp) {
            if (Game.state === STATE.GAMEOVER) return;

            let dt = timestamp - Game.lastTime;
            if (dt > 100) dt = 16; 
            Game.lastTime = timestamp;

            ctx.fillStyle = 'rgba(5, 5, 5, 0.3)';
            ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

            if (Game.state === STATE.MAP) {
                MapNav.draw(ctx);
            } else if (Game.state === STATE.PLAYING) {
                if (!player.isDead) {
                    Game.timeRemaining -= dt / 1000;
                    if (Game.timeRemaining <= 0) {
                        Game.timeRemaining = 0;
                        player.die(true); 
                    }
                }
                
                let timerElement = document.getElementById('hud-time');
                timerElement.innerText = `TIME: ${Game.timeRemaining.toFixed(2)}s`;
                if (Game.timeRemaining <= 5 && !player.isDead) timerElement.style.animation = 'blink 0.5s infinite';
                else timerElement.style.animation = 'none';

                player.update();
                drawStage();
            } else if (Game.state === STATE.TERMINAL) {
                drawStage(); 
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(0,0,GAME_WIDTH, GAME_HEIGHT);
            }

            applyCanvasGlitch();
            requestAnimationFrame(gameLoop);
        }

        // ==========================================
        document.getElementById('start-btn').addEventListener('click', () => {
            if (Game.state === STATE.TITLE) initGame();
        });

    </script>
</body>
</html>
