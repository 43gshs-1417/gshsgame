<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>경과 메트리 대쉬 - 극악 난이도 패치 BY 유민준</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background-color: #000; color: white; font-family: 'Noto Sans KR', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; touch-action: none; }
        #game-container { position: relative; width: 100%; max-width: 1000px; aspect-ratio: 16 / 9; background: linear-gradient(to bottom, #020617, #1e1b4b, #312e81); box-shadow: 0 0 60px rgba(59, 130, 246, 0.6); border: 4px solid #38bdf8; border-radius: 12px; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; cursor: pointer; }
        #init-layer, #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(5px); transition: opacity 0.3s; z-index: 30; cursor: pointer; }
        #ui-layer { z-index: 20; background: rgba(0, 0, 0, 0.7); cursor: default; }
        .hidden { opacity: 0; pointer-events: none !important; }
        .title { font-family: 'Black Han Sans', sans-serif; font-size: 5rem; color: #facc15; text-shadow: 4px 4px 0 #b45309, 0 0 20px rgba(250,204,21,0.5); margin-bottom: 10px; text-align: center; }
        .subtitle { font-size: 1.3rem; margin-bottom: 40px; color: #e2e8f0; text-align: center; line-height: 1.6; }
        .btn { padding: 20px 70px; font-size: 2.2rem; font-family: 'Black Han Sans', sans-serif; background: linear-gradient(to bottom, #ef4444, #b91c1c); color: white; border: none; border-radius: 12px; cursor: pointer; box-shadow: 0 8px 0 #7f1d1d, 0 15px 20px rgba(0,0,0,0.4); transition: transform 0.1s; pointer-events: auto; }
        .btn:active { transform: translateY(8px); box-shadow: 0 0 0 #7f1d1d; }
        #progress-container { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); width: 70%; height: 15px; background: rgba(0,0,0,0.5); border-radius: 10px; border: 2px solid rgba(255,255,255,0.4); z-index: 10; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: #38bdf8; transition: width 0.1s linear; }
        #hud-display { position: absolute; top: 45px; left: 50%; transform: translateX(-50%); display: flex; gap: 40px; font-family: 'Black Han Sans', sans-serif; font-size: 1.8rem; color: white; text-shadow: 2px 2px 4px black; z-index: 10; }
        .crown-hud { color: #facc15; }
        .controls-hint { position: absolute; bottom: 15px; font-size: 1rem; color: rgba(255,255,255,0.9); text-align: center; width: 100%; font-weight: bold; z-index: 10; pointer-events: none; }
        #mode-alert { position: absolute; top: 30%; width: 100%; text-align: center; font-family: 'Black Han Sans', sans-serif; font-size: 4rem; color: #facc15; text-shadow: 3px 3px 0 #b45309; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 15; }
        @keyframes pulse { 0% { opacity: 0.5; transform: scale(0.95); } 50% { opacity: 1; transform: scale(1.05); } 100% { opacity: 0.5; transform: scale(0.95); } }
        .pulse-text { animation: pulse 1.5s infinite; color: #34d399; font-size: 2.5rem; font-family: 'Black Han Sans'; text-shadow: 2px 2px 0 #064e3b; margin-bottom: 20px;}
    </style>
</head>
<body>
    <div id="game-container">
        <div id="init-layer">
            <div class="title" style="font-size: 4.5rem;">경과 메트리 대쉬</div>
            <div class="pulse-text">🎵 화면을 클릭하여 시작 준비!</div>
        </div>

        <div id="ui-layer" class="hidden">
            <div class="title" id="main-title">경과 메트리 대쉬</div>
            <div class="subtitle" id="sub-title">
                <b>🔥 V2.0 지옥의 비행 패치 🔥</b><br><br>
                <b>[점프]</b> 화면 터치 / 스페이스바 (꾹 누르고 있으면 연속 점프!)<br>
                <b>[비행기]</b> 누르기(상승) / 떼기(하강)<br>
                <span style="color: #ef4444; font-weight: bold;">더욱 좁아진 가시밭 비행 구역을 조심하세요!</span>
            </div>
            <button class="btn" id="start-btn">플레이 시작</button>
        </div>

        <div id="progress-container"><div id="progress-bar"></div></div>
        <div id="hud-display">
            <div id="score-display">0%</div>
            <div class="crown-hud">👑 <span id="crown-display">0 / 3</span></div>
        </div>
        <div id="mode-alert">비행 모드!</div>
        <div class="controls-hint">PC: 스페이스바(연속점프 지원) &nbsp;|&nbsp; 모바일: 화면 터치</div>
        <canvas id="gameCanvas" width="1000" height="562"></canvas>
    </div>

    <audio id="bgm" src="bgm.mp3" preload="auto"></audio>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const initLayer = document.getElementById('init-layer');
        const uiLayer = document.getElementById('ui-layer');
        const startBtn = document.getElementById('start-btn');
        const progressBar = document.getElementById('progress-bar');
        const scoreDisplay = document.getElementById('score-display');
        const crownDisplay = document.getElementById('crown-display');
        const modeAlert = document.getElementById('mode-alert');
        const bgm = document.getElementById('bgm');

        const GAME_SPEED = 7.5; 
        const GRID_SIZE = 40;   
        const GROUND_HEIGHT = 90;
        const GROUND_Y = canvas.height - GROUND_HEIGHT;

        const PHYSICS = {
            CUBE: { gravity: 1.15, jumpForce: -15.5, maxFall: 16 },
            SHIP: { gravity: 0.45, thrust: 0.85, maxFall: 8, maxRise: -8 }
        };

        let state = 'INIT'; let animationId; let scrollX = 0; 
        let isInputHolding = false; let jumpBuffer = 0; let isJumpKeyHeld = false;
        let crownsCollected = 0; const totalCrowns = 3;

        let player = { mode: 'CUBE', x: 200, y: 0, width: 34, height: 34, vy: 0, isGrounded: false, coyoteTime: 0, rotation: 0, trail: [] };
        let blocks = [], slopes = [], spikes = [], portals = [], jumpRings = [], crowns = [], particles = [];
        let mapWidth = 0;

        function generateLevel() {
            blocks = []; slopes = []; spikes = []; portals = []; jumpRings = []; crowns = []; crownsCollected = 0;
            mapWidth = 850 * GRID_SIZE; 

            const addB = (x, y, w=1, h=1) => blocks.push({x: x*GRID_SIZE, y: GROUND_Y - (y+h)*GRID_SIZE, w: w*GRID_SIZE, h: h*GRID_SIZE});
            const addSl = (x, y, type) => slopes.push({x: x*GRID_SIZE, y: GROUND_Y - (y+1)*GRID_SIZE, w: GRID_SIZE, h: GRID_SIZE, type: type});
            const addSp = (x, y, type='UP') => spikes.push({x: x*GRID_SIZE, y: GROUND_Y - (y+1)*GRID_SIZE, w: GRID_SIZE, h: GRID_SIZE, type: type});
            const addR = (x, y) => jumpRings.push({x: x*GRID_SIZE + GRID_SIZE/2, y: GROUND_Y - y*GRID_SIZE - GRID_SIZE/2, radius: 18, used: false});
            const addC = (x, y) => crowns.push({x: x*GRID_SIZE + GRID_SIZE/2, y: GROUND_Y - y*GRID_SIZE - GRID_SIZE/2, size: 24, collected: false});
            const addP = (x, y, type) => portals.push({x: x*GRID_SIZE, y: GROUND_Y - y*GRID_SIZE - 120, w: 40, h: 120, type: type, used: false});

            // ==========================================
            // [0-280 구간] 큐브 1: 동일 (웜업 구간)
            // ==========================================
            addSp(25, 0); 
            addB(40, 0, 2, 2); addSp(42, 0); addSp(43, 0); 
            addSp(60, 0); addSp(61, 0); addSp(62, 0); addSp(63, 0); addSp(64, 0);
            addR(62, 3.5); 
            addB(80, 0, 2, 1); addB(82, 0, 2, 2); addB(84, 0, 2, 3);
            addSp(86, 0); addSp(87, 0); addSp(88, 0);
            addSl(110, 0, 'UP'); addSl(111, 1, 'UP'); addB(112, 0, 2, 2);
            addSp(114, 0); addSp(115, 0); addSp(116, 0); addR(115, 4.5);
            addB(119, 0, 2, 3); 
            addB(150, 0, 2, 5); addR(146, 3);
            addSp(180, 0); addSp(184, 0); addSp(188, 0);
            addB(220, 0, 3, 2); addSl(223, 1, 'DOWN'); addSp(224, 0); addSp(225, 0); addR(225, 3.5);

            addP(280, 0, 'SHIP'); // 헬게이트 오픈

            // ==========================================
            // [280-580 구간] 비행: 간격 압축 & 맹독성 가시 추가
            // ==========================================
            // 1. 좁은 틈 (기본 기둥)
            addB(290, 0, 2, 4); addB(290, 9, 2, 5);
            
            // 2. 고도 상승 기둥 (간격 15칸으로 단축)
            addB(305, 0, 2, 6); addB(305, 11, 2, 3);
            
            // 3. 고도 하강 기둥
            addB(320, 0, 2, 2); addB(320, 7, 2, 7);

            // ⭐ [왕관 1] 죽음의 1칸 터널 (가시 도배)
            // 상단 윗길(안전): y=7 이상
            addB(340, 8, 8, 5); // 천장 
            // 하단 아랫길(왕관): y=4~6 (하지만 위아래 가시로 인해 실제 공간은 1.5칸)
            addB(340, 0, 8, 3); // 바닥 블록 (y:0,1,2 점유)
            for(let i=0; i<8; i++) {
                addSp(340+i, 3, 'UP');    // 바닥에 깔린 가시
                addSp(340+i, 7, 'DOWN');  // 천장에 매달린 가시
            }
            addC(344, 5.2); // 정중앙을 완벽히 비행해야 획득

            // 4. 터널 탈출 후 즉시 회피
            addB(360, 0, 2, 5); addB(360, 10, 2, 4);
            
            // 5. 중앙 기둥 (상하로 가시 튀어나옴)
            addB(375, 4, 3, 5); 
            addSp(376, 9, 'UP'); addSp(376, 3, 'DOWN');

            // 6. 바닥 가시밭
            addB(390, 0, 4, 3); 
            addSp(390, 3); addSp(391, 3); addSp(392, 3); addSp(393, 3);

            // ⭐ [왕관 2] 하단 개구멍 돌파 
            addB(410, 4, 8, 5); // 공중 기둥
            for(let i=0; i<8; i++) {
                addSp(410+i, 0, 'UP');   // 바닥의 가시밭
                addSp(410+i, 3, 'DOWN'); // 기둥 아래 매달린 가시
            }
            addC(414, 2); // 바닥 가시와 기둥 가시 사이 아슬아슬한 높이에서 획득
            
            // 윗길(안전)은 좁게
            addB(410, 13, 8, 2);

            // 7. 극한의 상하 운동
            addB(435, 0, 2, 8); addSp(435, 8, 'UP'); addSp(436, 8, 'UP'); // 높게 날아야 함
            addB(450, 6, 2, 8); addSp(450, 5, 'DOWN'); addSp(451, 5, 'DOWN'); // 낮게 날아야 함
            
            // 8. 좁은 출구
            addB(465, 0, 4, 4); addB(465, 9, 4, 5);
            addB(485, 4, 3, 6);
            
            // 9. 마지막 압박 가시밭
            addB(505, 0, 6, 2); 
            addSp(505,2); addSp(507,2); addSp(509,2); addSp(510,2);
            
            addB(525, 0, 2, 6); addSp(525,6); addSp(526,6);
            addB(525, 11, 2, 3);
            
            addB(545, 0, 2, 3); addB(545, 8, 2, 6);
            addB(565, 0, 4, 5); addB(565, 10, 4, 4);

            addP(580, 0, 'CUBE'); // 지옥의 비행 끝, 큐브 복귀

            // ==========================================
            // [580-820 구간] 큐브 2: 화려한 피날레
            // ==========================================
            addSp(590, 0);

            // 계단 강하 + 공중 링 연계
            addB(610, 0, 2, 1); addB(612, 0, 2, 2); addB(614, 0, 2, 3);
            addSp(616, 0); addSp(617, 0); addSp(618, 0); addSp(619, 0);
            addR(617, 4.5); 

            addSl(640, 0, 'UP'); addSl(641, 1, 'UP'); 
            addR(644, 4); 
            addB(648, 0, 3, 2); 
            addB(670, 0, 2, 4); addR(666, 3);

            // ⭐ [왕관 3] 획득 가능하도록 물리적 수정 완료 (점프 링 추가)
            addSp(690, 0); addSp(691, 0); addSp(692, 0); // 넓은 가시밭
            addR(691, 3); // 타이밍 맞춰 가시 위에서 점프 링 작동!
            addC(691, 6.5); // 점프 링의 탄력을 받아야만 먹을 수 있는 높이

            // 리듬 점프
            addSp(720, 0); addSp(724, 0); addSp(728, 0);
            addB(750, 0, 4, 1); addSp(751, 1); addSp(752, 1);

            // 🌟 대망의 90%~ 구간 (통곡의 벽 삭제 및 매끄러운 진행)
            addSl(780, 0, 'UP'); addB(781, 0, 2, 2); addSl(783, 1, 'DOWN');
            addSp(784, 0); addSp(785, 0); 

            // 마지막 고비: 4연속 가시밭을 점프 링으로 넘기
            addR(800, 3); 
            addSp(802, 0); addSp(803, 0); addSp(804, 0); addSp(805, 0);

            // 820에 있던 거대한 벽(y=12) 삭제! 
            // 안전하게 착지 후 100% 골인 지점(850)까지 프리패스
            
            crownDisplay.innerText = `0 / ${totalCrowns}`;
        }

        // --- 마스코트 그리기 ---
        function drawKeuni(ctx, x, y, scale) {
            ctx.save(); ctx.translate(x, y); ctx.scale(scale, scale);
            let hover = Math.sin(Date.now() / 400) * 10; ctx.translate(0, hover);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.9)'; ctx.strokeStyle = 'black'; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.bezierCurveTo(-10, -10, -40, -30, -30, 10); ctx.bezierCurveTo(-20, 20, -10, 10, -10, 0); ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.bezierCurveTo(10, -10, 40, -30, 30, 10); ctx.bezierCurveTo(20, 20, 10, 10, 10, 0); ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(-10, 25); ctx.lineTo(-15, 40); ctx.lineTo(-20, 40); ctx.stroke(); 
            ctx.beginPath(); ctx.moveTo(10, 25); ctx.lineTo(15, 40); ctx.lineTo(20, 40); ctx.stroke(); 
            ctx.beginPath(); ctx.moveTo(-12, 5); ctx.quadraticCurveTo(-25, -5, -20, -15); ctx.stroke(); 
            ctx.beginPath(); ctx.moveTo(12, 5); ctx.quadraticCurveTo(25, 10, 20, 20); ctx.stroke(); 
            ctx.fillStyle = '#fde047';
            ctx.beginPath(); ctx.moveTo(-15, -10); ctx.quadraticCurveTo(-20, 15, 0, 35); ctx.quadraticCurveTo(20, 15, 15, -10); ctx.closePath(); ctx.fill(); ctx.stroke();
            ctx.save(); ctx.beginPath(); ctx.moveTo(-15, -10); ctx.quadraticCurveTo(-20, 15, 0, 35); ctx.quadraticCurveTo(20, 15, 15, -10); ctx.clip();
            ctx.fillStyle = '#b45309'; ctx.beginPath(); ctx.rect(-20, 20, 40, 20); ctx.fill(); 
            ctx.fillStyle = 'black'; ctx.beginPath(); ctx.rect(-20, 0, 40, 8); ctx.fill(); ctx.beginPath(); ctx.rect(-20, 12, 40, 6); ctx.fill(); ctx.restore();
            ctx.fillStyle = '#fde047'; ctx.beginPath(); ctx.arc(0, -20, 15, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(-5, -22); ctx.quadraticCurveTo(-2, -18, 1, -22); ctx.stroke(); 
            ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(6, -22, 4, 0, Math.PI*2); ctx.fill(); ctx.stroke(); 
            ctx.fillStyle = 'black'; ctx.beginPath(); ctx.arc(7, -22, 2, 0, Math.PI*2); ctx.fill(); 
            ctx.beginPath(); ctx.moveTo(10, -18); ctx.quadraticCurveTo(15, -15, 12, -22); ctx.stroke(); 
            ctx.beginPath(); ctx.moveTo(-5, -35); ctx.quadraticCurveTo(-10, -45, -5, -50); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(5, -35); ctx.quadraticCurveTo(10, -45, 5, -50); ctx.stroke();
            ctx.beginPath(); ctx.arc(-5, -50, 2, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(5, -50, 2, 0, Math.PI*2); ctx.fill();
            ctx.restore();
        }

        function drawDeuri(ctx, x, y, scale) {
            ctx.save(); ctx.translate(x, y); ctx.scale(scale, scale);
            let hover = Math.sin(Date.now() / 400 + Math.PI) * 10; ctx.translate(0, hover);
            ctx.lineWidth = 2; ctx.strokeStyle = 'black';
            ctx.beginPath(); ctx.moveTo(-15, 30); ctx.lineTo(-18, 55); ctx.lineTo(-25, 55); ctx.stroke(); 
            ctx.beginPath(); ctx.moveTo(15, 30); ctx.lineTo(18, 55); ctx.lineTo(25, 55); ctx.stroke(); 
            ctx.beginPath(); ctx.moveTo(-25, 0); ctx.quadraticCurveTo(-40, 10, -45, 5); ctx.stroke(); 
            ctx.beginPath(); ctx.moveTo(25, 0); ctx.quadraticCurveTo(40, 15, 55, -5); ctx.stroke(); 
            ctx.fillStyle = 'red';
            ctx.beginPath(); ctx.moveTo(55, -5); ctx.bezierCurveTo(55, -10, 50, -10, 50, -5); ctx.bezierCurveTo(50, 0, 55, 5, 55, 5); ctx.bezierCurveTo(55, 5, 60, 0, 60, -5); ctx.bezierCurveTo(60, -10, 55, -10, 55, -5); ctx.fill();
            ctx.fillStyle = 'black'; ctx.beginPath(); ctx.arc(-45, 5, 2, 0, Math.PI*2); ctx.fill(); 
            ctx.lineWidth = 3; ctx.fillStyle = 'white';
            ctx.beginPath(); for(let i=0; i<6; i++) { let a = Math.PI/3 * i - Math.PI/2; let hx = Math.cos(a) * 35; let hy = Math.sin(a) * 35; if(i===0) ctx.moveTo(hx, hy); else ctx.lineTo(hx, hy); } ctx.closePath(); ctx.fill(); ctx.stroke();
            ctx.lineWidth = 1; ctx.beginPath(); for(let i=0; i<6; i++) { let a = Math.PI/3 * i - Math.PI/2; let hx = Math.cos(a) * 28; let hy = Math.sin(a) * 28; if(i===0) ctx.moveTo(hx, hy); else ctx.lineTo(hx, hy); } ctx.closePath(); ctx.stroke();
            ctx.fillStyle = 'black'; ctx.beginPath(); ctx.arc(-10, -5, 2, 0, Math.PI*2); ctx.arc(10, -5, 2, 0, Math.PI*2); ctx.fill();
            ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(-15, 5); ctx.quadraticCurveTo(0, 15, 15, 5); ctx.stroke(); 
            ctx.fillStyle = '#22c55e'; ctx.beginPath(); ctx.moveTo(0, -5); ctx.quadraticCurveTo(5, 0, 0, 8); ctx.quadraticCurveTo(-5, 0, 0, -5); ctx.fill(); ctx.stroke();
            ctx.restore();
        }

        // --- 물리 엔진 ---
        function update() {
            if(state !== 'PLAYING') return;
            let phys = player.mode === 'CUBE' ? PHYSICS.CUBE : PHYSICS.SHIP;
            
            if(player.mode === 'CUBE') player.vy = Math.min(player.vy + phys.gravity, phys.maxFall); 
            else player.vy = isInputHolding ? Math.max(player.vy - phys.thrust, phys.maxRise) : Math.min(player.vy + phys.gravity, phys.maxFall);

            let prevY = player.y;
            player.y += player.vy;
            scrollX += GAME_SPEED; player.x += GAME_SPEED;
            
            if (player.isGrounded) player.coyoteTime = 6; 
            else if (player.coyoteTime > 0) player.coyoteTime--;
            player.isGrounded = false;

            const pCX = player.x + player.width/2; const pCY = player.y + player.height/2;
            const pRight = player.x + player.width - 6; const pLeft = player.x + 6;
            let pTop = player.y + 4; let pBottom = player.y + player.height;
            let targetY = GROUND_Y;

            for(let b of blocks) {
                if(b.x+b.w < scrollX || b.x > scrollX+canvas.width) continue;
                if(pRight > b.x && pLeft < b.x+b.w && pBottom <= b.y+20 && player.vy >= 0) targetY = Math.min(targetY, b.y);
            }

            for(let s of slopes) {
                if(pCX >= s.x && pCX <= s.x+s.w) {
                    let pct = (pCX - s.x) / s.w;
                    let slopeY = s.type === 'UP' ? s.y+s.h - pct*s.h : s.y + pct*s.h;
                    if(pBottom >= slopeY - 30) targetY = Math.min(targetY, slopeY); 
                }
            }

            if(pBottom >= targetY) { 
                player.y = targetY - player.height; player.vy = 0; player.isGrounded = true; 
                pBottom = player.y + player.height; pTop = player.y + 4; 
            }
            if(player.mode === 'SHIP' && player.y < 0) { player.y = 0; player.vy = 0; pTop = 4; }

            // 충돌(사망) 판정
            for(let b of blocks) {
                if(b.x+b.w < scrollX || b.x > scrollX+canvas.width) continue;
                if(pRight > b.x && pLeft < b.x+b.w && pBottom > b.y+10 && pTop < b.y+b.h-10) { gameOver(); return; }
                if(player.mode==='SHIP' && player.vy < 0 && pTop < b.y+b.h && pBottom > b.y+b.h && pRight > b.x && pLeft < b.x+b.w) { player.y = b.y+b.h; player.vy = 0; }
            }
            
            for(let s of spikes) {
                if(s.x+s.w < scrollX || s.x > scrollX+canvas.width) continue;
                // DOWN 타입 가시는 바닥이 뚫려있고 천장에 붙어있음
                let sT = s.type==='UP' ? s.y+14 : s.y, sB = s.type==='UP' ? s.y+s.h : s.y+s.h-14;
                if(pRight > s.x+10 && pLeft < s.x+s.w-10 && pBottom > sT && pTop < sB) { gameOver(); return; }
            }

            let ringJump = false;
            if(player.mode === 'CUBE') {
                if (jumpBuffer > 0) {
                    for(let r of jumpRings) {
                        if(!r.used && Math.abs(r.x - pCX)<50 && Math.abs(r.y - pCY)<50) {
                            player.vy = PHYSICS.CUBE.jumpForce * 1.05; r.used = true; ringJump = true; jumpBuffer = 0; 
                            for(let i=0;i<15;i++) particles.push(new Particle(r.x,r.y,'#eab308','ring')); break;
                        }
                    }
                    jumpBuffer--;
                }
                if (!ringJump && isInputHolding && (player.isGrounded || player.coyoteTime > 0)) {
                    player.vy = PHYSICS.CUBE.jumpForce; player.isGrounded = false; player.coyoteTime = 0; jumpBuffer = 0; 
                }
            }

            for(let c of crowns) {
                if(!c.collected && Math.abs(c.x-pCX)<c.size+15 && Math.abs(c.y-pCY)<c.size+15) {
                    c.collected = true; crownsCollected++; crownDisplay.innerText = `${crownsCollected} / ${totalCrowns}`;
                    for(let i=0;i<20;i++) particles.push(new Particle(c.x,c.y,'#facc15','crown'));
                }
            }
            for(let p of portals) {
                if(!p.used && pRight > p.x && pLeft < p.x+p.w) {
                    p.used = true;
                    if(p.type==='SHIP' && player.mode!=='SHIP'){ player.mode='SHIP'; showModeAlert("비행 모드!","#ef4444"); }
                    else if(p.type==='CUBE' && player.mode!=='CUBE'){ player.mode='CUBE'; showModeAlert("큐브 모드!","#3b82f6"); }
                }
            }

            let percent = Math.min(100, Math.floor((player.x/mapWidth)*100)); progressBar.style.width = percent+'%'; scoreDisplay.innerText = percent+'%';
            if(player.x >= mapWidth) gameWin();
        }

        // --- 그리기 함수 ---
        function drawBackground() {
            ctx.clearRect(0,0,canvas.width,canvas.height); let pOff = -(scrollX*0.15);
            ctx.fillStyle = 'rgba(255,255,255,0.03)'; ctx.font = 'bold 80px "Black Han Sans"';
            
            for(let i=0; i<40; i++) {
                let bx = pOff + (i*1200); ctx.fillText("GSHS HARDCORE", bx+100, 150);
                ctx.fillStyle='#312e81'; ctx.beginPath(); ctx.arc(bx+600,GROUND_Y,150,Math.PI,0); ctx.fill();
                ctx.fillStyle='#1e1b4b'; ctx.fillRect(bx+570,GROUND_Y-140,40,80); 
                ctx.strokeStyle='rgba(139,92,246,0.2)'; ctx.lineWidth=3; ctx.beginPath(); ctx.ellipse(bx+900,200,60,20,Math.PI/4,0,Math.PI*2); ctx.stroke();
                ctx.beginPath(); ctx.ellipse(bx+900,200,60,20,-Math.PI/4,0,Math.PI*2); ctx.stroke();
                ctx.fillStyle='rgba(139,92,246,0.5)'; ctx.beginPath(); ctx.arc(bx+900,200,10,0,Math.PI*2); ctx.fill(); ctx.fillStyle='rgba(255,255,255,0.03)';
            }

            let mOff = -(scrollX*0.2)%2000;
            for(let i=0; i<6; i++) { drawKeuni(ctx, mOff + 400 + (i*1400), 160, 1.4); drawDeuri(ctx, mOff + 1100 + (i*1400), 220, 1.4); }

            ctx.fillStyle='#0f172a'; ctx.fillRect(0,GROUND_Y,canvas.width,GROUND_HEIGHT);
            ctx.strokeStyle='#a855f7'; ctx.lineWidth=4; ctx.beginPath(); ctx.moveTo(0,GROUND_Y); ctx.lineTo(canvas.width,GROUND_Y); ctx.stroke();
            ctx.fillStyle='#4c1d95'; for(let i=0; i<canvas.width/50+2; i++) ctx.fillRect(-(scrollX)%50 + i*50, GROUND_Y, 5, GROUND_HEIGHT);
        }

        function drawElements() {
            for(let p of portals) {
                let dx = p.x - scrollX; if(dx > canvas.width || dx+p.w < 0) continue;
                let color = p.type === 'SHIP' ? '#ef4444' : '#3b82f6';
                ctx.save(); ctx.translate(dx+p.w/2, p.y+p.h/2); ctx.scale(1+Math.sin(Date.now()/150)*0.1, 1+Math.sin(Date.now()/150)*0.1);
                ctx.strokeStyle = color; ctx.lineWidth=5; ctx.beginPath(); ctx.ellipse(0,0,p.w/2,p.h/2,0,0,Math.PI*2); ctx.stroke(); ctx.restore();
            }
            for(let b of blocks) {
                let dx = b.x - scrollX; if(dx > canvas.width || dx+b.w < 0) continue;
                ctx.fillStyle='#4338ca'; ctx.fillRect(dx,b.y,b.w,b.h); ctx.strokeStyle='#818cf8'; ctx.lineWidth=2; ctx.strokeRect(dx,b.y,b.w,b.h);
                ctx.fillStyle='#312e81'; ctx.fillRect(dx+6,b.y+6,b.w-12,b.h-12);
            }
            for(let s of slopes) {
                let dx = s.x - scrollX; if(dx > canvas.width || dx+s.w < 0) continue;
                ctx.fillStyle='#4338ca'; ctx.beginPath();
                if(s.type==='UP'){ ctx.moveTo(dx,s.y+s.h); ctx.lineTo(dx+s.w,s.y); ctx.lineTo(dx+s.w,s.y+s.h); }
                else { ctx.moveTo(dx,s.y); ctx.lineTo(dx+s.w,s.y+s.h); ctx.lineTo(dx,s.y+s.h); }
                ctx.closePath(); ctx.fill(); ctx.strokeStyle='#818cf8'; ctx.lineWidth=2; ctx.beginPath();
                if(s.type==='UP'){ ctx.moveTo(dx,s.y+s.h); ctx.lineTo(dx+s.w,s.y); ctx.lineTo(dx+s.w,s.y+s.h); }
                else { ctx.moveTo(dx,s.y); ctx.lineTo(dx+s.w,s.y+s.h); ctx.lineTo(dx,s.y+s.h); }
                ctx.stroke();
            }
            for(let s of spikes) {
                let dx = s.x - scrollX; if(dx > canvas.width || dx+s.w < 0) continue;
                ctx.fillStyle='#ef4444'; ctx.beginPath();
                if(s.type==='UP'){ ctx.moveTo(dx+s.w/2,s.y); ctx.lineTo(dx+s.w,s.y+s.h); ctx.lineTo(dx,s.y+s.h); }
                else { ctx.moveTo(dx+s.w/2,s.y+s.h); ctx.lineTo(dx+s.w,s.y); ctx.lineTo(dx,s.y); }
                ctx.fill(); ctx.strokeStyle='#991b1b'; ctx.lineWidth=2; ctx.stroke();
            }
            for(let r of jumpRings) {
                if(r.used) continue; let dx = r.x - scrollX; if(dx > canvas.width+50 || dx < -50) continue;
                ctx.strokeStyle='#eab308'; ctx.lineWidth=5; ctx.beginPath(); ctx.arc(dx,r.y,r.radius+Math.sin(Date.now()/100)*2,0,Math.PI*2); ctx.stroke();
                ctx.fillStyle='rgba(250,204,21,0.4)'; ctx.beginPath(); ctx.arc(dx,r.y,r.radius-2,0,Math.PI*2); ctx.fill();
            }
            for(let c of crowns) {
                if(c.collected) continue; let dx = c.x - scrollX; if(dx > canvas.width+50 || dx < -50) continue;
                ctx.save(); ctx.translate(dx, c.y+Math.sin(Date.now()/200)*5); ctx.shadowColor='#facc15'; ctx.shadowBlur=15; ctx.fillStyle='#facc15'; 
                ctx.beginPath(); ctx.moveTo(-c.size/2,c.size/4); ctx.lineTo(c.size/2,c.size/4); ctx.lineTo(c.size/2,-c.size/2+5); ctx.lineTo(c.size/6,-c.size/6); ctx.lineTo(0,-c.size/2); ctx.lineTo(-c.size/6,-c.size/6); ctx.lineTo(-c.size/2,-c.size/2+5); ctx.closePath(); ctx.fill();
                ctx.fillStyle='#ef4444'; ctx.shadowBlur=0; ctx.beginPath(); ctx.arc(0,-c.size/6,3,0,Math.PI*2); ctx.fill(); ctx.restore();
            }
        }

        function drawPlayer() {
            const sx = player.x - scrollX, cx = sx+player.width/2, cy = player.y+player.height/2;
            if(player.mode==='SHIP' && isInputHolding) particles.push(new Particle(sx,cy+8,'#fca5a5','exhaust'));
            else {
                player.trail.push({x:sx,y:player.y,rot:player.rotation,mode:player.mode}); if(player.trail.length>7) player.trail.shift();
                for(let i=0;i<player.trail.length;i++){
                    let t=player.trail[i]; ctx.save(); ctx.translate(t.x+player.width/2,t.y+player.height/2); if(t.mode==='CUBE') ctx.rotate(t.rot);
                    ctx.fillStyle=`rgba(139,92,246,${i/7*0.4})`; ctx.fillRect(-player.width/2,-player.height/2,player.width,player.height); ctx.restore();
                }
            }
            ctx.save(); ctx.translate(cx,cy);
            if(player.mode==='CUBE') {
                if(!player.isGrounded) player.rotation += 0.20; else player.rotation += (Math.round(player.rotation/(Math.PI/2))*(Math.PI/2) - player.rotation)*0.4;
                ctx.rotate(player.rotation);
                ctx.fillStyle='#a855f7'; ctx.fillRect(-player.width/2,-player.height/2,player.width,player.height);
                ctx.fillStyle='#0f172a'; ctx.fillRect(-player.width/4,-player.height/4,player.width/2,player.height/2);
                ctx.strokeStyle='#d8b4fe'; ctx.lineWidth=2; ctx.strokeRect(-player.width/2,-player.height/2,player.width,player.height);
            } else {
                ctx.rotate(player.vy*0.06); 
                ctx.fillStyle='#94a3b8'; ctx.beginPath(); ctx.moveTo(-20,-12); ctx.lineTo(10,-12); ctx.lineTo(25,0); ctx.lineTo(10,12); ctx.lineTo(-20,12); ctx.fill();
                ctx.fillStyle='#a855f7'; ctx.fillRect(-5,-6,12,12); ctx.fillStyle='#eab308'; ctx.fillRect(-25,-16,12,6); ctx.fillRect(-25,10,12,6);
            }
            ctx.restore();
        }

        class Particle {
            constructor(x,y,c,t) {
                this.x=x; this.y=y; this.c=c; this.t=t; this.life=1.0;
                if(t==='exhaust'){ this.vx=-Math.random()*5-3; this.vy=(Math.random()-0.5)*2; this.size=Math.random()*6+4; this.decay=0.06; }
                else if(t==='ring'){ this.vx=(Math.random()-0.5)*10; this.vy=(Math.random()-0.5)*10; this.size=Math.random()*5+3; this.decay=0.05; }
                else if(t==='crown'){ this.vx=(Math.random()-0.5)*15; this.vy=(Math.random()-0.5)*15-5; this.size=Math.random()*6+2; this.decay=0.03; }
                else { this.vx=(Math.random()-0.5)*20; this.vy=(Math.random()-0.5)*20; this.size=Math.random()*10+3; this.decay=0.015; }
            }
            update(){ this.x+=this.vx; this.y+=this.vy; if(this.t==='death'||this.t==='crown') this.vy+=PHYSICS.CUBE.gravity*0.4; this.life-=this.decay; if(this.t!=='exhaust'&&this.t!=='ring'&&this.t!=='crown') this.x-=GAME_SPEED; }
            draw(ctx){ if(this.life<=0) return; ctx.fillStyle=this.c; ctx.globalAlpha=this.life; if(this.t==='crown'){ ctx.beginPath(); ctx.arc(this.x,this.y,this.size,0,Math.PI*2); ctx.fill(); } else ctx.fillRect(this.x,this.y,this.size,this.size); ctx.globalAlpha=1.0; }
        }
        function drawParticles() { for(let i=particles.length-1; i>=0; i--) { particles[i].update(); particles[i].draw(ctx); if(particles[i].life<=0) particles.splice(i,1); } }
        
        function draw() { drawBackground(); drawElements(); drawParticles(); if(state!=='GAMEOVER') drawPlayer(); }
        function gameLoop() { update(); draw(); animationId = requestAnimationFrame(gameLoop); }

        function handleInputDown() { 
            if(state!=='PLAYING') return; 
            isInputHolding = true; 
            if(!isJumpKeyHeld) { jumpBuffer = 6; isJumpKeyHeld = true; }
        }
        function handleInputUp() { 
            isInputHolding = false; isJumpKeyHeld = false; 
        }

        function startGame() {
            generateLevel(); scrollX=0; player.mode='CUBE'; player.x=200; player.y=GROUND_Y-GRID_SIZE; player.vy=0; player.isGrounded=true; player.rotation=0; player.trail=[]; player.coyoteTime=0;
            particles=[]; isInputHolding=false; isJumpKeyHeld=false; jumpBuffer=0;
            uiLayer.classList.add('hidden'); modeAlert.style.opacity=0; state='PLAYING';
            if(!animationId) gameLoop();
        }

        function gameOver() {
            state='GAMEOVER'; 
            for(let i=0;i<50;i++){ particles.push(new Particle(player.x-scrollX+player.width/2, player.y+player.height/2, '#a855f7', 'death')); particles.push(new Particle(player.x-scrollX+player.width/2, player.y+player.height/2, 'white', 'death')); }
            setTimeout(()=>{
                let mainTitle = document.getElementById('main-title'); let subTitle = document.getElementById('sub-title');
                uiLayer.classList.remove('hidden'); 
                mainTitle.innerHTML=`GAME OVER`; mainTitle.style.color="#ef4444"; mainTitle.style.textShadow="4px 4px 0 #7f1d1d, 0 0 20px rgba(239,68,68,0.5)";
                subTitle.innerHTML=`진행률: <span style="color:#facc15;font-size:1.5em;font-weight:bold;">${Math.floor((player.x/mapWidth)*100)}%</span><br>획득한 왕관: <span style="color:#facc15;font-size:1.5em;font-weight:bold;">👑 ${crownsCollected} / 3</span><br><br>다시 도전하세요!`;
                startBtn.innerText="다시 도전";
            }, 800);
        }

        function gameWin() {
            state='GAMEOVER'; uiLayer.classList.remove('hidden'); 
            let mainTitle = document.getElementById('main-title'); let subTitle = document.getElementById('sub-title');
            mainTitle.innerText="LEVEL CLEARED!"; mainTitle.style.color="#34d399"; mainTitle.style.textShadow="4px 4px 0 #064e3b, 0 0 20px rgba(52,211,153,0.5)";
            subTitle.innerHTML=`축하합니다! 이 극악의 난이도를 뚫으셨군요!<br><br>최종 수집한 왕관: <span style="color:#facc15;font-size:1.5em;font-weight:bold;">👑 ${crownsCollected} / 3</span><br>${crownsCollected===3?"모든 왕관을 모은 당신은 진정한 마스터!":"왕관 3개 올클리어에 도전해보세요!"}`;
            startBtn.innerText="다시 플레이";
        }
        function showModeAlert(t,c) { modeAlert.innerText=t; modeAlert.style.color=c; modeAlert.style.textShadow=`3px 3px 0 ${c==='#ef4444'?'#7f1d1d':'#1e3a8a'}`; modeAlert.style.opacity=1; setTimeout(()=>modeAlert.style.opacity=0, 1200); }

        initLayer.addEventListener('click', () => { initLayer.classList.add('hidden'); uiLayer.classList.remove('hidden'); state='MENU'; generateLevel(); drawBackground(); drawElements(); drawPlayer(); });
        
        function handleStartEvent(e) { e.preventDefault(); e.stopPropagation(); if(state !== 'PLAYING') startGame(); }
        startBtn.addEventListener('click', handleStartEvent);
        startBtn.addEventListener('touchstart', handleStartEvent, {passive: false});
        
        window.addEventListener('keydown', (e) => { 
            if(e.code==='Space'||e.code==='ArrowUp'){ 
                e.preventDefault(); 
                if(state==='PLAYING' && !e.repeat) handleInputDown(); 
            }
        });
        window.addEventListener('keyup', (e) => { if(e.code==='Space'||e.code==='ArrowUp') handleInputUp(); });
        canvas.addEventListener('mousedown', (e) => { e.preventDefault(); handleInputDown(); }); window.addEventListener('mouseup', () => handleInputUp());
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleInputDown(); }, {passive:false}); window.addEventListener('touchend', () => handleInputUp());

        generateLevel(); drawBackground(); drawElements(); drawPlayer();
    </script>
</body>
</html>
